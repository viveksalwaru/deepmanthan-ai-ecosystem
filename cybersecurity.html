<title>Cybersecurity — Threats &amp; Defense</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#050A0F;--red:#FF3B5C;--amber:#FBBF24;--green:#22C55E;--cyan:#22D3EE;--violet:#A78BFA;--rose:#FB5E6D;--text:#64748B;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Sora',sans-serif;color:#CBD5E1;}
body{display:flex;flex-direction:column;}
header{padding:5px 14px;background:#060C14;border-bottom:1px solid #0D1E2E;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.title{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--red);letter-spacing:.12em;font-weight:600;}
.pill{padding:3px 11px;border-radius:20px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;border:1px solid;transition:all .4s;}
.pill.secure{color:var(--green);border-color:var(--green);background:#04100A;}
.pill.danger{color:var(--red);border-color:var(--red);background:#120408;animation:blink .7s infinite;}
.pill.scan{color:var(--amber);border-color:var(--amber);background:#110D00;}
.pill.hard{color:var(--cyan);border-color:var(--cyan);background:#051214;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.metrics{display:flex;gap:14px;}
.met{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text);}
.met span{color:#CBD5E1;}
.main{display:flex;flex:1;overflow:hidden;}
.left{width:38%;display:flex;flex-direction:column;border-right:1px solid #0D1E2E;overflow:hidden;}
.snote{padding:9px 12px;font-size:11px;line-height:1.65;color:#94A3B8;border-bottom:1px solid #0D1E2E;min-height:108px;max-height:140px;overflow-y:auto;}
.log{flex:1;overflow-y:auto;padding:5px 8px;background:#030810;}
.le{display:flex;gap:6px;padding:3px 0;border-bottom:1px solid #09131E;font-size:10px;line-height:1.4;}
.lt{color:#1A2E40;font-family:'IBM Plex Mono';white-space:nowrap;flex-shrink:0;}
.lm{color:#4A6070;}
.lm.ok{color:var(--green);}
.lm.warn{color:var(--amber);}
.lm.err{color:var(--red);}
.lm.inf{color:var(--cyan);}
.lm.code{color:var(--violet);font-family:'IBM Plex Mono';font-size:9px;}
.right{flex:1;overflow:hidden;position:relative;}
.right svg{width:100%;height:100%;}
.btns{display:flex;gap:5px;padding:6px 10px;background:#060C14;border-top:1px solid #0D1E2E;flex-shrink:0;flex-wrap:wrap;}
button{padding:4px 12px;border-radius:5px;border:1px solid #1A2E3E;background:#08121E;color:#5A7A90;font-family:'IBM Plex Mono';font-size:10px;cursor:pointer;transition:all .2s;letter-spacing:.04em;}
button:hover:not(:disabled){background:#0D1E2E;border-color:var(--cyan);color:var(--cyan);}
button:disabled{opacity:.3;cursor:default;}
button.rst{border-color:#1E1018;color:#FF3B5C44;}
button.rst:hover{border-color:var(--red);color:var(--red);background:#120408;}
.alert-banner{display:none;position:absolute;bottom:0;left:0;right:0;background:#18030A;border-top:2px solid var(--red);padding:8px 14px;font-family:'IBM Plex Mono';font-size:11px;color:var(--red);z-index:10;display:none;align-items:center;justify-content:space-between;}
.alert-banner button{border-color:var(--red)33;color:var(--red);font-size:10px;padding:2px 8px;}
.secure-banner{display:none;position:absolute;bottom:0;left:0;right:0;background:#040F08;border-top:2px solid var(--green);padding:8px 14px;font-family:'IBM Plex Mono';font-size:11px;color:var(--green);z-index:10;}
@keyframes dash{to{stroke-dashoffset:-20;}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
@keyframes scanline{0%{transform:translateY(-100%);}100%{transform:translateY(400px);}}
</style>

<script>
function s(id){return document.getElementById(id);}
function log(msg,t='ok'){

  lg.insertBefore(e,lg.firstChild);
}
function pill(txt,type='secure'){
  s('mpill').className='pill '+type;

}
function setMet(threat,type,cpu,status){
  if(threat)s('m-threat').textContent=threat;

function show(id,op){const el=s(id);if(el)el.style.opacity=op;}

// ── Reliable keyframe packet animation ─────────────────────────────────────
let _gen=0,_pid=0;
function spawnPkt(x1,y1,x2,y2,col,delay,label){
  const myGen=_gen;
  const id='pk'+(++_pid);
  const dx=x2-x1,dy=y2-y1,dur=1300;
  const st=document.createElement('style');
  st.textContent=`@keyframes ${id}{0%{transform:translate(0,0);opacity:0;}8%{opacity:1;}82%{transform:translate(${dx}px,${dy}px);opacity:.9;}100%{transform:translate(${dx}px,${dy}px);opacity:0;}}`;
  document.head.appendChild(st);
  const go=()=>{
    if(_gen!==myGen){st.remove();return;}
    const ns='http://www.w3.org/2000/svg';
    const g=document.createElementNS(ns,'g');
    g.classList.add('pkt-anim');
    const c=document.createElementNS(ns,'circle');
    c.setAttribute('cx',x1);c.setAttribute('cy',y1);c.setAttribute('r','7');
    c.setAttribute('fill',col);g.appendChild(c);
    if(label){
      const t=document.createElementNS(ns,'text');
      t.setAttribute('x',x1);t.setAttribute('y',y1-10);
      t.setAttribute('text-anchor','middle');t.setAttribute('font-family','IBM Plex Mono');
      t.setAttribute('font-size','8');t.setAttribute('fill',col);t.textContent=label;
      g.appendChild(t);
    }
    g.style.animation=`${id} ${dur}ms ease-out forwards`;
    s('csv').appendChild(g);
    setTimeout(()=>{if(g.parentNode)g.remove();st.remove();},dur+150);
  };
  if(delay)setTimeout(go,delay);else go();
}

// CPU meter helper
function setCPU(pct,col){
  const fill=s('cpu-fill');
  if(!fill)return;
  const barH=130,h=Math.round(barH*pct/100);
  fill.setAttribute('y',barH-h);
  fill.setAttribute('height',h);
  fill.setAttribute('fill',col);
  s('cpu-pct').textContent=pct+'%';
  s('cpu-pct').setAttribute('fill',col);
  s('m-cpu').textContent=pct+'%';
}

// Lock a file icon (ransomware)
function lockFile(id,delay){
  setTimeout(()=>{
    const g=s(id);if(!g)return;

    if(icon)icon.textContent='🔒';
  },delay);
}
