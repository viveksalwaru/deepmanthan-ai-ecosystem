.btn.ghost{ background:none; color:var(--ink-dim); }

.stage-wrap{ flex:1; overflow:auto; padding:24px 22px; }
.stage-wrap::-webkit-scrollbar{ width:9px; height:9px; } .stage-wrap::-webkit-scrollbar-thumb{ background:var(--line); border-radius:8px; }

.status{ font-family:&quot;IBM Plex Mono&quot;; font-size:.68rem; color:var(--ink-dim); padding:8px 22px; border-top:1px solid var(--line-soft);
  flex-shrink:0; min-height:34px; display:flex; align-items:center; gap:8px; }
.status b{ color:var(--ink); } .status .k{ color:var(--cyan); } .status .g{ color:var(--green); } .status .r{ color:var(--rose); } .status .a{ color:var(--amber); }

/* ── node / cell primitives ── */
.row{ display:flex; align-items:center; gap:0; flex-wrap:wrap; }
.node{ position:relative; min-width:46px; height:46px; background:linear-gradient(160deg,var(--panel),var(--panel2));
  border:1.5px solid var(--line); border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:&quot;IBM Plex Mono&quot;; padding:0 8px; transition:transform .38s cubic-bezier(.4,0,.2,1), opacity .3s, border-color .25s, background .25s; }
.node .v{ font-size:.9rem; font-weight:600; color:var(--ink); }
.node .sub{ position:absolute; bottom:-18px; font-size:.58rem; color:var(--ink-faint); }
.node.leaving{ transform:scale(.2); opacity:0; }
.node.hit{ border-color:var(--cyan); box-shadow:0 0 0 1px var(--cyan),0 0 14px -3px var(--cyan); background:rgba(56,225,255,.1); }
.node.cmp{ border-color:var(--amber); box-shadow:0 0 0 1px var(--amber); background:rgba(251,191,36,.08); }
.node.fresh{ border-color:var(--green); box-shadow:0 0 0 1px var(--green),0 0 14px -3px var(--green); }
.node.top{ border-color:var(--violet); box-shadow:0 0 0 1px var(--violet); }
.arrow{ color:var(--ink-faint); font-size:1rem; padding:0 7px; user-select:none; }
.ptr-label{ font-family:&quot;IBM Plex Mono&quot;; font-size:.62rem; color:var(--violet); margin-right:6px; align-self:center; }
.null-cap{ font-family:&quot;IBM Plex Mono&quot;; font-size:.68rem; color:var(--ink-faint); padding:0 6px; }
.empty-msg{ color:var(--ink-faint); font-family:&quot;IBM Plex Mono&quot;; font-size:.75rem; }

/* hash */
.bucket{ display:flex; align-items:center; gap:0; margin-bottom:9px; }
.bucket-idx{ width:52px; flex-shrink:0; font-family:&quot;IBM Plex Mono&quot;; font-size:.72rem; color:var(--ink-dim);
  display:flex; align-items:center; gap:6px; }
.bucket-idx .bx{ width:26px;height:26px;border-radius:7px; background:var(--panel2); border:1px solid var(--line);
  display:grid; place-items:center; color:var(--cyan); font-weight:600; }
.bucket-row{ flex:1; display:flex; align-items:center; gap:0; padding:4px 8px; border-radius:8px; transition:background .25s; min-height:40px; }
.bucket-row.active{ background:rgba(56,225,255,.06); }
.hnode{ min-width:78px; height:38px; background:linear-gradient(160deg,var(--panel),var(--panel2)); border:1.5px solid var(--line);
  border-radius:9px; display:flex; align-items:center; justify-content:center; gap:5px; font-family:&quot;IBM Plex Mono&quot;; font-size:.72rem;
  padding:0 9px; transition:transform .35s, opacity .3s, border-color .25s, background .25s; }
.hnode .hk{ color:var(--violet); font-weight:600; } .hnode .hv{ color:var(--ink); } .hnode .col{ color:var(--ink-faint); }
.hnode.leaving{ transform:scale(.2); opacity:0; }
.hnode.fresh{ border-color:var(--green); box-shadow:0 0 0 1px var(--green),0 0 12px -3px var(--green); }
.hnode.hit{ border-color:var(--cyan); box-shadow:0 0 0 1px var(--cyan); background:rgba(56,225,255,.1); }
.hnode.cmp{ border-color:var(--amber); box-shadow:0 0 0 1px var(--amber); }

.compute{ font-family:&quot;IBM Plex Mono&quot;; font-size:.74rem; color:var(--ink-dim); margin-bottom:18px; min-height:22px;
  background:#05090F; border:1px solid var(--line); border-radius:8px; padding:9px 13px; display:inline-flex; gap:10px; align-items:center; }
.compute b{ color:var(--ink); } .compute .res{ color:var(--cyan); font-weight:600; }
.compute.flash{ border-color:var(--cyan); }

/* stack */
.stack-col{ display:flex; flex-direction:column-reverse; gap:8px; align-items:flex-start; }
.stack-cell{ min-width:120px; }
/* bst */
.bst-stage{ position:relative; min-height:340px; }
.bst-edges{ position:absolute; inset:0; pointer-events:none; overflow:visible; }
.bnode{ position:absolute; width:44px; height:44px; border-radius:50%; transform:translate(-50%,-50%);
  background:linear-gradient(160deg,var(--panel),var(--panel2)); border:1.6px solid var(--line);
  display:grid; place-items:center; font-family:&quot;IBM Plex Mono&quot;; font-size:.8rem; font-weight:600;
  transition:left .4s cubic-bezier(.4,0,.2,1), top .4s cubic-bezier(.4,0,.2,1), border-color .25s, box-shadow .25s, background .25s; }
.bnode.cmp{ border-color:var(--amber); box-shadow:0 0 0 1px var(--amber); background:rgba(251,191,36,.1); }
.bnode.hit{ border-color:var(--cyan); box-shadow:0 0 0 1px var(--cyan),0 0 14px -3px var(--cyan); background:rgba(56,225,255,.12); }
.bnode.fresh{ border-color:var(--green); box-shadow:0 0 0 1px var(--green),0 0 14px -3px var(--green); }
.legend-inline{ font-family:&quot;IBM Plex Mono&quot;; font-size:.62rem; color:var(--ink-faint); margin-top:14px; display:flex; gap:16px; flex-wrap:wrap; }
.legend-inline span{ display:inline-flex; align-items:center; gap:6px; }
.legend-inline i{ width:11px;height:11px;border-radius:3px; display:inline-block; }
</style>
</head>
<body>

<div class=&quot;top-header&quot;>
  <div class=&quot;logo-glyph&quot;>🧮</div>
  <div class=&quot;logo-txt&quot;><b>Data Structures</b><span>Interactive Animated Visualizer</span></div>
</div>

<div class=&quot;body&quot;>
  <!-- left rail -->
  <nav class=&quot;rail&quot; id=&quot;rail&quot;></nav>

  <!-- right content -->
  <div class=&quot;content&quot; id=&quot;content&quot;>

    <!-- HASH -->
    <section class=&quot;view&quot; id=&quot;view-hash&quot;>
      <div class=&quot;view-head&quot;><h2>Hash Table · Separate Chaining</h2>
        <p>A key is turned into a bucket index by a <b>hash function</b>. Multiple keys can land in the same bucket — a <b>collision</b> — so each bucket holds a small linked chain of entries. Insert some keys and watch them get placed and chained.</p></div>
      <div class=&quot;toolbar&quot;>
        <input id=&quot;h-key&quot; class=&quot;wide&quot; placeholder=&quot;key&quot; value=&quot;leopard&quot;>
        <input id=&quot;h-val&quot; placeholder=&quot;val&quot; value=&quot;17&quot;>
        <button class=&quot;btn g&quot; id=&quot;h-ins&quot;>＋ Insert</button>
        <button class=&quot;btn c&quot; id=&quot;h-find&quot;>🔍 Search</button>
        <button class=&quot;btn r&quot; id=&quot;h-del&quot;>🗑 Delete</button>
        <span class=&quot;sep&quot;></span>
        <button class=&quot;btn&quot; id=&quot;h-rand&quot;>🎲 Random ×5</button>
        <button class=&quot;btn ghost&quot; id=&quot;h-clear&quot;>Clear</button>
      </div>
      <div class=&quot;stage-wrap&quot;>
        <div class=&quot;compute&quot; id=&quot;h-compute&quot;>hash(key) = (Σ char codes) mod <b id=&quot;h-cap&quot;>8</b> → bucket</div>
        <div id=&quot;h-stage&quot;></div>
      </div>
      <div class=&quot;status&quot; id=&quot;h-status&quot;></div>
    </section>

    <!-- ARRAY -->
    <section class=&quot;view&quot; id=&quot;view-array&quot;>
      <div class=&quot;view-head&quot;><h2>Array · Dynamic Array</h2>
        <p>Contiguous, index-addressable slots. Access by index is O(1); inserting or removing in the middle shifts every following element — watch them slide.</p></div>
      <div class=&quot;toolbar&quot;>
        <input id=&quot;a-val&quot; placeholder=&quot;val&quot; value=&quot;7&quot;>
        <button class=&quot;btn g&quot; id=&quot;a-push&quot;>Push (end)</button>
        <button class=&quot;btn r&quot; id=&quot;a-pop&quot;>Pop (end)</button>
        <span class=&quot;sep&quot;></span>
        <input id=&quot;a-idx&quot; placeholder=&quot;idx&quot; value=&quot;1&quot;>
        <button class=&quot;btn c&quot; id=&quot;a-ins&quot;>Insert @ idx</button>
        <button class=&quot;btn r&quot; id=&quot;a-rem&quot;>Remove @ idx</button>
        <span class=&quot;sep&quot;></span>
        <button class=&quot;btn&quot; id=&quot;a-rand&quot;>🎲 Random</button>
        <button class=&quot;btn ghost&quot; id=&quot;a-clear&quot;>Clear</button>
      </div>
      <div class=&quot;stage-wrap&quot;><div class=&quot;row&quot; id=&quot;a-stage&quot;></div></div>
      <div class=&quot;status&quot; id=&quot;a-status&quot;></div>
    </section>

    <!-- SLL -->
    <section class=&quot;view&quot; id=&quot;view-sll&quot;>
      <div class=&quot;view-head&quot;><h2>Singly Linked List</h2>
        <p>Each node holds a value and a single <b>next</b> pointer. No indices — to find a value you walk the chain from <b>head</b>. Insert at head is O(1); search is O(n).</p></div>
      <div class=&quot;toolbar&quot;>
        <input id=&quot;s-val&quot; placeholder=&quot;val&quot; value=&quot;9&quot;>
        <button class=&quot;btn g&quot; id=&quot;s-ih&quot;>Insert Head</button>
        <button class=&quot;btn g&quot; id=&quot;s-it&quot;>Insert Tail</button>
        <button class=&quot;btn r&quot; id=&quot;s-dh&quot;>Delete Head</button>
        <button class=&quot;btn r&quot; id=&quot;s-dt&quot;>Delete Tail</button>
        <span class=&quot;sep&quot;></span>
        <button class=&quot;btn c&quot; id=&quot;s-find&quot;>🔍 Search</button>
        <button class=&quot;btn&quot; id=&quot;s-rand&quot;>🎲 Random</button>
        <button class=&quot;btn ghost&quot; id=&quot;s-clear&quot;>Clear</button>
      </div>
      <div class=&quot;stage-wrap&quot;><div class=&quot;row&quot; id=&quot;s-stage&quot;></div></div>
      <div class=&quot;status&quot; id=&quot;s-status&quot;></div>
    </section>

    <!-- DLL -->
    <section class=&quot;view&quot; id=&quot;view-dll&quot;>
      <div class=&quot;view-head&quot;><h2>Doubly Linked List</h2>
        <p>Each node has both <b>prev</b> and <b>next</b> pointers, so you can traverse in either direction and delete a node in O(1) once you hold it. This is the backbone of an LRU cache.</p></div>
      <div class=&quot;toolbar&quot;>
        <input id=&quot;d-val&quot; placeholder=&quot;val&quot; value=&quot;9&quot;>
        <button class=&quot;btn g&quot; id=&quot;d-ih&quot;>Insert Head</button>
        <button class=&quot;btn g&quot; id=&quot;d-it&quot;>Insert Tail</button>
        <button class=&quot;btn r&quot; id=&quot;d-dh&quot;>Delete Head</button>
        <button class=&quot;btn r&quot; id=&quot;d-dt&quot;>Delete Tail</button>
        <span class=&quot;sep&quot;></span>
        <button class=&quot;btn c&quot; id=&quot;d-find&quot;>🔍 Search</button>
        <button class=&quot;btn&quot; id=&quot;d-rand&quot;>🎲 Random</button>
        <button class=&quot;btn ghost&quot; id=&quot;d-clear&quot;>Clear</button>
      </div>
      <div class=&quot;stage-wrap&quot;><div class=&quot;row&quot; id=&quot;d-stage&quot;></div></div>
      <div class=&quot;status&quot; id=&quot;d-status&quot;></div>
    </section>

    <!-- STACK -->
    <section class=&quot;view&quot; id=&quot;view-stack&quot;>
      <div class=&quot;view-head&quot;><h2>Stack · LIFO</h2>
        <p>Last In, First Out. You can only <b>push</b> and <b>pop</b> at the top. Used for call stacks, undo, and expression parsing.</p></div>
      <div class=&quot;toolbar&quot;>
        <input id=&quot;st-val&quot; placeholder=&quot;val&quot; value=&quot;5&quot;>
        <button class=&quot;btn g&quot; id=&quot;st-push&quot;>Push</button>
        <button class=&quot;btn r&quot; id=&quot;st-pop&quot;>Pop</button>
        <button class=&quot;btn c&quot; id=&quot;st-peek&quot;>Peek</button>
        <button class=&quot;btn&quot; id=&quot;st-rand&quot;>🎲 Random</button>
        <button class=&quot;btn ghost&quot; id=&quot;st-clear&quot;>Clear</button>
      </div>
      <div class=&quot;stage-wrap&quot;><div class=&quot;stack-col&quot; id=&quot;st-stage&quot;></div></div>
      <div class=&quot;status&quot; id=&quot;st-status&quot;></div>
    </section>

    <!-- QUEUE -->
    <section class=&quot;view&quot; id=&quot;view-queue&quot;>
      <div class=&quot;view-head&quot;><h2>Queue · FIFO</h2>
        <p>First In, First Out. <b>Enqueue</b> at the rear, <b>dequeue</b> from the front. Used for task queues, buffering, and BFS.</p></div>
      <div class=&quot;toolbar&quot;>
        <input id=&quot;q-val&quot; placeholder=&quot;val&quot; value=&quot;5&quot;>
        <button class=&quot;btn g&quot; id=&quot;q-enq&quot;>Enqueue</button>
        <button class=&quot;btn r&quot; id=&quot;q-deq&quot;>Dequeue</button>
        <button class=&quot;btn c&quot; id=&quot;q-peek&quot;>Peek Front</button>
        <button class=&quot;btn&quot; id=&quot;q-rand&quot;>🎲 Random</button>
        <button class=&quot;btn ghost&quot; id=&quot;q-clear&quot;>Clear</button>
      </div>
      <div class=&quot;stage-wrap&quot;><div class=&quot;row&quot; id=&quot;q-stage&quot;></div></div>
      <div class=&quot;status&quot; id=&quot;q-status&quot;></div>
    </section>

    <!-- BST -->
    <section class=&quot;view&quot; id=&quot;view-bst&quot;>
      <div class=&quot;view-head&quot;><h2>Binary Search Tree</h2>
        <p>For every node, all values in the left subtree are smaller and all in the right are larger. That ordering lets search/insert follow one comparison path — O(log n) when balanced. Watch the path light up.</p></div>
      <div class=&quot;toolbar&quot;>
        <input id=&quot;b-val&quot; placeholder=&quot;val&quot; value=&quot;42&quot;>
        <button class=&quot;btn g&quot; id=&quot;b-ins&quot;>Insert</button>
        <button class=&quot;btn c&quot; id=&quot;b-find&quot;>🔍 Search</button>
        <button class=&quot;btn c&quot; id=&quot;b-inorder&quot;>In-order traversal</button>
        <button class=&quot;btn&quot; id=&quot;b-rand&quot;>🎲 Random tree</button>
        <button class=&quot;btn ghost&quot; id=&quot;b-clear&quot;>Clear</button>
      </div>
      <div class=&quot;stage-wrap&quot;><div class=&quot;bst-stage&quot; id=&quot;b-stage&quot;><svg class=&quot;bst-edges&quot; id=&quot;b-edges&quot;></svg></div>
        <div class=&quot;legend-inline&quot;>
          <span><i style=&quot;background:var(--amber)&quot;></i>comparing</span>
          <span><i style=&quot;background:var(--cyan)&quot;></i>found</span>
          <span><i style=&quot;background:var(--green)&quot;></i>inserted</span>
        </div>
      </div>
      <div class=&quot;status&quot; id=&quot;b-status&quot;></div>
    </section>

  </div>
</div>

<script>
/* ══════════ shared helpers ══════════ */
const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r=>setTimeout(r,ms));
let uidc=0; const uid=()=>'k'+(++uidc);
const busy = {};   // per-view animation lock
function rnd(n){ return Math.floor(Math.random()*n); }

/* FLIP animation for reflowing rows */
let _flip=null;
function flipCapture(container){ _flip=new Map();
  container.querySelectorAll('[data-key]').forEach(n=>_flip.set(n.dataset.key, n.getBoundingClientRect())); }
function flipPlay(container){ if(!_flip) return;
  container.querySelectorAll('[data-key]').forEach(n=>{
    const first=_flip.get(n.dataset.key), last=n.getBoundingClientRect();
    if(first){ const dx=first.left-last.left, dy=first.top-last.top;
      if(dx||dy){ n.style.transition='none'; n.style.transform=`translate(${dx}px,${dy}px)`;
        requestAnimationFrame(()=>{ n.style.transition=''; n.style.transform=''; }); }
    } else { n.style.transition='none'; n.style.transform='scale(.3)'; n.style.opacity='0';
      requestAnimationFrame(()=>{ n.style.transition='transform .32s cubic-bezier(.34,1.6,.64,1), opacity .3s'; n.style.transform=''; n.style.opacity='1'; }); }
  });
  _flip=null;
}
function setStatus(id, html){ $(id).innerHTML = html; }

/* ══════════ navigation ══════════ */
const TABS=[
  {group:'Linear'},
  {id:'array', ic:'▦', name:'Array'},
  {id:'sll',   ic:'→', name:'Singly Linked List'},
  {id:'dll',   ic:'⇄', name:'Doubly Linked List'},
  {id:'stack', ic:'▤', name:'Stack (LIFO)'},
  {id:'queue', ic:'▭', name:'Queue (FIFO)'},
  {group:'Hashing'},
  {id:'hash',  ic:'#', name:'Hash Table'},
  {group:'Trees'},
  {id:'bst',   ic:'⋔', name:'Binary Search Tree'},
];
const rail=$('rail');
TABS.forEach(t=>{
  if(t.group){ const g=document.createElement('div'); g.className='rail-group'; g.textContent=t.group; rail.appendChild(g); return; }
  const it=document.createElement('div'); it.className='rail-item'; it.dataset.tab=t.id;
  it.innerHTML=`<span class=&quot;ri-ic&quot;>${t.ic}</span><span>${t.name}</span>`;
  it.onclick=()=>selectTab(t.id);
  rail.appendChild(it);
});
const inited={};
function selectTab(id){
  document.querySelectorAll('.rail-item').forEach(x=>x.classList.toggle('active', x.dataset.tab===id));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  $('view-'+id).classList.add('active');
  if(!inited[id]){ inited[id]=true; INIT[id] &amp;&amp; INIT[id](); }
}

/* ══════════════════════════════════════════
   HASH TABLE
   ══════════════════════════════════════════ */
const HCAP=8;
const HWORDS=['leopard','tiger','deer','camera','node','edge','pod','cloud','ranger','forest','alert','frame','sensor','relay','trail','ridge'];
let hbuckets=Array.from({length:HCAP},()=>[]);
function hhash(key){ let s=0; for(const c of String(key)) s+=c.charCodeAt(0); return s%HCAP; }
function hsize(){ return hbuckets.reduce((a,b)=>a+b.length,0); }
function hRender(){
  const st=$('h-stage'); st.innerHTML='';
  hbuckets.forEach((chain,i)=>{
    const b=document.createElement('div'); b.className='bucket';
    b.innerHTML=`<div class=&quot;bucket-idx&quot;><span class=&quot;bx&quot;>${i}</span></div>`;
    const row=document.createElement('div'); row.className='bucket-row'; row.id='hrow-'+i;
    if(!chain.length){ row.innerHTML='<span class=&quot;null-cap&quot;>∅ empty</span>'; }
    else chain.forEach((n,j)=>{
      const nd=document.createElement('div'); nd.className='hnode'; nd.dataset.key=n.id; nd.id='hn-'+n.id;
      nd.innerHTML=`<span class=&quot;hk&quot;>${n.key}</span><span class=&quot;col&quot;>:</span><span class=&quot;hv&quot;>${n.val}</span>`;
      row.appendChild(nd);
      if(j<chain.length-1){ const a=document.createElement('span'); a.className='arrow'; a.textContent='→'; row.appendChild(a); }
    });
    b.appendChild(row); st.appendChild(b);
  });
  const capEl=$('h-cap'); if(capEl) capEl.textContent=HCAP;
  setStatus('h-status', `size <b>${hsize()}</b> · buckets <b>${HCAP}</b> · load factor <span class=&quot;k&quot;>${(hsize()/HCAP).toFixed(2)}</span>`);
}
async function hInsert(key,val){
  if(busy.hash||key==='') return; busy.hash=true;
  const i=hhash(key);
  const comp=$('h-compute'); comp.classList.add('flash');
  comp.innerHTML=`hash(&quot;<b>${key}</b>&quot;) = Σ mod ${HCAP} = <span class=&quot;res&quot;>${i}</span> → bucket ${i}`;
  const row=$('hrow-'+i); if(row){ row.classList.add('active'); }
  await sleep(600);
  const existing=hbuckets[i].find(n=>n.key===String(key));
  if(existing){ existing.val=val; hRender(); const el=$('hn-'+existing.id);
    if(el){ el.classList.add('hit'); } setStatus('h-status',`key <b>${key}</b> already in bucket ${i} · value updated → <span class=&quot;a&quot;>${val}</span>`);
    await sleep(500); }
  else{
    const node={id:uid(),key:String(key),val};
    hbuckets[i].push(node); hRender();
    const el=$('hn-'+node.id); if(el){ el.classList.add('fresh'); }
    const nrow=$('hrow-'+i); if(nrow) nrow.classList.add('active');
    const chainLen=hbuckets[i].length;
    setStatus('h-status', chainLen>1
      ? `<span class=&quot;a&quot;>collision!</span> bucket ${i} now chains <b>${chainLen}</b> entries · appended <b>${key}</b>`
      : `inserted <b>${key}:${val}</b> into empty bucket ${i}`);
    await sleep(700);
  }
  document.querySelectorAll('.bucket-row.active').forEach(r=>r.classList.remove('active'));
  comp.classList.remove('flash');
  busy.hash=false;
}
async function hSearch(key){
  if(busy.hash||key==='') return; busy.hash=true;
  const i=hhash(key); const comp=$('h-compute'); comp.classList.add('flash');
  comp.innerHTML=`hash(&quot;<b>${key}</b>&quot;) = <span class=&quot;res&quot;>${i}</span> → walk bucket ${i} chain`;
  const row=$('hrow-'+i); if(row) row.classList.add('active'); await sleep(500);
  let found=false;
  for(const n of hbuckets[i]){ const el=$('hn-'+n.id); if(el) el.classList.add('cmp'); await sleep(420);
    if(n.key===String(key)){ if(el){ el.classList.remove('cmp'); el.classList.add('hit'); } found=true; break; }
    if(el) el.classList.remove('cmp'); }
  setStatus('h-status', found?`found <span class=&quot;k&quot;>${key}</span> in bucket ${i} ✔`:`<span class=&quot;r&quot;>${key} not found</span> · bucket ${i} exhausted`);
  await sleep(900); if(row) row.classList.remove('active');
  hRender(); comp.classList.remove('flash'); busy.hash=false;
}
async function hDelete(key){
  if(busy.hash||key==='') return; busy.hash=true;
  const i=hhash(key); const idx=hbuckets[i].findIndex(n=>n.key===String(key));
  if(idx<0){ setStatus('h-status',`<span class=&quot;r&quot;>${key} not found</span> — nothing to delete`); busy.hash=false; return; }
  const node=hbuckets[i][idx]; const el=$('hn-'+node.id);
  if(el){ el.classList.add('leaving'); await sleep(240); }

/* ══════════════════════════════════════════

   ══════════════════════════════════════════ */
let sll=[];
function llRender(stageId,list,statusId,dbl){
  const st=$(stageId); st.innerHTML='';
  const head=document.createElement('span'); head.className='ptr-label'; head.textContent='head'; st.appendChild(head);
  const ha=document.createElement('span'); ha.className='arrow'; ha.textContent='→'; st.appendChild(ha);
  if(!list.length){ const e=document.createElement('span'); e.className='null-cap'; e.textContent='∅ (empty)'; st.appendChild(e); }
  list.forEach((n,i)=>{
    if(dbl &amp;&amp; i>0){ const pa=document.createElement('span'); pa.className='arrow'; pa.textContent='⇄'; st.appendChild(pa); }
    const c=document.createElement('div'); c.className='node'; c.dataset.key=n.id; c.id='lln-'+n.id; c.style.minWidth='50px';
    c.innerHTML=`<span class=&quot;v&quot;>${n.val}</span>`;
    st.appendChild(c);
    if(!dbl){ const a=document.createElement('span'); a.className='arrow'; a.textContent='→'; st.appendChild(a); }
  });
  if(list.length &amp;&amp; !dbl){ const nl=document.createElement('span'); nl.className='null-cap'; nl.textContent='⌀ null'; st.appendChild(nl); }
  if(list.length &amp;&amp; dbl){ const nl=document.createElement('span'); nl.className='null-cap'; nl.textContent='null'; st.appendChild(nl); }
  setStatus(statusId,`length <b>${list.length}</b>`);
}
function llMutate(stageId,fn,list,statusId,dbl){ const st=$(stageId); flipCapture(st); fn(); llRender(stageId,list,statusId,dbl); flipPlay(st); }
async function llSearch(stageId,list,statusId,val,vname){
  if(busy[vname]) return; busy[vname]=true;
  let found=false;
  for(const n of list){ const el=$('lln-'+n.id); if(el) el.classList.add('cmp'); await sleep(430);
    if(n.val===val){ if(el){el.classList.remove('cmp');el.classList.add('hit');} found=true; break; } if(el) el.classList.remove('cmp'); }
  setStatus(statusId, found?`found <span class=&quot;k&quot;>${val}</span> ✔ (walked from head)`:`<span class=&quot;r&quot;>${val} not found</span> after full traversal`);
  await sleep(950); llRender(stageId,list,statusId, vname==='dll'); busy[vname]=false;
}

/* ══════════════════════════════════════════
   BINARY SEARCH TREE
   ══════════════════════════════════════════ */
let broot=null;
function bnode(val){ return {val, left:null, right:null, id:uid()}; }
function bLayout(){
  // assign x by in-order index, y by depth
  let i=0; const gapX=58, gapY=68, padX=40, padY=36;
  (function walk(n,depth){ if(!n) return; walk(n.left,depth+1); n._x=padX+i*gapX; n._y=padY+depth*gapY; i++; walk(n.right,depth+1); })(broot,0);
  return {width:padX*2+Math.max(i,1)*gapX, depth:i};
}
function bRender(){
  const dim=bLayout();
  const st=$('b-stage'); const edges=$('b-edges');
  st.style.minWidth=dim.width+'px';
  // remove old nodes (keep svg)
  st.querySelectorAll('.bnode').forEach(n=>n.remove());
  edges.innerHTML='';
  (function walk(n){ if(!n) return;
    ['left','right'].forEach(side=>{ if(n[side]){ const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',n._x); line.setAttribute('y1',n._y); line.setAttribute('x2',n[side]._x); line.setAttribute('y2',n[side]._y);
      line.setAttribute('stroke','rgba(124,140,163,.4)'); line.setAttribute('stroke-width','1.4'); edges.appendChild(line); } });
    walk(n.left); walk(n.right);
  })(broot);
  (function walk(n){ if(!n) return;
    const el=document.createElement('div'); el.className='bnode'; el.id='bn-'+n.id; el.dataset.key=n.id;
    el.style.left=n._x+'px'; el.style.top=n._y+'px'; el.textContent=n.val; st.appendChild(el);
    walk(n.left); walk(n.right);
  })(broot);
  let cnt=0; (function c(n){ if(!n)return; cnt++; c(n.left); c(n.right); })(broot);
  setStatus('b-status',`nodes <b>${cnt}</b>`);
}
async function bInsert(val){
  if(busy.bst) return; busy.bst=true;
  if(broot===null){ broot=bnode(val); bRender(); const el=$('bn-'+broot.id); if(el)el.classList.add('fresh'); setStatus('b-status',`inserted <span class=&quot;g&quot;>${val}</span> as root`); busy.bst=false; return; }
  let cur=broot, path=[];
  while(true){ path.push(cur); const el=$('bn-'+cur.id); if(el)el.classList.add('cmp'); await sleep(480);
    if(val===cur.val){ if(el){el.classList.remove('cmp');el.classList.add('hit');} setStatus('b-status',`<span class=&quot;a&quot;>${val} already present</span>`); await sleep(700); path.forEach(p=>{const e=$('bn-'+p.id);if(e)e.classList.remove('cmp','hit');}); busy.bst=false; return; }
    if(val<cur.val){ if(el)el.classList.remove('cmp'); if(cur.left){ if(el)el.classList.add('cmp'); cur=cur.left; } else { cur.left=bnode(val); break; } }
    else { if(el)el.classList.remove('cmp'); if(cur.right){ if(el)el.classList.add('cmp'); cur=cur.right; } else { cur.right=bnode(val); break; } }
  }
  path.forEach(p=>{const e=$('bn-'+p.id);if(e)e.classList.remove('cmp');});
  const added = (val<cur.val)?cur.left:cur.right;
  bRender(); const ne=$('bn-'+added.id); if(ne)ne.classList.add('fresh');
  setStatus('b-status',`inserted <span class=&quot;g&quot;>${val}</span> (followed ${path.length} comparison${path.length>1?'s':''})`);
  busy.bst=false;
}
async function bSearch(val){
  if(busy.bst) return; busy.bst=true;
  let cur=broot;
  while(cur){ const el=$('bn-'+cur.id); if(el)el.classList.add('cmp'); await sleep(500);
    if(val===cur.val){ if(el){el.classList.remove('cmp');el.classList.add('hit');} setStatus('b-status',`found <span class=&quot;k&quot;>${val}</span> ✔`); await sleep(1000); bRender(); busy.bst=false; return; }
    if(el)el.classList.remove('cmp'); cur = val<cur.val?cur.left:cur.right;
  }
  setStatus('b-status',`<span class=&quot;r&quot;>${val} not found</span>`); busy.bst=false;
}
async function bInorder(){
  if(busy.bst) return; busy.bst=true; const order=[];
  (function w(n){ if(!n)return; w(n.left); order.push(n); w(n.right); })(broot);
  const vals=[];
  for(const n of order){ const el=$('bn-'+n.id); if(el)el.classList.add('hit'); vals.push(n.val);
    setStatus('b-status',`in-order: <span class=&quot;k&quot;>${vals.join(' · ')}</span>`); await sleep(430); if(el)el.classList.remove('hit'); }
  setStatus('b-status',`in-order traversal (sorted): <span class=&quot;g&quot;>${vals.join(' · ')}</span>`); busy.bst=false;
}
INIT_bst=function(){
  broot=null; [42,25,63,12,30,55,80,7].forEach(v=>{ (function ins(val){ if(!broot){broot=bnode(val);return;} let c=broot; while(true){ if(val<c.val){ if(c.left)c=c.left; else {c.left=bnode(val);return;} } else if(val>c.val){ if(c.right)c=c.right; else {c.right=bnode(val);return;} } else return; } })(v); });
  bRender();
  const v=()=>parseInt($('b-val').value);
  $('b-ins').onclick=()=>{ const x=v(); if(!isNaN(x)) bInsert(x); };
  $('b-find').onclick=()=>{ const x=v(); if(!isNaN(x)) bSearch(x); };
  $('b-inorder').onclick=bInorder;
  $('b-clear').onclick=()=>{ if(busy.bst)return; broot=null; bRender(); };
  $('b-rand').onclick=()=>{ if(busy.bst)return; broot=null; const used=new Set(); while(used.size<8){ used.add(rnd(99)); } [...used].forEach(v=>{ (function ins(val){ if(!broot){broot=bnode(val);return;} let c=broot; while(true){ if(val<c.val){ if(c.left)c=c.left; else {c.left=bnode(val);return;} } else if(val>c.val){ if(c.right)c=c.right; else {c.right=bnode(val);return;} } else return; } })(v); }); bRender(); };
};
