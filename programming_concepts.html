<script>
var diag=document.getElementById('diag');
var dsvg=document.getElementById('dsvg');
var cvb=document.getElementById('cvb');
var cvh=document.getElementById('cvh');
var sl=document.getElementById('sl');
var board=document.getElementById('board');
var bn=document.getElementById('bn');
var stage=0,busy=false;
function log(m){sl.textContent=m;}

function addLane(x1,y1,x2,y2,col){
  var l=document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2);
  l.setAttribute('stroke',col||'#334155');l.setAttribute('stroke-width','1');
  l.setAttribute('stroke-dasharray','4,3');l.setAttribute('opacity','0.3');
  dsvg.appendChild(l);
}

function animPkt(x1,y1,x2,y2,col,dur,cb){
  var p=document.createElement('div');
  p.style.cssText='position:absolute;width:12px;height:12px;border-radius:50%;background:'+col+';left:'+(x1-6)+'px;top:'+(y1-6)+'px;z-index:20;pointer-events:none;box-shadow:0 0 8px '+col+';';
  diag.appendChild(p);
  var s=null;
  function step(ts){
    if(!s)s=ts;
    var t=Math.min((ts-s)/dur,1);
    var e=t<.5?2*t*t:1-2*(1-t)*(1-t);
    p.style.left=((x1+(x2-x1)*e)-6)+'px';
    p.style.top=((y1+(y2-y1)*e)-6)+'px';
    if(t<1)requestAnimationFrame(step);
    else{p.remove();if(cb)cb();}
  }
  requestAnimationFrame(step);
}

function showBadge(id){document.getElementById(id).classList.add('show');}
function hideBadge(id){document.getElementById(id).classList.remove('show');}

function cvLine(html,delay){
  setTimeout(function(){
    var d=document.createElement('div');d.innerHTML=html;
    cvb.appendChild(d);cvb.scrollTop=cvb.scrollHeight;
  },delay||0);
}

function addNote(id,text,col,tag){
  var c=document.createElement('div');
  c.className='ncard';c.id='nc-'+id;
  c.style.borderLeftColor=col;
  c.innerHTML='<span class=&quot;nid&quot;>#'+id+'</span><span class=&quot;ntxt&quot;>'+text+'</span><span class=&quot;ntag&quot; style=&quot;background:'+col+'22;color:'+col+'&quot;>'+tag+'</span>';
  bn.appendChild(c);
  setTimeout(function(){c.classList.add('show');},30);
}
function updateNote(id,text,col){
  var c=document.getElementById('nc-'+id);
  if(!c)return;
  c.querySelector('.ntxt').textContent=text;
  c.style.borderLeftColor=col;
  c.style.background='#1e293b';
  var old=c.style.background;
  c.style.transition='background .1s';
  c.style.background=col+'22';
  setTimeout(function(){c.style.transition='background .8s';c.style.background='#1e293b';},100);
}
function deleteNote(id){
  var c=document.getElementById('nc-'+id);
  if(!c)return;
  c.style.opacity='0';c.style.transform='translateX(30px)';
  setTimeout(function(){c.remove();},520);
}

// Layout coords: browser right=134, DNS left=232, server left=460
var BRE=134,DNSL=232,SRVE=460,FY=90,RY=105;

// ── Stage 1: DNS + HTTPS ──────────────────────────────────────
function stageHTTPS(cb){
  if(busy||stage>=1)return;busy=true;

  // inject pulse animation once
  if(!document.getElementById('_bpulse')){
    var _st=document.createElement('style');_st.id='_bpulse';
    _st.textContent='@keyframes _bp{0%,100%{box-shadow:0 0 10px #06b6d488}50%{box-shadow:0 0 22px #06b6d4,0 0 6px #fff4}}';
    document.head.appendChild(_st);
  }

  addLane(BRE,FY,DNSL,FY,'#eab308');
  addLane(DNSL,RY,BRE,RY,'#eab308');

  function showBtn(label,fn){
    var w=document.createElement('div');
    w.style.cssText='margin-top:12px;padding-top:8px;border-top:1px solid #1e2130;text-align:center;';
    var b=document.createElement('button');
    b.textContent='▶ '+label;
    b.style.cssText='padding:8px 20px;background:#06b6d4;color:#000;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:800;letter-spacing:.5px;animation:_bp 1.2s infinite;';
    b.onmouseenter=function(){this.style.background='#38bdf8';};
    b.onmouseleave=function(){this.style.background='#06b6d4';};
    b.onclick=function(){w.remove();fn();};
    w.appendChild(b);
    cvb.appendChild(w);
    setTimeout(function(){cvb.scrollTop=cvb.scrollHeight;},50);
  }

  // ── PHASE A: DNS ────────────────────────────────────────────
  function phaseA(){
    cvh.textContent='Phase 1 of 3 — DNS Lookup';cvb.innerHTML='';
    cvLine('<span class=&quot;hs&quot;>// ── What are we requesting? ────────────────────────</span>',0);
    cvLine('<span class=&quot;hv&quot;>  https://api.github.com/users/vivek</span>',400);
    cvLine('',800);
    cvLine('<span class=&quot;hs&quot;>// Break it down:</span>',900);
    cvLine('<span class=&quot;hm&quot;>  https</span>       <span class=&quot;hs&quot;>← protocol  (S = Secure, encrypted)</span>',1200);
    cvLine('<span class=&quot;hm&quot;>  api.github.com</span>  <span class=&quot;hs&quot;>← domain    (GitHub\u2019s public API server)</span>',1700);
    cvLine('<span class=&quot;hm&quot;>  /users/vivek</span>    <span class=&quot;hs&quot;>← path      (fetch profile for user &quot;vivek&quot;)</span>',2200);
    cvLine('',2700);
    cvLine('<span class=&quot;hs&quot;>// Expected final output (JSON):</span>',2800);
    cvLine('<span class=&quot;jb&quot;>{</span>',3100);
    cvLine('<span class=&quot;hh&quot;>  &quot;login&quot;:</span>        <span class=&quot;jn&quot;>&quot;vivek&quot;</span><span class=&quot;hs&quot;>,</span>',3400);
    cvLine('<span class=&quot;hh&quot;>  &quot;name&quot;:</span>         <span class=&quot;jn&quot;>&quot;Vivek Salwaru&quot;</span><span class=&quot;hs&quot;>,</span>',3700);
    cvLine('<span class=&quot;hh&quot;>  &quot;public_repos&quot;:</span> <span class=&quot;jn&quot;>42</span><span class=&quot;hs&quot;>,   ← we will receive this at the end!</span>',4000);
    cvLine('<span class=&quot;hh&quot;>  &quot;followers&quot;:</span>    <span class=&quot;jn&quot;>18</span>',4300);
    cvLine('<span class=&quot;jb&quot;>}</span>',4600);
    cvLine('',5000);
    cvLine('<span class=&quot;hs&quot;>// But first — the browser must find the IP of api.github.com.</span>',5100);
    cvLine('<span class=&quot;hs&quot;>// It asks a DNS (Domain Name System) server to translate the name...</span>',5600);
    log('DNS: browser needs an IP address — domain names are human-friendly aliases');

    setTimeout(function(){
      cvLine('',0);
      cvLine('<span class=&quot;hh&quot;>DNS Query  →</span>  <span class=&quot;hv&quot;>What is the IP of api.github.com?</span>',0);
      log('DNS query packet flying to the resolver...');
      setTimeout(function(){
        animPkt(BRE,FY,DNSL,FY,'#eab308',750,function(){
          setTimeout(function(){
            cvLine('<span class=&quot;hs&quot;>// DNS searches its distributed database...</span>',0);
            setTimeout(function(){
              cvLine('<span class=&quot;hh&quot;>DNS Reply   ←</span>  <span class=&quot;jn&quot;>140.82.114.5</span>  <span class=&quot;hs&quot;>← GitHub IP address</span>',0);
              log('DNS reply incoming — carrying the IP address back to browser');
              setTimeout(function(){
                animPkt(DNSL,RY,BRE,RY,'#eab308',750,function(){
                  showBadge('ip-badge');
                  cvLine('',0);
                  cvLine('<span class=&quot;hs&quot;>// DNS lookup complete. Browser now knows WHERE to connect.</span>',200);
                  log('Resolved!  api.github.com = 140.82.114.5  ← browser saves this for 60s');
                  setTimeout(function(){
                    showBtn('Continue to Phase 2 → TLS Handshake',phaseB);
                  },800);
                });
              },500);
            },900);
          },600);
        });
      },400);
    },6800);
  }

  // ── PHASE B: TLS ─────────────────────────────────────────
  function phaseB(){
    addLane(BRE,FY,SRVE,FY,'#06b6d4');
    addLane(SRVE,RY,BRE,RY,'#22c55e');
    cvh.textContent='Phase 2 of 3 — TLS Handshake (the S in HTTPS)';cvb.innerHTML='';
    cvLine('<span class=&quot;hs&quot;>// Browser connects to 140.82.114.5 but uses HTTPS.</span>',0);
    cvLine('<span class=&quot;hs&quot;>// &quot;S&quot; = Secure = the data is ENCRYPTED in transit.</span>',500);
    cvLine('',1000);
    cvLine('<span class=&quot;hs&quot;>// Before any real data flows, both sides do a</span>',1050);
    cvLine('<span class=&quot;hs&quot;>// TLS Handshake — agreeing on HOW to encrypt.</span>',1500);
    log('TLS handshake: browser and server agree on an encryption method');

    setTimeout(function(){
      cvLine('',0);
      cvLine('<span class=&quot;hh&quot;>Client Hello →</span>  <span class=&quot;hs&quot;>cipher suites I support + random bytes</span>',200);
      setTimeout(function(){
        animPkt(BRE,FY,SRVE,FY,'#a78bfa',780,function(){
          setTimeout(function(){
            cvLine('<span class=&quot;hh&quot;>Server Hello ←</span>  <span class=&quot;hs&quot;>chosen cipher + TLS certificate</span>',0);
            log('Server proved its identity with a certificate — like showing an ID card');
            setTimeout(function(){
              animPkt(SRVE,RY,BRE,RY,'#a78bfa',780,function(){
                showBadge('tls-badge');
                cvLine('',0);
                cvLine('<span class=&quot;hs&quot;>// Shared secret key derived (Diffie-Hellman math).</span>',300);
                cvLine('<span class=&quot;hs&quot;>// Channel is now ENCRYPTED end-to-end.</span>',750);
                cvLine('<span class=&quot;hs&quot;>// Even if someone intercepts every packet,</span>',1200);
                cvLine('<span class=&quot;hs&quot;>// all they see is random-looking gibberish.</span>',1650);
                log('Encrypted! Nobody between browser and server can read the traffic now');
                setTimeout(function(){
                  showBtn('Continue to Phase 3 → HTTP Request &amp; Response',phaseC);
                },2000);
              });
            },600);
          },900);
        });
      },600);
    },1800);
  }

  // ── PHASE C: HTTP ────────────────────────────────────
  function phaseC(){
    cvh.textContent='Phase 3 of 3 — HTTP GET Request &amp; Response';cvb.innerHTML='';
    cvLine('<span class=&quot;hs&quot;>// NOW we send the actual HTTP request</span>',0);
    cvLine('<span class=&quot;hs&quot;>// — safely inside the encrypted TLS tunnel.</span>',450);
    cvLine('',900);
    cvLine('<span class=&quot;hm&quot;>GET</span> <span class=&quot;hv&quot;>/users/vivek</span> <span class=&quot;hs&quot;>HTTP/1.1</span>',1000);
    cvLine('<span class=&quot;hh&quot;>Host:</span><span class=&quot;hv&quot;> api.github.com</span><span class=&quot;hs&quot;>       ← which site (many share one IP)</span>',1500);
    cvLine('<span class=&quot;hh&quot;>Accept:</span><span class=&quot;hv&quot;> application/json</span><span class=&quot;hs&quot;>  ← &quot;please reply with JSON&quot;</span>',2000);
    cvLine('<span class=&quot;hh&quot;>Authorization:</span><span class=&quot;hv&quot;> Bearer ghp_xxx</span><span class=&quot;hs&quot;>  ← your API key</span>',2500);
    log('Sending HTTP GET — inside encrypted tunnel — server cannot be impersonated');

    setTimeout(function(){
      animPkt(BRE,FY,SRVE,FY,'#06b6d4',750,function(){
        log('Server received request — looking up user &quot;vivek&quot; in its database...');
        showBtn('Continue → See Server Response',function(){
          cvb.innerHTML='';
          cvLine('<span class=&quot;hs&quot;>// Server found the data. Sending response...</span>',0);
          cvLine('',450);
          cvLine('<span class=&quot;hv&quot;>HTTP/1.1 200 OK</span><span class=&quot;hs&quot;>               ← 200 means success</span>',500);
          cvLine('<span class=&quot;hh&quot;>Content-Type:</span><span class=&quot;hv&quot;> application/json</span><span class=&quot;hs&quot;> ← body will be JSON</span>',950);
          cvLine('<span class=&quot;hh&quot;>Cache-Control:</span><span class=&quot;hv&quot;> max-age=60</span><span class=&quot;hs&quot;>      ← browser can cache for 60s</span>',1400);
          cvLine('',1850);
          cvLine('<span class=&quot;hs&quot;>// ── Response Body (JSON) ──────────────────────────</span>',1900);
          cvLine('<span class=&quot;jb&quot;>{</span>',2200);
          cvLine('<span class=&quot;hh&quot;>  &quot;login&quot;:</span>       <span class=&quot;jn&quot;>&quot;vivek&quot;</span><span class=&quot;hs&quot;>,      ← GitHub username</span>',2550);
          cvLine('<span class=&quot;hh&quot;>  &quot;id&quot;:</span>          <span class=&quot;jn&quot;>583231</span><span class=&quot;hs&quot;>,       ← unique numeric ID in GitHub\u2019s DB</span>',2950);
          cvLine('<span class=&quot;hh&quot;>  &quot;name&quot;:</span>        <span class=&quot;jn&quot;>&quot;Vivek Salwaru&quot;</span><span class=&quot;hs&quot;>, ← display name on profile</span>',3350);
          cvLine('<span class=&quot;hh&quot;>  &quot;public_repos&quot;:</span><span class=&quot;jn&quot;> 42</span><span class=&quot;hs&quot;>,          ← total public repositories</span>',3750);
          cvLine('<span class=&quot;hh&quot;>  &quot;followers&quot;:</span>   <span class=&quot;jn&quot;> 18</span><span class=&quot;hs&quot;>,          ← people following this account</span>',4150);
          cvLine('<span class=&quot;hh&quot;>  &quot;created_at&quot;:</span>  <span class=&quot;jn&quot;>&quot;2015-04-12T09:13:19Z&quot;</span><span class=&quot;hs&quot;> ← ISO 8601 timestamp</span>',4550);
          cvLine('<span class=&quot;jb&quot;>}</span>',4850);
          log('200 OK — JSON body received. Each key is a field from GitHub\u2019s user database.');
          setTimeout(function(){
            animPkt(SRVE,RY,BRE,RY,'#22c55e',750,function(){
              stage=1;busy=false;
              document.getElementById('b2').disabled=false;
              document.getElementById('b2').style.opacity='1';
              log('Done! DNS → TLS encryption → HTTP request → 200 OK response. Now read the JSON body in Stage 2.');
              if(cb)cb();
            });
          },5200);
        });
      });
    },2900);
  }

  phaseA();
}

// ── Stage 2: JSON Format ─────────────────────────────────────
function stageJSON(cb){
  if(busy||stage>=2)return;busy=true;

    ['  <span class=&quot;jk&quot;>&quot;address&quot;</span>:      <span class=&quot;jp&quot;>{</span> <span class=&quot;jk&quot;>&quot;city&quot;</span><span class=&quot;jp&quot;>:</span> <span class=&quot;js&quot;>&quot;Mumbai&quot;</span> <span class=&quot;jp&quot;>}</span>  <span class=&quot;hs&quot;>← nested object</span>',1440],

// ── Stage 3: REST CRUD ───────────────────────────────────────
function stageREST(cb){
  if(busy||stage>=3)return;busy=true;
  board.classList.add('open');
  document.getElementById('srv-label').textContent='Notes API';
  document.getElementById('srv-sub').textContent='GET / POST / PUT / DELETE';

  function showBtn(label,fn){
    var w=document.createElement('div');
    w.style.cssText='margin-top:12px;padding-top:8px;border-top:1px solid #1e2130;text-align:center;';
    var b=document.createElement('button');
    b.textContent='▶ '+label;
    b.style.cssText='padding:8px 20px;background:#06b6d4;color:#000;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:800;letter-spacing:.5px;box-shadow:0 0 14px #06b6d488;';
    b.onmouseenter=function(){this.style.background='#38bdf8';};
    b.onmouseleave=function(){this.style.background='#06b6d4';};
    b.onclick=function(){w.remove();fn();};
    w.appendChild(b);
    cvb.appendChild(w);
    setTimeout(function(){cvb.scrollTop=cvb.scrollHeight;},50);
  }

  function op(method,path,reqLines,respLines,pktCol,noteFn,pauseLabel,next,reqPauseLabel){
    cvh.textContent=method+' '+path;cvb.innerHTML='';
    reqLines.forEach(function(l,i){cvLine(l,i*180);});
    setTimeout(function(){
      log(method+' '+path+' — request flying to server…');
      animPkt(BRE,FY,SRVE,FY,pktCol,500,function(){
        function showResponse(){
          setTimeout(function(){
            cvb.innerHTML='';
            respLines.forEach(function(l,i){cvLine(l,i*180);});
            animPkt(SRVE,RY,BRE,RY,pktCol,500,function(){
              setTimeout(function(){
                if(noteFn)noteFn();
                setTimeout(function(){
                  if(pauseLabel) showBtn(pauseLabel,next);
                  else next();
                },500);
              },400);
            });
          },400);
        }
        if(reqPauseLabel) showBtn(reqPauseLabel,showResponse);
        else showResponse();
      });
    },reqLines.length*180+250);
  }

  // ── Op 1: GET — read all notes ───────────────────────────
  function opGET(){
    cvLine('<span class=&quot;hs&quot;>// GET: Read all existing notes from the server</span>',0);
    cvLine('<span class=&quot;hs&quot;>// No body needed — just ask and the server sends everything</span>',350);
    cvLine('',700);
    setTimeout(function(){
      op('GET','/notes',
        ['<span class=&quot;hm&quot;>GET</span> <span class=&quot;hv&quot;>/notes</span> <span class=&quot;hs&quot;>HTTP/1.1</span>',
         '<span class=&quot;hh&quot;>Authorization:</span><span class=&quot;hv&quot;> Bearer token_abc</span>',
         '<span class=&quot;hs&quot;>// ← no request body, just fetch all notes</span>'],
        ['<span class=&quot;hv&quot;>HTTP/1.1 200 OK</span>  <span class=&quot;hs&quot;>← success, data follows</span>',
         '<span class=&quot;jp&quot;>[</span>',
         '  <span class=&quot;jp&quot;>{</span> <span class=&quot;jk&quot;>&quot;id&quot;</span>:<span class=&quot;jn&quot;>1</span>, <span class=&quot;jk&quot;>&quot;text&quot;</span>:<span class=&quot;js&quot;>&quot;Buy groceries&quot;</span> <span class=&quot;jp&quot;>}</span><span class=&quot;jp&quot;>,</span>',
         '  <span class=&quot;jp&quot;>{</span> <span class=&quot;jk&quot;>&quot;id&quot;</span>:<span class=&quot;jn&quot;>2</span>, <span class=&quot;jk&quot;>&quot;text&quot;</span>:<span class=&quot;js&quot;>&quot;Call dentist&quot;</span> <span class=&quot;jp&quot;>}</span>',
         '<span class=&quot;jp&quot;>]</span>  <span class=&quot;hs&quot;>// ← array of 2 notes returned</span>'],
        '#22c55e',
        function(){
          addNote(1,'Buy groceries','#22c55e','GET');
          addNote(2,'Call dentist','#22c55e','GET');
          log('GET /notes → 200 OK  ·  2 notes loaded on the board');
        },
        'Continue → POST: Create a new note',
        opPOST,
        'Continue → See GET Response'
      );
    },900);
  }

  // ── Op 2: POST — create a new note ───────────────────────
  function opPOST(){
    cvh.textContent='POST /notes';cvb.innerHTML='';
    cvLine('<span class=&quot;hs&quot;>// POST: Create something NEW on the server</span>',0);
    cvLine('<span class=&quot;hs&quot;>// Send data in the request body — server saves &amp; replies with new ID</span>',350);
    cvLine('',700);
    setTimeout(function(){
      op('POST','/notes',
        ['<span class=&quot;hm&quot;>POST</span> <span class=&quot;hv&quot;>/notes</span> <span class=&quot;hs&quot;>HTTP/1.1</span>',
         '<span class=&quot;hh&quot;>Content-Type:</span><span class=&quot;hv&quot;> application/json</span>  <span class=&quot;hs&quot;>← body is JSON</span>',
         '',
         '<span class=&quot;jp&quot;>{</span> <span class=&quot;jk&quot;>&quot;text&quot;</span>: <span class=&quot;js&quot;>&quot;Learn REST APIs&quot;</span> <span class=&quot;jp&quot;>}</span>  <span class=&quot;hs&quot;>← new note data</span>'],
        ['<span class=&quot;hv&quot;>HTTP/1.1 201 Created</span>  <span class=&quot;hs&quot;>← 201 = new resource created</span>',
         '<span class=&quot;jp&quot;>{</span> <span class=&quot;jk&quot;>&quot;id&quot;</span>:<span class=&quot;jn&quot;>3</span>, <span class=&quot;jk&quot;>&quot;text&quot;</span>:<span class=&quot;js&quot;>&quot;Learn REST APIs&quot;</span> <span class=&quot;jp&quot;>}</span>',
         '<span class=&quot;hs&quot;>// ← server assigned ID=3, echoes the saved object</span>'],
        '#818cf8',
        function(){
          addNote(3,'Learn REST APIs','#818cf8','POST');
          log('POST /notes → 201 Created  ·  note #3 added to board');
        },
        'Continue → PUT: Update the note',
        opPUT,
        'Continue → See POST Response'

    },900);
  }

  // ── Op 3: PUT — update existing note ─────────────────────
  function opPUT(){
    cvh.textContent='PUT /notes/3';cvb.innerHTML='';

    setTimeout(function(){

        ['<span class=&quot;hm&quot;>PUT</span> <span class=&quot;hv&quot;>/notes/3</span> <span class=&quot;hs&quot;>HTTP/1.1</span>  <span class=&quot;hs&quot;>← target ID=3</span>',
         '<span class=&quot;hh&quot;>Content-Type:</span><span class=&quot;hv&quot;> application/json</span>',
         '',
         '<span class=&quot;jp&quot;>{</span> <span class=&quot;jk&quot;>&quot;text&quot;</span>: <span class=&quot;js&quot;>&quot;Master REST APIs!&quot;</span> <span class=&quot;jp&quot;>}</span>  <span class=&quot;hs&quot;>← updated text</span>'],
        ['<span class=&quot;hv&quot;>HTTP/1.1 200 OK</span>  <span class=&quot;hs&quot;>← 200 = updated successfully</span>',
         '<span class=&quot;jp&quot;>{</span> <span class=&quot;jk&quot;>&quot;id&quot;</span>:<span class=&quot;jn&quot;>3</span>, <span class=&quot;jk&quot;>&quot;text&quot;</span>:<span class=&quot;js&quot;>&quot;Master REST APIs!&quot;</span> <span class=&quot;jp&quot;>}</span>',
         '<span class=&quot;hs&quot;>// ← server returns the updated object</span>'],
        '#fb923c',
        function(){
          updateNote(3,'Master REST APIs!','#fb923c');
          log('PUT /notes/3 → 200 OK  ·  note #3 updated on board');
        },
        'Continue → DELETE: Remove a note',
        opDELETE,
        'Continue → See PUT Response'
      );
    },900);
  }

  // ── Op 4: DELETE — remove a note ─────────────────────────
  function opDELETE(){
    cvh.textContent='DELETE /notes/1';cvb.innerHTML='';
    cvLine('<span class=&quot;hs&quot;>// DELETE: Remove a resource permanently</span>',0);
    cvLine('<span class=&quot;hs&quot;>// Server returns 204 No Content — nothing to send back, it’s gone!</span>',350);
    cvLine('',700);
    setTimeout(function(){
      op('DELETE','/notes/1',
        ['<span class=&quot;hm&quot;>DELETE</span> <span class=&quot;hv&quot;>/notes/1</span> <span class=&quot;hs&quot;>HTTP/1.1</span>  <span class=&quot;hs&quot;>← remove ID=1</span>',
         '<span class=&quot;hs&quot;>// no body needed — just the method + ID is enough</span>'],
        ['<span class=&quot;hv&quot;>HTTP/1.1 204 No Content</span>  <span class=&quot;hs&quot;>← success, nothing returned</span>',
         '<span class=&quot;hs&quot;>// 204 = &quot;I did it, but there is nothing to show you&quot;</span>',
         '<span class=&quot;hs&quot;>// resource is permanently deleted from the server</span>'],
        '#ef4444',
        function(){
          deleteNote(1);
          log('DELETE /notes/1 → 204 No Content  ·  note #1 removed from board');
        },
        null,
        function(){
          setTimeout(function(){
            stage=3;busy=false;
            log('REST complete! GET=read · POST=create · PUT=update · DELETE=remove');
            if(cb)cb();
          },800);
        },
        'Continue → See DELETE Response'
      );
    },900);
  }

  opGET();
}

// keyword spans

// ── Stage 4: Transaction ─────────────────────────────────────
function stageTxn(cb){
  if(busy||stage>=4)return;busy=true;
  cvh.textContent='Stage 4 — Transaction (All or Nothing)';cvb.innerHTML='';diag.innerHTML='';

  var lbl=document.createElement('div');
  lbl.style.cssText='font-size:10px;color:#64748b;text-align:center;margin-bottom:6px;';
  lbl.textContent='🏦 Bank Transfer: Send ₹500 from Vivek to Priya';
  diag.appendChild(lbl);

  var ar=document.createElement('div');ar.style.cssText='display:flex;gap:8px;';
  ar.innerHTML=
    '<div class=&quot;acc&quot; id=&quot;acc-v&quot;><div class=&quot;an&quot;>👤 Vivek</div><div class=&quot;ab&quot; id=&quot;bv&quot;>₹1,500</div><div class=&quot;as&quot;>Sender</div></div>'+
    '<div class=&quot;acc&quot; id=&quot;acc-p&quot;><div class=&quot;an&quot;>👤 Priya</div><div class=&quot;ab&quot; id=&quot;bp&quot;>₹500</div><div class=&quot;as&quot;>Receiver</div></div>';
  diag.appendChild(ar);

  var stepBox=document.createElement('div');stepBox.id='sbox';stepBox.style.cssText='margin-top:8px;';
  diag.appendChild(stepBox);

  function addStep(txt,col){
    var d=document.createElement('div');
    d.style.cssText='font-size:10px;padding:3px 7px;border-left:2px solid '+col+';color:'+col+';margin:2px 0;opacity:0;transition:opacity .3s;';
    d.textContent=txt;stepBox.appendChild(d);
    setTimeout(function(){d.style.opacity='1';},30);
  }

  cvLine(cm('// TRANSACTION: a group of steps that must ALL succeed'),0);
  cvLine(cm('// If any step fails — ALL steps are undone (rollback)'),450);
  cvLine(cm('// Bank transfer: debit Vivek AND credit Priya must both happen'),900);
  cvLine('',1300);
  cvLine(kw('BEGIN TRANSACTION')+cm(';  -- start the transaction'),1400);
  log('Transaction started — nothing saved to disk yet');

  setTimeout(function(){
    addStep('✔ BEGIN TRANSACTION','#f59e0b');
    showBtn('Continue → Debit Vivek ₹500',function(){
      cvLine(kw('UPDATE ')+tb('accounts')+' '+kw('SET')+' '+cl('balance')+' = '+cl('balance')+' - '+vl('500'),0);
      cvLine(kw('WHERE ')+cl('id')+' = '+vl('1')+cm(';  -- debit Vivek'),300);
      setTimeout(function(){
        document.getElementById('bv').textContent='₹1,000';
        document.getElementById('bv').style.color='#ef4444';
        document.getElementById('acc-v').classList.add('adbt');
        addStep('— Vivek: ₹1,500 → ₹1,000  (pending...)', '#ef4444');
        log('Vivek debited ₹500 — NOT saved yet, can still rollback');
        setTimeout(function(){
          showBtn('Continue → Credit Priya ₹500',function(){
            cvLine(kw('UPDATE ')+tb('accounts')+' '+kw('SET')+' '+cl('balance')+' = '+cl('balance')+' + '+vl('500'),0);
            cvLine(kw('WHERE ')+cl('id')+' = '+vl('2')+cm(';  -- credit Priya'),300);
            setTimeout(function(){
              document.getElementById('bp').textContent='₹1,000';
              document.getElementById('bp').style.color='#22c55e';
              document.getElementById('acc-p').classList.add('acrd');
              addStep('— Priya: ₹500 → ₹1,000  (pending...)', '#22c55e');
              log('Priya credited ₹500 — both changes still pending');
              setTimeout(function(){
                showBtn('Continue → COMMIT (save both)',function(){
                  cvLine(kw('COMMIT')+cm(';  -- save BOTH changes permanently'),0);
                  cvLine('',350);
                  cvLine(cm('// Both updates now permanent in the database'),400);
                  cvLine(cm('// Atomicity: either BOTH saved, or NEITHER'),800);
                  cvLine(cm('// Total money unchanged: ₹1,500 + ₹500 = ₹2,000'),1200);
                  setTimeout(function(){
                    addStep('✓ COMMIT — both changes saved!','#4ade80');
                    document.getElementById('bv').style.color='#e2e8f0';
                    document.getElementById('bp').style.color='#e2e8f0';
                    document.getElementById('acc-v').style.borderColor='#4ade80';
                    document.getElementById('acc-p').style.borderColor='#4ade80';
                    log('COMMIT! ₹500 transferred successfully. Total: ₹2,000 (unchanged)');
                    setTimeout(function(){stage=4;busy=false;if(cb)cb();},1000);
                  },500);
                });
              },700);
            },600);
          });
        },600);
      },600);
    });
  },1900);
}

// ── Stage 5: Index ───────────────────────────────────────────
function stageIndex(cb){
  if(busy||stage>=5)return;busy=true;
  cvh.textContent='Stage 5 — Index (Speed Up Queries)';cvb.innerHTML='';diag.innerHTML='';

  var DATA=[{id:1,name:'Vivek'},{id:2,name:'Priya'},{id:3,name:'Ravi'},{id:4,name:'Sneha'},
            {id:5,name:'Arjun'},{id:6,name:'Meera'},{id:7,name:'Kiran'},{id:8,name:'Divya'}];
  var TARGET=5;

  function buildRows(pid){
    var c=document.createElement('div');c.id=pid;
    DATA.forEach(function(r){
      var d=document.createElement('div');d.className='srow';d.id=pid+'-'+r.id;
      d.innerHTML='<span><b>id='+r.id+'</b></span><span>'+r.name+'</span>';
      c.appendChild(d);
    });
    return c;
  }

  var slow_lbl=document.createElement('div');
  slow_lbl.style.cssText='font-size:10px;color:#ef4444;margin-bottom:5px;font-weight:600;';
  slow_lbl.textContent='🐢 Without Index: scan every row';
  diag.appendChild(slow_lbl);
  diag.appendChild(buildRows('sc'));

  var fast_lbl=document.createElement('div');fast_lbl.id='fast_lbl';
  fast_lbl.style.cssText='font-size:10px;color:#22c55e;margin:8px 0 5px;font-weight:600;opacity:0;transition:opacity .5s;';
  fast_lbl.textContent='⚡ With Index: jump directly to row!';
  diag.appendChild(fast_lbl);
  var fastRows=buildRows('ix');fastRows.style.cssText='opacity:0;transition:opacity .3s;';
  diag.appendChild(fastRows);

  cvLine(cm('// Imagine 1 million users in the database...'),0);
  cvLine(cm('// Without an index: DB reads EVERY row to find id=5'),400);
  cvLine('',800);
  cvLine(kw('SELECT ')+vl('*')+kw(' FROM ')+tb('users')+kw(' WHERE ')+cl('id')+' = '+vl('5')+cm(';'),900);
  cvLine('',1300);
  cvLine(cm('// DB starts scanning from row 1, 2, 3, 4... until found'),1400);
  log('Running query without index on 8 rows...');

  setTimeout(function(){
    showBtn('Continue → Watch slow scan',function(){
      var delay=0;
      DATA.forEach(function(r,i){
        var isT=(r.id===TARGET);
        setTimeout(function(){
          var el=document.getElementById('sc-'+r.id);
          if(el)el.classList.add(isT?'sfd':'sac');
          if(i>0){var prev=document.getElementById('sc-'+DATA[i-1].id);if(prev&amp;&amp;!prev.classList.contains('sfd'))prev.classList.remove('sac');}
          if(isT){
            log('Found id=5 (Arjun) after scanning '+TARGET+' rows out of 8!');
            setTimeout(function(){
              showBtn('Continue → Create index &amp; try again',function(){
                cvb.innerHTML='';
                cvLine(cm('// CREATE INDEX: like a book index at the back'),0);
                cvLine(cm('// Sorted list of values with direct pointers to rows'),400);
                cvLine('',800);
                cvLine(kw('CREATE INDEX ')+tb('idx_user_id'),900);
                cvLine('  '+kw('ON ')+tb('users')+' ('+cl('id')+');',1100);
                cvLine('',1500);
                cvLine(cm('// Now the SAME query uses index instead of scanning:'),1600);
                cvLine(kw('SELECT ')+vl('*')+kw(' FROM ')+tb('users')+kw(' WHERE ')+cl('id')+' = '+vl('5')+cm(';'),2000);
                cvLine('<span class=&quot;ok&quot;>-- EXPLAIN: Index lookup → found in 1 step!</span>',2400);
                log('Index created on id column');
                setTimeout(function(){
                  var fl=document.getElementById('fast_lbl');if(fl)fl.style.opacity='1';
                  var fw=document.getElementById('ix');if(fw)fw.style.opacity='1';
                  setTimeout(function(){
                    var el=document.getElementById('ix-'+TARGET);if(el)el.classList.add('sfd');
                    log('Index jumped DIRECTLY to id=5 in 1 lookup! ⚡ vs 5 scans before');
                    setTimeout(function(){
                      cvLine('',0);
                      cvLine('<span class=&quot;ok&quot;>// Result found in 1 step — not 5 scans!</span>',200);
                      cvLine(cm('// For 1 million rows: index = 20 steps vs 1,000,000 scans'),600);
                      stage=5;busy=false;if(cb)cb();
                    },800);
                  },600);
                },2800);
              });
            },600);
          }
        },delay);
        delay+=(isT?0:220);
      });
    });
  },1900);
}

// ── Stage 1: Two-Server Full Stack Overview ──────────────────
function stageLayers(cb){

  // Two columns of layer boxes

  // Wire band spanning full width
  var wb=document.createElement('div');wb.id='wb';

    '<div style=&quot;position:relative;display:flex;justify-content:space-between;align-items:center;&quot;>'+
    '<span id=&quot;wlbl-a&quot; style=&quot;font-size:8px;color:#334155;transition:color .4s;&quot;>⚡ Wire (A)</span>'+
    '<span style=&quot;font-size:8px;color:#1e2130;&quot;>— — — — — —</span>'+
    '<span id=&quot;wlbl-b&quot; style=&quot;font-size:8px;color:#334155;transition:color .4s;&quot;>⚡ Wire (B)</span>'+
    '</div>';
  ov.appendChild(wb);

  // Status bar
  var sb=document.createElement('div');sb.id='sb';
  sb.style.cssText='font-size:11px;padding:7px 9px;background:#111318;border-radius:5px;color:#cbd5e1;border-left:3px solid #334155;transition:all .3s;min-height:34px;line-height:1.6;';
  sb.textContent='Click the button to watch data travel through the full TCP/IP stack';
  ov.appendChild(sb);

  diag.appendChild(ov);

  // ── Encapsulation / Decapsulation strip (persistent, sits below the Step button) ──
  if(!document.getElementById('_encs')){
    var es=document.createElement('style');es.id='_encs';
    es.textContent='.encseg{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid;border-radius:4px;margin-right:5px;padding:3px 9px;min-width:50px;transition:all .35s;}.encseg .h1{font-weight:700;font-size:9.5px;line-height:1.25;}.encseg .h2{font-size:8px;opacity:.85;line-height:1.25;}.enc-rem{opacity:.4;text-decoration:line-through;}.enc-pop{animation:encpop .5s ease;}@keyframes encpop{0%{transform:scale(.4);opacity:0;}60%{transform:scale(1.14);}100%{transform:scale(1);opacity:1;}}';
    document.head.appendChild(es);
  }
  var encStrip=document.getElementById('encStrip');
  if(!encStrip){
    encStrip=document.createElement('div');encStrip.id='encStrip';
    encStrip.style.cssText='flex-shrink:0;border-top:1px solid #1e2130;background:#080a10;padding:9px 14px;min-height:104px;';

  encStrip.innerHTML='<div style=&quot;font-size:9.5px;color:#475569;line-height:1.6;&quot;>&#128230; <b style=&quot;color:#94a3b8&quot;>Packet builder</b> &mdash; click each <b style=&quot;color:#f43f5e&quot;>Step</b> button above; watch headers get <span style=&quot;color:#f59e0b&quot;>added</span> going down Server A, then <span style=&quot;color:#22c55e&quot;>removed</span> going up Server B.</div>';

  function encBlk(col,bg,t1,t2,extra){
    return '<div class=&quot;encseg'+(extra||'')+'&quot; style=&quot;border-color:'+col+';background:'+bg+';color:'+col+';&quot;><div class=&quot;h1&quot;>'+t1+'</div><div class=&quot;h2&quot;>'+t2+'</div></div>';
  }
  function renderEncap(step){
    var enc=document.getElementById('encStrip');if(!enc)return;

    var I=encBlk(IPc,'#22c55e1f','IP hdr','src&rarr;dst');
    var dir,dcol,cap,blocks,bits='';
    if(step===1){dir='&#11015; ENCAPSULATION';dcol=DAT;cap='Application has 8 bytes ready &mdash; pure data, no headers yet.';blocks=encBlk(DAT,'#f59e0b1f','DATA','ABCDEFGH',' enc-pop');}
    else if(step===2){dir='&#11015; ENCAPSULATION';dcol=TCPc;cap='TCP <b>prepends its header</b> (ports + Seq#) &rarr; a TCP <b>segment</b>.';blocks=encBlk(TCPc,'#f43f5e1f','TCP hdr','port&middot;Seq',' enc-pop')+D;}
    else if(step===3){dir='&#11015; ENCAPSULATION';dcol=IPc;cap='IP <b>prepends its header</b> (src/dst IP) &rarr; an IP <b>packet</b>.';blocks=encBlk(IPc,'#22c55e1f','IP hdr','src&rarr;dst',' enc-pop')+T+D;}
    else if(step===4){dir='&#10145; ON THE WIRE';dcol=ETH;cap='Link layer adds an Ethernet header; the whole <b>frame</b> leaves as bits.';blocks=encBlk(ETH,'#64748b1f','Eth hdr','MAC',' enc-pop')+I+T+D;bits='<div style=&quot;font-family:monospace;font-size:8.5px;color:#475569;margin-top:6px;letter-spacing:1.5px;&quot;>0100 0001  0100 0010  0100 0011  0100 0100 &hellip; &rarr;</div>';}
    else if(step===5){dir='&#11014; DECAPSULATION';dcol=IPc;cap='Server B checks the IP header (dst = me &#10003;) and <b>removes</b> it.';blocks=encBlk(IPc,'transparent','IP hdr','removed &#10007;',' enc-rem')+T+D;}
    else if(step===6){dir='&#11014; DECAPSULATION';dcol=TCPc;cap='TCP reads its header, reorders the segments, then <b>removes</b> it.';blocks=encBlk(TCPc,'transparent','TCP hdr','removed &#10007;',' enc-rem')+D;}
    else{dir='&#10003; DELIVERED';dcol=DAT;cap='App gets the original 8 bytes back &mdash; every header stripped away.';blocks=encBlk(DAT,'#f59e0b1f','DATA','ABCDEFGH &#10003;',' enc-pop');}
    var side=step<=4?'A (sender)':'B (receiver)';
    enc.innerHTML='<div style=&quot;display:flex;align-items:center;gap:8px;margin-bottom:8px;&quot;>'+
      '<span style=&quot;font-size:9px;font-weight:700;color:'+dcol+';border:1px solid '+dcol+'66;background:'+dcol+'1f;padding:2px 9px;border-radius:9px;&quot;>'+dir+'</span>'+

      '<div style=&quot;font-size:9.5px;color:#94a3b8;margin-top:7px;line-height:1.5;&quot;>'+cap+bits+'</div>';
  }

  // ── Helper functions ────────────────────────────────────
  function hl(id,col,dt){

    el.style.background=col+'33';el.style.borderColor=col;el.style.color=col;el.style.boxShadow='0 0 8px '+col+'44';

  function done(id,col){

    el.style.background=col+'0e';el.style.borderColor=col+'33';el.style.color=col+'66';el.style.boxShadow='';

  function setStatus(msg,col){

  function setWire(active){
    var wb2=document.getElementById('wb');

      if(wb2){wb2.style.borderColor='#f43f5e';wb2.style.background='#1c000a';}

      if(wrb)wrb.style.color='#22c55e';
    }else{
      if(wb2){wb2.style.borderColor='#334155';wb2.style.background='#0a0b0f';}
      if(wl)wl.style.background='#1e2130';
      if(wa)wa.style.color='#334155';
      if(wrb)wrb.style.color='#334155';

  }
  function flyPkt(label,col,cb2){
    var band=document.getElementById('wb');if(!band){if(cb2)cb2();return;}
    var p=document.createElement('div');
    p.style.cssText='position:absolute;top:50%;transform:translateY(-50%);left:6px;padding:1px 5px;background:'+col+';color:#000;font-size:8px;font-weight:700;border-radius:3px;z-index:2;transition:left 900ms linear;white-space:nowrap;';
    p.textContent=label;
    band.appendChild(p);
    setTimeout(function(){var bw=band.offsetWidth||270;p.style.left=(bw-70)+'px';},30);
    setTimeout(function(){p.style.opacity='0';p.style.transition='left 900ms linear,opacity 300ms';if(cb2)cb2();},960);
    setTimeout(function(){p.remove();},1300);
  }

  // ── Intro text in right panel ───────────────────────────
  cvLine(cm('// Two servers, each running the same TCP/IP stack'),0);
  cvLine(cm('// Data flows DOWN on sender, UP on receiver'),400);
  cvLine('',750);
  cvLine(kw('SERVER A')+'  →  Sender  (192.168.1.10)',850);
  cvLine(kw('SERVER B')+'  →  Receiver (93.184.1.5)',1100);
  cvLine('',1400);
  cvLine(cm('// Each layer has one job:'),1500);
  cvLine('  '+kw('App')+'    &quot;send this data&quot;  (no networking knowledge)',1700);
  cvLine('  '+kw('TCP')+'    split, number, guarantee, retry',2000);
  cvLine('  '+kw('IP')+'     address, route across networks',2300);
  cvLine('  '+kw('Wire')+'   physical bits: copper / fibre / WiFi',2600);
  log('Watch data encapsulate DOWN the sender stack, then decapsulate UP the receiver stack.');

  setTimeout(function(){
    showBtn('Step 1 — App Layer (Sender)',function(){

      // ── STEP 1: App on Sender ─────────────────────────
      hl('snd-app','#f59e0b','&quot;ABCDEFGH&quot;');
      setStatus('Step 1 of 7 — App on Server A has data ready to send','#f59e0b');
      renderEncap(1);
      cvb.innerHTML='';
      cvLine(cm('// STEP 1 — Application Layer (Server A)'),0);
      cvLine(kw('App')+'  has data: '+hi('&quot;ABCDEFGH&quot;')+'  (8 bytes)',300);
      cvLine('  Calls: '+kw('send(socket, &quot;ABCDEFGH&quot;, 8)')+' →  done',600);
      cvLine(cm('// App just writes to a socket'),900);
      cvLine(cm('// OS + kernel handles everything below — transparent to app'),1200);
      log('App writes 8 bytes to socket. Hand-off to TCP.');

      setTimeout(function(){
        showBtn('Step 2 — TCP Layer (Sender)',function(){

          // ── STEP 2: TCP on Sender ──────────────────────
          done('snd-app','#f59e0b');
          hl('snd-tcp','#f43f5e','Seq=1,5 → ABCD,EFGH');
          setStatus('Step 2 of 7 — TCP splits data into numbered segments','#f43f5e');
          renderEncap(2);
          cvb.innerHTML='';
          cvLine(cm('// STEP 2 — TCP Layer (Server A)'),0);
          cvLine(kw('TCP')+'  receives 8 bytes from App',250);
          cvLine('  → Segment 1:  Seq='+hi('1')+',  Data='+hi('&quot;ABCD&quot;')+'  Len=4',500);
          cvLine('  → Segment 2:  Seq='+hi('5')+',  Data='+hi('&quot;EFGH&quot;')+'  Len=4',800);
          cvLine(cm('// Seq# = byte offset in the full stream'),1100);
          cvLine(cm('// TCP starts a timer — if no ACK → retransmit'),1400);
          cvLine(cm('// Hands each segment DOWN to IP'),1700);
          log('TCP created Seq=1 and Seq=5. Timer started. Passed to IP.');

          setTimeout(function(){
            showBtn('Step 3 — IP Layer (Sender)',function(){

              // ── STEP 3: IP on Sender ───────────────────
              done('snd-tcp','#f43f5e');
              hl('snd-ip','#22c55e','192.168.1.10 → 93.184.1.5');
              setStatus('Step 3 of 7 — IP wraps each segment with routing addresses','#22c55e');
              renderEncap(3);
              cvb.innerHTML='';
              cvLine(cm('// STEP 3 — IP Layer (Server A)'),0);
              cvLine(kw('IP')+'  wraps each TCP segment:',250);
              cvLine('  Src IP:  '+vl('192.168.1.10'),500);
              cvLine('  Dst IP:  '+vl('93.184.1.5'),700);
              cvLine('  TTL:     '+vl('64')+cm('    ← max router hops'),900);
              cvLine('  Proto:   '+vl('TCP'),1100);
              cvLine(cm('// IP does NOT guarantee delivery or ordering'),1350);
              cvLine(cm('// It finds the best route — may differ per packet'),1650);
              log('IP wrapped each segment. 2 independent IP packets now ready for wire.');

              setTimeout(function(){
                showBtn('Step 4 — Onto the Wire',function(){

                  // ── STEP 4: Wire ───────────────────────
                  done('snd-ip','#22c55e');
                  setWire(true);
                  setStatus('Step 4 of 7 — Packets sent as bits across the wire...','#f43f5e');
                  renderEncap(4);
                  cvb.innerHTML='';
                  cvLine(cm('// STEP 4 — Physical Wire'),0);
                  cvLine(kw('Wire')+'  converts IP packets → electrical bits',250);
                  cvLine('  01000001 01000010 01000011 01000100...',500);
                  cvLine(cm('// Each packet travels independently'),750);
                  cvLine(cm('// They may take different routes through routers'),1000);
                  cvLine(cm('// May arrive out of order — TCP fixes that on other end'),1300);
                  log('Bits flying. Two IP packets crossing the wire independently.');

                  setTimeout(function(){
                    // Fly two packets across the wire band
                    flyPkt('[Seq=1: ABCD]','#f43f5e',function(){
                      setTimeout(function(){
                        flyPkt('[Seq=5: EFGH]','#818cf8',function(){
                          setWire(false);
                          setTimeout(function(){
                            showBtn('Step 5 — IP Layer (Receiver)',function(){

                              // ── STEP 5: IP on Receiver ─────────────────
                              hl('rcv-ip','#22c55e','dst=93.184.1.5 ✓ mine!');

                              renderEncap(5);

                              cvLine(kw('IP')+'  checks destination:',250);
                              cvLine('  Dst IP = '+vl('93.184.1.5')+'  → '+ok('it is me!'),500);
                              cvLine('  Strips IP header, passes TCP segment up',800);
                              cvLine(cm('// If Dst IP were different → router would forward it'),1100);
                              cvLine(cm('// TTL decremented each hop — zero means drop'),1400);
                              log('Server B IP accepted both packets. Stripped headers. Passed to TCP.');

                                showBtn('Step 6 — TCP Layer (Receiver)',function(){

                                  // ── STEP 6: TCP on Receiver ─────────────

                                  hl('rcv-tcp','#f43f5e','Reordering Seq=1,5...');

                                  cvLine(cm('// If a segment was missing → would request retransmit'),1400);
                                  cvLine(cm('// More on that in Stage 3 — Reliability'),1700);

                                  setTimeout(function(){
                                    showBtn('Step 7 — App Layer (Receiver)',function(){

                                      // ── STEP 7: App on Receiver ──────────
                                      done('rcv-tcp','#f43f5e');
                                      hl('rcv-app','#f59e0b','&quot;ABCDEFGH&quot; ✓');
                                      setStatus('Step 7 of 7 — App on Server B receives perfect data! ✓','#4ade80');
                                      renderEncap(7);

                                      cvLine(cm('// STEP 7 — Application Layer (Server B)'),0);
                                      cvLine(kw('App')+'  calls recv(socket, buf) → gets: '+ok('&quot;ABCDEFGH&quot;')+' ✓',300);
                                      cvLine('',600);
                                      cvLine(cm('// The app saw a simple read — no segments, no IP headers'),700);
                                      cvLine(cm('// No retransmit logic, no routing, nothing'),1000);
                                      cvLine(cm('// TCP/IP hid ALL of that complexity'),1300);
                                      cvLine('',1600);
                                      cvLine(ok('Full path:'),1700);
                                      cvLine('  App → TCP → IP → Wire → IP → TCP → App',1950);
                                      cvLine(cm('// Explore each layer in Stages 2, 3, and 4'),2300);
                                      log('DONE. App received &quot;ABCDEFGH&quot; perfectly. Full TCP/IP round trip complete!');
                                      setTimeout(function(){stage=1;busy=false;if(cb)cb();},2700);
                                    });
                                  },1900);
                                });
                              },1600);
                            });
                          },600);
                        });
                      },300);
                    });
                  },1400);
                });
              },1800);
            });
          },1900);
        });
      },1400);
    });
  },3000);
}

// ── Stage 2: TCP Segmentation ────────────────────────────────
function stageSegment(cb){

  var arr2=document.createElement('div');arr2.id='arr2';

  var ipBox=document.createElement('div');ipBox.id='ipbox';
  ipBox.style.cssText='background:#0a1f0a;border:1px solid #22c55e44;border-radius:5px;padding:6px 8px;font-size:9px;color:#64748b;opacity:0;transition:opacity .5s;margin-bottom:6px;';
  ipBox.innerHTML='<div style=&quot;color:#22c55e;font-weight:700;margin-bottom:3px;&quot;>🌐 4 IP Packets dispatched:</div>'+
    '192.168.1.10 → 93.184.1.5 | Seq=1  &quot;ABCD&quot;<br>'+
    '192.168.1.10 → 93.184.1.5 | Seq=5  &quot;EFGH&quot;<br>'+
    '192.168.1.10 → 93.184.1.5 | Seq=9  &quot;IJKL&quot;<br>'+
    '192.168.1.10 → 93.184.1.5 | Seq=13 &quot;MNOP&quot;';
  diag.appendChild(ipBox);

  var wireBox=document.createElement('div');wireBox.id='wirebox';

// ── Stage 3: Reliability &amp; Retransmit ───────────────────────
function stageReliability(cb){
  if(busy||stage>=3)return;busy=true;
  cvh.textContent='Stage 3 — Reliability: Out-of-Order &amp; Retransmit';cvb.innerHTML='';diag.innerHTML='';

  var cols=document.createElement('div');cols.style.cssText='display:flex;gap:6px;margin-bottom:6px;';

  var snd=document.createElement('div');snd.style.cssText='flex:1;';
  snd.innerHTML='<div style=&quot;font-size:9px;font-weight:700;color:#f43f5e;text-align:center;margin-bottom:4px;padding:3px;background:#1c0010;border-radius:4px;&quot;>📤 SENDER</div>';
  [{seq:1,data:'ABCD',col:'#f43f5e'},{seq:5,data:'EFGH',col:'#818cf8'},{seq:9,data:'IJKL',col:'#06b6d4'},{seq:13,data:'MNOP',col:'#f59e0b'}].forEach(function(s){
    var d=document.createElement('div');d.id='snd'+s.seq;
    d.style.cssText='border:1px solid '+s.col+'55;border-radius:4px;padding:3px 5px;font-size:9px;color:'+s.col+';margin-bottom:3px;transition:all .4s;';
    d.innerHTML='<b>Seq='+s.seq+'</b><br><span style=&quot;font-size:11px;letter-spacing:1px;&quot;>'+s.data+'</span><br><span id=&quot;ss'+s.seq+'&quot; style=&quot;font-size:8px;color:#334155;&quot;>ready</span>';
    snd.appendChild(d);
  });
  cols.appendChild(snd);

  var rcv=document.createElement('div');rcv.style.cssText='flex:1;';
  rcv.innerHTML='<div style=&quot;font-size:9px;font-weight:700;color:#22c55e;text-align:center;margin-bottom:4px;padding:3px;background:#0a1f0a;border-radius:4px;&quot;>📥 RECEIVER</div>';
  [{seq:1,data:'ABCD',col:'#f43f5e'},{seq:5,data:'EFGH',col:'#818cf8'},{seq:9,data:'IJKL',col:'#06b6d4'},{seq:13,data:'MNOP',col:'#f59e0b'}].forEach(function(s){
    var d=document.createElement('div');d.id='rcv'+s.seq;
    d.style.cssText='border:1px solid #1e2130;border-radius:4px;padding:3px 5px;font-size:9px;color:#334155;margin-bottom:3px;transition:all .4s;';
    d.innerHTML='<b>Slot '+s.seq+'</b><br><span id=&quot;rs'+s.seq+'&quot;>empty</span>';
    rcv.appendChild(d);
  });
  cols.appendChild(rcv);
  diag.appendChild(cols);

  var statBox=document.createElement('div');statBox.id='stat';
  statBox.style.cssText='font-size:9.5px;padding:5px 7px;background:#111318;border-radius:5px;border-left:3px solid #334155;margin-bottom:6px;color:#64748b;transition:all .3s;';
  statBox.textContent='Waiting to send...';diag.appendChild(statBox);

  var appRes=document.createElement('div');appRes.id='appres';
  appRes.style.cssText='background:#0a1f0a;border:1px solid #22c55e44;border-radius:5px;padding:6px 8px;font-size:9px;opacity:0;transition:opacity .5s;';
  appRes.innerHTML='<span style=&quot;color:#22c55e;font-weight:700;&quot;>📦 App received (in order):</span><br>'+
    '<span id=&quot;appdata2&quot; style=&quot;font-size:14px;color:#4ade80;letter-spacing:2px;font-weight:700;&quot;></span>';
  diag.appendChild(appRes);

  function setStatus(msg,col){var e=document.getElementById('stat');if(e){e.textContent=msg;e.style.borderLeftColor=col||'#334155';e.style.color=col||'#64748b';}}
  function setSnd(seq,status,col){var e=document.getElementById('ss'+seq);if(e){e.textContent=status;e.style.color=col||'#64748b';}}
  function setRcv(seq,html,borderCol){
    var e=document.getElementById('rcv'+seq);var s=document.getElementById('rs'+seq);
    if(e&amp;&amp;borderCol){e.style.borderColor=borderCol;e.style.background=borderCol+'22';}
    if(s)s.innerHTML=html;
  }

  cvLine(cm('// SCENARIO: 4 packets sent. Seq=5 is dropped on the network.'),0);
  cvLine(cm('// IP has no idea — it just tries to deliver, no guarantee.'),450);
  cvLine('',800);
  cvLine(kw('Sender')+'  sends Seq=1, 5, 9, 13 in order',900);
  cvLine(er('Network')+' silently '+er('drops')+' Seq=5  (packet loss is normal!)',1250);
  cvLine(kw('Receiver')+'  gets Seq=1, 9, 13  — '+er('Seq=5 missing!'),1600);
  log('Watch TCP handle packet loss automatically...');

  setTimeout(function(){
    showBtn('Send Seq=1 (ABCD)',function(){
      setStatus('Sending Seq=1 (ABCD) → →','#f43f5e');
      setSnd(1,'sent ✓','#4ade80');
      setTimeout(function(){setRcv(1,'<b style=&quot;color:#4ade80&quot;>ABCD ✓</b>','#22c55e');log('Seq=1 received OK');
        setTimeout(function(){
          showBtn('Send Seq=5 — watch it drop!',function(){
            setStatus('Seq=5 DROPPED on the wire ✗','#ef4444');
            setSnd(5,'DROPPED ✗','#ef4444');
            document.getElementById('snd5').style.opacity='0.4';
            setRcv(5,'<b style=&quot;color:#ef4444&quot;>??? missing</b>','#ef4444');
            log('Seq=5 DROPPED — receiver never gets this packet');
            setTimeout(function(){
              showBtn('Send Seq=9 and Seq=13',function(){
                setStatus('Sending Seq=9 (IJKL) and Seq=13 (MNOP)...','#06b6d4');
                setSnd(9,'sent ✓','#4ade80');
                setTimeout(function(){
                  setRcv(9,'<b style=&quot;color:#06b6d4&quot;>IJKL (buffered)</b>','#06b6d4');
                  setSnd(13,'sent ✓','#4ade80');
                  setTimeout(function(){
                    setRcv(13,'<b style=&quot;color:#f59e0b&quot;>MNOP (buffered)</b>','#f59e0b');
                    log('Seq=9 and Seq=13 buffered — waiting for missing Seq=5');
                    setTimeout(function(){
                      showBtn('Receiver requests retransmit',function(){
                        setStatus('Receiver: duplicate ACK → &quot;Resend Seq=5 please!&quot;','#fbbf24');
                        log('Receiver sends ACK: &quot;I need Seq=5 to continue&quot;');
                        setTimeout(function(){
                          showBtn('Sender retransmits Seq=5',function(){
                            setStatus('TIMEOUT! Retransmitting Seq=5 (EFGH)...','#818cf8');
                            document.getElementById('snd5').style.opacity='1';
                            setSnd(5,'RETRY →','#818cf8');
                            setTimeout(function(){
                              setRcv(5,'<b style=&quot;color:#818cf8&quot;>EFGH ✓ (retry)</b>','#818cf8');
                              log('Seq=5 retransmitted and received! Buffer now complete.');
                              setTimeout(function(){
                                setStatus('All 4 segments received! Reordering...','#4ade80');
                                setTimeout(function(){
                                  var ar=document.getElementById('appres');
                                  if(ar){ar.style.opacity='1';document.getElementById('appdata2').textContent='ABCDEFGHIJKLMNOP';}
                                  setStatus('App gets perfect data — in correct order!','#4ade80');
                                  log('App receives: &quot;ABCDEFGHIJKLMNOP&quot; — in order. App never knew about the dropped packet!');
                                  showBtn('What did TCP do?',function(){
                                    cvb.innerHTML='';
                                    cvLine(cm('// TCP handled everything transparently:'),0);
                                    cvLine('',300);
                                    cvLine(ok('1. Seq numbers')+'  each byte has a unique position number',400);
                                    cvLine(ok('2. ACK numbers')+'  receiver confirms &quot;got up to byte N&quot;',750);
                                    cvLine(ok('3. Timer')+'       sender starts timer when segment is sent',1100);
                                    cvLine(ok('4. Retransmit')+'  if no ACK by timeout → resend',1450);
                                    cvLine(ok('5. Buffer')+'      receiver holds out-of-order segments',1800);
                                    cvLine(ok('6. Reorder')+'     when gaps filled → deliver in sequence',2150);
                                    cvLine('',2450);
                                    cvLine(cm('// App only sees a clean ordered byte stream'),2550);
                                    cvLine(cm('// TCP hides retry/reorder complexity from the application'),2900);
                                    log('This is TCP reliability. UDP skips all this — faster but no guarantee.');
                                    setTimeout(function(){stage=3;busy=false;if(cb)cb();},3300);
                                  });
                                },600);
                              },800);
                            },600);
                          });
                        },600);
                      });
                    },700);
                  },400);
                },400);
              });
            },600);
          });
        },500);
      },600);
    });
  },2000);
}

// ── Stage 4: Wireshark / tcpdump ─────────────────────────────
function stageWireshark(cb){
  if(busy||stage>=4)return;busy=true;
  cvh.textContent='Stage 4 — Seeing Packets on the Wire (tcpdump)';cvb.innerHTML='';diag.innerHTML='';

  var intro=document.createElement('div');
  intro.style.cssText='font-size:9.5px;color:#94a3b8;line-height:1.6;margin-bottom:7px;padding:6px 8px;background:#111318;border-radius:5px;border-left:3px solid #f43f5e;';
  intro.innerHTML='<span style=&quot;color:#f43f5e;font-weight:700;&quot;>tcpdump</span> &amp;amp; <span style=&quot;color:#f43f5e;font-weight:700;&quot;>Wireshark</span> show every packet on the wire — the same tools engineers use to debug real network issues like packet corruption, dropped connections &amp;amp; latency spikes.';
  diag.appendChild(intro);

  var cmd=document.createElement('div');
  cmd.style.cssText='background:#0a0b0f;border:1px solid #1e2130;border-radius:5px;padding:6px 8px;font-size:9.5px;margin-bottom:7px;';
  cmd.innerHTML='<span style=&quot;color:#64748b;&quot;># Capture TCP packets on port 80:</span><br>'+
    '<span style=&quot;color:#4ade80;&quot;>$</span> <span style=&quot;color:#a5f3fc;&quot;>sudo tcpdump</span> <span style=&quot;color:#fde68a;&quot;>-i eth0 -n tcp port 80</span><br><br>'+
    '<span style=&quot;color:#64748b;&quot;># Show hex + ASCII payload:</span><br>'+
    '<span style=&quot;color:#4ade80;&quot;>$</span> <span style=&quot;color:#a5f3fc;&quot;>sudo tcpdump</span> <span style=&quot;color:#fde68a;&quot;>-i eth0 -XX -n tcp port 80</span>';
  diag.appendChild(cmd);

  var cap=document.createElement('div');cap.id='capbox';
  cap.style.cssText='background:#0a0b0f;border:1px solid #1e2130;border-radius:5px;overflow:hidden;font-size:8.5px;';
  diag.appendChild(cap);

  var rows=[
    {t:'14:23:45.100',f:'[S]',  info:'192.168.1.10:45231 → 93.184.1.5:80 SYN seq=1000',col:'#06b6d4'},
    {t:'14:23:45.101',f:'[S.]', info:'93.184.1.5:80 → 192.168.1.10:45231 SYN-ACK seq=5000 ack=1001',col:'#22c55e'},
    {t:'14:23:45.102',f:'[.]',  info:'192.168.1.10:45231 → 93.184.1.5:80 ACK ack=5001',col:'#a78bfa'},
    {t:'14:23:45.200',f:'[P.]', info:'192.168.1.10:45231 → 93.184.1.5:80 seq=1001:1005 len=4 &quot;ABCD&quot;',col:'#f43f5e'},
    {t:'14:23:45.201',f:'[P.]', info:'192.168.1.10:45231 → 93.184.1.5:80 seq=1005:1009 len=4 &quot;EFGH&quot;',col:'#818cf8'},
    {t:'14:23:45.202',f:'[P.]', info:'192.168.1.10:45231 → 93.184.1.5:80 seq=1009:1013 len=4 &quot;IJKL&quot;',col:'#06b6d4'},
    {t:'14:23:45.350',f:'[P.]', info:'192.168.1.10:45231 → 93.184.1.5:80 seq=1005:1009 RETRANSMIT',col:'#fbbf24'},
    {t:'14:23:45.351',f:'[.]',  info:'93.184.1.5:80 → 192.168.1.10:45231 ACK ack=1013',col:'#4ade80'}
  ];
  rows.forEach(function(r,i){
    var row=document.createElement('div');
    row.style.cssText='display:flex;gap:4px;padding:3px 6px;border-bottom:1px solid #0f1117;opacity:0;transition:opacity .3s;align-items:baseline;';
    row.innerHTML='<span style=&quot;color:#334155;flex-shrink:0;font-size:8px;&quot;>'+r.t+'</span>'+
      '<span style=&quot;color:'+r.col+';font-weight:700;flex-shrink:0;min-width:26px;&quot;>'+r.f+'</span>'+
      '<span style=&quot;color:#64748b;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;&quot;>'+r.info+'</span>';
    cap.appendChild(row);
    setTimeout(function(){row.style.opacity='1';},i*150+200);
  });

  cvLine(cm('// tcpdump: one line per packet on the wire'),0);
  cvLine('',350);
  cvLine(kw('[S]')+'    SYN  — &quot;I want to connect&quot;',450);
  cvLine(kw('[S.]')+'   SYN-ACK — server accepts',700);
  cvLine(kw('[.]')+'    ACK  — acknowledgement only',950);
  cvLine(kw('[P.]')+'   PUSH+ACK — &quot;here is data&quot;',1200);
  cvLine(kw('[F.]')+'   FIN  — &quot;closing connection&quot;',1450);

  cvLine(cm('// seq=1001:1005 means bytes 1001 to 1004 (4 bytes)'),2750);
  log('tcpdump shows raw packet flow — this is what engineers see when debugging');

  setTimeout(function(){
    showBtn('See TCP header fields',function(){

      cvLine(kw('IP Header     ')+' (20 bytes)',500);
      cvLine('  Src IP:   '+vl('192.168.1.10')+'  '+cm('← who sent it'),700);
      cvLine('  Dst IP:   '+vl('93.184.1.5')+'   '+cm('← who receives it'),900);
      cvLine('  TTL:      '+vl('64')+cm('         ← drops after 64 hops'),1100);
      cvLine('  Protocol: '+vl('TCP (6)'),1300);
      cvLine('',1500);
      cvLine(kw('TCP Header    ')+' (20 bytes)',1600);

      cvLine('  Dst Port: '+vl('80')+cm('     ← HTTP server'),2000);
      cvLine('  Seq:      '+vl('1001')+cm('   ← byte position in stream'),2200);
      cvLine('  Ack:      '+vl('5001')+cm('   ← &quot;got all server bytes to 5000&quot;'),2400);
      cvLine('  Flags:    '+vl('[P.]')+cm('   ← push data + ack'),2600);
      cvLine('  Checksum: '+vl('0xA4B2')+cm(' ← corrupted? → drop!'),2800);
      cvLine('',3000);
      cvLine(kw('Payload       ')+' (4 bytes)',3100);
      cvLine('  '+vl('&quot;ABCD&quot;')+cm('  ← actual application data'),3300);
      cvLine('',3500);
      cvLine(cm('// Total: 14+20+20+4 = 58 bytes to send just &quot;ABCD&quot;'),3600);
      cvLine(cm('// Headers = overhead. Bigger payloads = more efficient.'),4000);
      log('Pro tip: wireshark can follow a TCP stream — shows raw app data in sequence');
      setTimeout(function(){stage=4;busy=false;if(cb)cb();},4500);
    });
  },rows.length*150+600);
}

.seg .s2{font-size:8px;opacity:.85;line-height:1.3;margin-top:1px;white-space:nowrap}
.seg.add{animation:pop .5s ease}
.seg.rem{opacity:.35;text-decoration:line-through;border-style:dashed}
@keyframes pop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
.wrap-note{font-size:9.5px;color:var(--dim);font-family:'IBM Plex Mono',monospace;margin-top:4px}
.legend{margin-top:auto;padding-top:10px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:8px 14px;font-size:8.5px;color:var(--dim)}
.legend span{display:inline-flex;align-items:center;gap:5px}
.dot{width:9px;height:9px;border-radius:3px;display:inline-block}

/* Narration */
.narr .step-title{font-size:15px;font-weight:700;margin-bottom:8px;color:var(--ink)}
.narr .detail{font-size:12.5px;line-height:1.65;color:#cbd5e1}
.narr .note{margin-top:auto;font-size:11.5px;line-height:1.55;background:#161d12;border:1px solid #2a3a1c;border-left:3px solid var(--ok);border-radius:8px;padding:10px 12px;color:#d9f0c4}
.narr .note b{color:var(--ok)}
.narr .note.hidden{display:none}

@media(max-width:760px){.bottom{flex-direction:column}.nmeta,.ntag{display:none}}
</style>
</head>
<body>

<div class=&quot;hdr&quot;>
  <div>
    <h1>How a <span class=&quot;wa&quot;>WhatsApp</span> message travels</h1>
    <div class=&quot;sub&quot;>Anu's phone (WiFi)  →  network stack  →  internet  →  server  →  network stack  →  Bilal's phone</div>
  </div>
  <div class=&quot;spacer&quot;></div>
  <div class=&quot;phase-pill&quot; id=&quot;phasePill&quot;>PRESS STEP ▶</div>
</div>

<div class=&quot;ctrl&quot;>
  <button class=&quot;btn&quot; id=&quot;prevBtn&quot; onclick=&quot;go(-1)&quot;>◀ Prev</button>
  <button class=&quot;btn primary&quot; id=&quot;stepBtn&quot; onclick=&quot;go(1)&quot;>Step ▶</button>
  <button class=&quot;btn&quot; id=&quot;autoBtn&quot; onclick=&quot;toggleAuto()&quot;>⏵ Auto-play</button>
  <button class=&quot;btn&quot; id=&quot;resetBtn&quot; onclick=&quot;reset()&quot;>↺ Reset</button>
  <span class=&quot;counter&quot; id=&quot;counter&quot;>Step 0 / 12</span>
  <div class=&quot;prog&quot;><div class=&quot;progfill&quot; id=&quot;progfill&quot;></div></div>
</div>

<div class=&quot;topo-wrap&quot;>
  <div class=&quot;track&quot;></div>
  <div class=&quot;nodes&quot; id=&quot;nodes&quot;>
    <div class=&quot;node&quot;><div class=&quot;nbox&quot; id=&quot;n0&quot;><div class=&quot;nicon&quot;>📱</div><div class=&quot;nname&quot;>Anu's phone</div><div class=&quot;nmeta&quot;>WhatsApp app<br>192.168.1.23</div><div class=&quot;ntag&quot;>WiFi</div></div></div>
    <div class=&quot;node&quot;><div class=&quot;nbox&quot; id=&quot;n1&quot;><div class=&quot;nicon&quot;>🏠</div><div class=&quot;nname&quot;>Home router</div><div class=&quot;nmeta&quot;>WiFi AP + NAT</div><div class=&quot;ntag&quot;>gateway</div></div></div>
    <div class=&quot;node&quot;><div class=&quot;nbox&quot; id=&quot;n2&quot;><div class=&quot;nicon&quot;>☁️</div><div class=&quot;nname&quot;>Internet</div><div class=&quot;nmeta&quot;>ISP · routers · BGP</div><div class=&quot;ntag&quot;>many hops</div></div></div>
    <div class=&quot;node&quot;><div class=&quot;nbox&quot; id=&quot;n3&quot;><div class=&quot;nicon&quot;>🗄️</div><div class=&quot;nname&quot;>WhatsApp server</div><div class=&quot;nmeta&quot;>Meta data center<br>relay</div><div class=&quot;ntag&quot;>store &amp;amp; forward</div></div></div>
    <div class=&quot;node&quot;><div class=&quot;nbox&quot; id=&quot;n4&quot;><div class=&quot;nicon&quot;>☁️</div><div class=&quot;nname&quot;>Internet</div><div class=&quot;nmeta&quot;>ISP · routers · BGP</div><div class=&quot;ntag&quot;>many hops</div></div></div>
    <div class=&quot;node&quot;><div class=&quot;nbox&quot; id=&quot;n5&quot;><div class=&quot;nicon&quot;>🏠</div><div class=&quot;nname&quot;>Home router</div><div class=&quot;nmeta&quot;>WiFi AP + NAT</div><div class=&quot;ntag&quot;>gateway</div></div></div>
    <div class=&quot;node&quot;><div class=&quot;nbox&quot; id=&quot;n6&quot;><div class=&quot;nicon&quot;>📱</div><div class=&quot;nname&quot;>Bilal's phone</div><div class=&quot;nmeta&quot;>WhatsApp app<br>192.168.0.7</div><div class=&quot;ntag&quot;>WiFi</div></div></div>
  </div>
  <div class=&quot;pkt&quot; id=&quot;pkt&quot; style=&quot;opacity:0&quot;>packet</div>
</div>

<div class=&quot;bottom&quot;>
  <div class=&quot;panel builder&quot;>
    <h2>📦 Packet builder — what's wrapped around your message</h2>
    <div class=&quot;pkt-row&quot; id=&quot;pktRow&quot;></div>
    <div class=&quot;wrap-note&quot; id=&quot;wrapNote&quot;></div>
    <div class=&quot;legend&quot;>
      <span><i class=&quot;dot&quot; style=&quot;background:var(--e2e)&quot;></i> E2E message (Signal)</span>
      <span><i class=&quot;dot&quot; style=&quot;background:var(--tls)&quot;></i> Transport TLS</span>
      <span><i class=&quot;dot&quot; style=&quot;background:var(--tcp)&quot;></i> TCP</span>
      <span><i class=&quot;dot&quot; style=&quot;background:var(--ip)&quot;></i> IP</span>
      <span><i class=&quot;dot&quot; style=&quot;background:var(--wifi)&quot;></i> WiFi / Link</span>
    </div>
  </div>
  <div class=&quot;panel narr&quot;>
    <div class=&quot;step-title&quot; id=&quot;title&quot;>Click <b>Step ▶</b> to begin</div>
    <div class=&quot;detail&quot; id=&quot;detail&quot;>We'll follow a single message, &quot;Hi&quot;, from Anu's WhatsApp to Bilal's — down through every layer, across the internet, and back up the other side.</div>
    <div class=&quot;note hidden&quot; id=&quot;note&quot;></div>
  </div>
</div>

<script>
// layer colours
var C={wifi:'#64748b',ip:'#22c55e',tcp:'#f43f5e',tls:'#38bdf8',e2e:'#f59e0b',hi:'#4ade80'};
// block definitions: key -> {col,label}
function B(key,label,sub,state){return {key:key,col:C[key]||C.e2e,label:label,sub:sub,state:state||'keep'};}

// node x-centres for 7 evenly spaced nodes (percent)
var CENT=[7.143,21.429,35.714,50,64.286,78.571,92.857];

var steps=[
 { // 1
  phase:'ENCAPSULATION', pc:C.e2e, node:0, on:[0],
  title:'1 · App seals the message (end-to-end)',
  detail:'Anu types &quot;Hi&quot; and taps send. Before anything touches the network, WhatsApp encrypts it with Bilal’s public key using the Signal protocol. The plaintext &quot;Hi&quot; never leaves the phone — only sealed ciphertext does.',
  note:'<b>End-to-end encryption:</b> only Bilal’s phone holds the key to open this. Not the WiFi, not the ISP, not even WhatsApp.',
  blocks:[B('e2e','🔒 Msg','E2E sealed','add')],
  wrap:'payload = encrypt(&quot;Hi&quot;, Bilal_public_key)'
 },
 { // 2
  phase:'ENCAPSULATION', pc:C.tls, node:0, on:[0],
  title:'2 · Transport encryption',
  detail:'The phone already keeps a TCP connection open to WhatsApp. Over it, the data gets a second encryption layer (the Noise protocol — think TLS) so even connection metadata is protected in transit.',
  blocks:[B('tls','TLS','transport 🔒','add'),B('e2e','🔒 Msg','E2E sealed')],
  wrap:'two independent locks now: transport + end-to-end'
 },
 { // 3
  phase:'ENCAPSULATION', pc:C.tcp, node:0, on:[0],
  title:'3 · TCP adds its header',
  detail:'TCP prepends a header: source port (random), destination port 443, a sequence number, and a checksum — then starts a timer. If no acknowledgment comes back, TCP retransmits.',
  blocks:[B('tcp','TCP','seq# · :443','add'),B('tls','TLS','transport 🔒'),B('e2e','🔒 Msg','E2E sealed')],
  wrap:'TCP = reliability: ordering, retransmit, acknowledgements'
 },
 { // 4
  phase:'ENCAPSULATION', pc:C.ip, node:0, on:[0],
  title:'4 · IP adds routing addresses',
  detail:'IP wraps the segment with a source = the phone’s private WiFi address 192.168.1.23, and a destination = WhatsApp’s server IP, which the phone found earlier through a DNS lookup.',
  blocks:[B('ip','IP','192.168.1.23 → srv','add'),B('tcp','TCP','seq# · :443'),B('tls','TLS','transport 🔒'),B('e2e','🔒 Msg','E2E sealed')],
  wrap:'IP = addressing &amp; routing (no delivery guarantee — that’s TCP’s job)'
 },
 { // 5
  phase:'ENCAPSULATION', pc:C.wifi, node:1, on:[0,1],
  title:'5 · WiFi frame → radio waves',
  detail:'The packet is wrapped in an 802.11 WiFi frame carrying MAC addresses (ARP found the router’s MAC) and transmitted as radio waves to the home router.',
  blocks:[B('wifi','WiFi','802.11 frame','add'),B('ip','IP','192.168.1.23 → srv'),B('tcp','TCP','seq# · :443'),B('tls','TLS','transport 🔒'),B('e2e','🔒 Msg','E2E sealed')],
  wrap:'full frame leaves as bits over the air — the &quot;wire&quot; is WiFi'
 },
 { // 6
  phase:'TRAVELLING', pc:C.ip, node:1, on:[1],
  title:'6 · Router rewrites the address (NAT)',
  detail:'The home router performs NAT: it replaces the private source 192.168.1.23 with the home’s single public IP from the ISP, and remembers the mapping so the reply can find its way back.',
  note:'<b>NAT</b> is how many private devices share one public address — the router keeps a translation table.',
  blocks:[B('wifi','WiFi','802.11 frame'),B('ip','IP','PUBLIC IP → srv','active'),B('tcp','TCP','seq# · :443'),B('tls','TLS','transport 🔒'),B('e2e','🔒 Msg','E2E sealed')],
  wrap:'source IP: 192.168.1.23  ➜  <public ISP address>'
 },
 { // 7
  phase:'TRAVELLING', pc:C.wifi, node:2, on:[2],
  title:'7 · Across the internet',
  detail:'The packet hops through ISP and backbone routers. Each one reads only the destination IP, decrements the TTL, and forwards it along the best BGP route. Packets may even take different paths.',
  blocks:[B('wifi','Link','re-framed/hop','active'),B('ip','IP','→ server'),B('tcp','TCP','seq# · :443'),B('tls','TLS','transport 🔒'),B('e2e','🔒 Msg','E2E sealed')],
  wrap:'the link-layer header is rebuilt at every single hop; IP stays end-to-end'
 },
 { // 8
  phase:'TRAVELLING', pc:C.tls, node:3, on:[3],
  title:'8 · WhatsApp server relays it',
  detail:'The server peels back the transport (TLS) layer to read where the message should go — but the end-to-end layer stays sealed. It sees an envelope addressed to Bilal, never the word &quot;Hi&quot;. If Bilal is offline, it stores the encrypted message.',
  note:'<b>The server routes; it cannot read.</b> It’s a store-and-forward relay — E2E encryption keeps the content private even from WhatsApp.',
  blocks:[B('ip','IP','→ server'),B('tcp','TCP','reassembled'),B('tls','TLS','opened by server','active'),B('e2e','🔒 Msg','STILL sealed')],
  wrap:'server reads routing metadata only — 🔒 message body unreadable'
 },
 { // 9
  phase:'TRAVELLING', pc:C.ip, node:4, on:[4],
  title:'9 · Pushed toward Bilal',
  detail:'Bilal’s phone keeps its own connection open outward to WhatsApp, alive with periodic pings. The server pushes the message down that existing pipe. If the app is asleep, a push notification (FCM on Android, APNs on iOS) wakes it first.',
  note:'<b>A server can’t dial into a phone</b> hidden behind NAT — so the phone connects out, and the server replies down that open connection. That’s what &quot;push&quot; really is.',
  blocks:[B('wifi','Link','new frame','active'),B('ip','IP','→ Bilal','active'),B('tcp','TCP','seq# · :443'),B('tls','TLS','re-encrypted 🔒'),B('e2e','🔒 Msg','E2E sealed')],
  wrap:'fresh transport connection to Bilal; the same sealed message inside'
 },
 { // 10
  phase:'DECAPSULATION', pc:C.wifi, node:5, on:[5],
  title:'10 · Arrives at Bilal’s network',
  detail:'Through Bilal’s router/NAT and over his WiFi, the frame reaches his phone. Heading up the stack now, the WiFi/link header is unwrapped first.',
  blocks:[B('wifi','WiFi','removed','rem'),B('ip','IP','dst = me?'),B('tcp','TCP','seq# · :443'),B('tls','TLS','transport 🔒'),B('e2e','🔒 Msg','E2E sealed')],
  wrap:'decapsulation begins — each layer peeled off in reverse'
 },
 { // 11
  phase:'DECAPSULATION', pc:C.tcp, node:6, on:[6],
  title:'11 · Up the stack: IP, TCP, TLS removed',
  detail:'IP confirms &quot;this is me&quot; and strips its header. TCP reassembles the segments in order and sends an ACK back to the server. The transport (TLS) encryption is removed.',
  blocks:[B('ip','IP','removed','rem'),B('tcp','TCP','removed · ACK','rem'),B('tls','TLS','removed','rem'),B('e2e','🔒 Msg','still sealed')],
  wrap:'only the end-to-end sealed message remains — nothing else could open it anyway'
 },
 { // 12
  phase:'DELIVERED', pc:C.hi, node:6, on:[6],
  title:'12 · App decrypts and shows &quot;Hi&quot;',
  detail:'WhatsApp end-to-end decrypts the message with Bilal’s private key, revealing &quot;Hi&quot;, and displays it. A delivery receipt travels all the way back the same path — turning Anu’s single tick into double ticks.',
  note:'The apps only ever did <b>send()</b> and <b>recv()</b>. TCP/IP, WiFi, NAT, the relay and two encryption layers did everything in between — invisibly.',
  blocks:[B('hi','&quot;Hi&quot; ✅','plaintext','add')],
  wrap:'recv() → decrypt(private_key) → &quot;Hi&quot;   ✔ delivered'
 }
];

var idx=0, auto=null;

function renderBlocks(blocks){
  var row=document.getElementById('pktRow'); row.innerHTML='';
  blocks.forEach(function(b){
    var d=document.createElement('div');
    d.className='seg'+(b.state==='add'?' add':'')+(b.state==='active'?' add':'')+(b.state==='rem'?' rem':'');
    var bg = b.state==='rem' ? 'transparent' : b.col+'1f';
    var border = b.state==='active' ? b.col : (b.state==='rem'? b.col : b.col+'88');
    d.style.cssText='border-color:'+border+';background:'+bg+';color:'+b.col+';'+(b.state==='active'?'box-shadow:0 0 12px '+b.col+'66;':'');
    d.innerHTML='<div class=&quot;s1&quot;>'+b.label+'</div><div class=&quot;s2&quot;>'+b.sub+'</div>';
    row.appendChild(d);
  });
}

function render(){
  var c=document.getElementById('counter');
  var pf=document.getElementById('progfill');
  c.textContent='Step '+idx+' / 12';
  pf.style.width=(idx/12*100)+'%';
  // node highlight reset
  for(var i=0;i<7;i++){var n=document.getElementById('n'+i);n.classList.remove('on');n.style.removeProperty('--accent');}
  var pkt=document.getElementById('pkt');

  if(idx===0){
    document.getElementById('phasePill').textContent='PRESS STEP ▶';
    document.getElementById('phasePill').style.color=C.hi;
    document.getElementById('phasePill').style.borderColor=C.hi+'66';
    document.getElementById('phasePill').style.background=C.hi+'14';
    document.getElementById('title').innerHTML='Click <b>Step ▶</b> to begin';
    document.getElementById('detail').textContent='We’ll follow a single message, &quot;Hi&quot;, from Anu’s WhatsApp to Bilal’s — down through every layer, across the internet, and back up the other side.';
    document.getElementById('note').className='note hidden';
    document.getElementById('pktRow').innerHTML='';
    document.getElementById('wrapNote').textContent='';
    pkt.style.opacity='0';
    document.getElementById('prevBtn').disabled=true;
    return;
  }
  var s=steps[idx-1];
  document.getElementById('prevBtn').disabled=false;
  // phase pill
  var pp=document.getElementById('phasePill');
  pp.textContent=s.phase;
  pp.style.color=s.pc; pp.style.borderColor=s.pc+'66'; pp.style.background=s.pc+'14';
  // highlight nodes
  s.on.forEach(function(ni){var n=document.getElementById('n'+ni);n.style.setProperty('--accent',s.pc);n.classList.add('on');});
  // packet
  pkt.style.opacity='1';
  pkt.style.left=CENT[s.node]+'%';
  pkt.style.background=s.pc;
  pkt.style.color = (s.pc===C.wifi)?'#fff':'#06210f';
  pkt.style.boxShadow='0 0 12px '+s.pc+'88';
  pkt.textContent = s.phase==='DELIVERED' ? '&quot;Hi&quot; ✅' : '📦 packet';
  // narration
  document.getElementById('title').innerHTML=s.title;
  document.getElementById('detail').innerHTML=s.detail;
  var note=document.getElementById('note');
  if(s.note){note.className='note';note.innerHTML=s.note;}else{note.className='note hidden';}
  // builder
  renderBlocks(s.blocks);
  document.getElementById('wrapNote').textContent=s.wrap||'';
  // step button label
  document.getElementById('stepBtn').textContent = idx>=12 ? 'Done ✓' : 'Step ▶';
  document.getElementById('stepBtn').disabled = idx>=12;
}

function go(d){
  idx=Math.max(0,Math.min(12,idx+d));
  render();
  if(idx>=12 &amp;&amp; auto) toggleAuto();
}
function reset(){ idx=0; if(auto) toggleAuto(); render(); }
function toggleAuto(){
  var b=document.getElementById('autoBtn');
  if(auto){clearInterval(auto);auto=null;b.textContent='⏵ Auto-play';b.classList.remove('primary');}
  else{
    if(idx>=12) idx=0;
    b.textContent='⏸ Pause';b.classList.add('primary');
    auto=setInterval(function(){ if(idx>=12){toggleAuto();return;} go(1); },2600);
    if(idx===0) go(1);
  }
}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();go(1);}
  else if(e.key==='ArrowLeft'){go(-1);}
});
render();
</script>
</body>
</html>

.btn.g{ border-color:rgba(74,222,128,.45); color:#c9f7d8; } .btn.g:hover{ background:rgba(74,222,128,.12); }
