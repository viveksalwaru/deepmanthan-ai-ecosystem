    <div class=&quot;tstat&quot; id=&quot;p3-stat&quot;>Reading frame…<br>Appending to queue</div>
    <hr class=&quot;ndiv&quot;>
    <div class=&quot;bignum&quot; id=&quot;p3-n&quot; style=&quot;color:var(--magenta)&quot;>0</div>

  </div>

  <div class=&quot;node&quot; id=&quot;n-q&quot; style=&quot;top:20px;left:396px;width:156px;&quot;>
    <div class=&quot;lkrow&quot;>
      <span class=&quot;lkico&quot; id=&quot;lkico&quot;>🔓</span>
      <span class=&quot;lklbl&quot; id=&quot;lklbl&quot;>UNLOCKED</span>
    </div>
    <div class=&quot;nl&quot; style=&quot;margin-bottom:5px;&quot;>Shared Queue</div>
    <div id=&quot;q-slots&quot;>
      <div class=&quot;qs&quot; id=&quot;qs0&quot;>─ empty ─</div>
      <div class=&quot;qs&quot; id=&quot;qs1&quot;>─ empty ─</div>
      <div class=&quot;qs&quot; id=&quot;qs2&quot;>─ empty ─</div>
      <div class=&quot;qs&quot; id=&quot;qs3&quot;>─ empty ─</div>
      <div class=&quot;qs&quot; id=&quot;qs4&quot;>─ empty ─</div>
      <div class=&quot;qs&quot; id=&quot;qs5&quot;>─ empty ─</div>
    </div>
    <div class=&quot;qcnt&quot; id=&quot;q-cnt&quot;>0 / 6 frames</div>
    <hr class=&quot;ndiv&quot;>
    <div style=&quot;font-size:8px;color:var(--ink-faint);text-align:center;&quot;>Thread-safe FIFO buffer</div>
  </div>

  <div class=&quot;node&quot; id=&quot;n-cons&quot; style=&quot;top:85px;left:610px;width:170px;&quot;>
    <div class=&quot;ni&quot;>🧠</div>

    <span class=&quot;chip ci&quot;>Inference Thread</span>

  <div class=&quot;node&quot; id=&quot;n-out&quot; style=&quot;top:168px;left:834px;width:155px;&quot;>

    <div style=&quot;font-size:9px;color:var(--ink-dim);text-align:center;margin-top:2px;&quot; id=&quot;out-conf&quot;>─</div>
    <hr class=&quot;ndiv&quot;>
    <div style=&quot;font-size:9px;color:var(--cyan);text-align:center;&quot; id=&quot;out-total&quot;>0 detections</div>
  </div>

  <div class=&quot;node&quot; id=&quot;n-st&quot; style=&quot;top:175px;left:376px;width:192px;display:none;&quot;>
    <div class=&quot;ni&quot;>⌛</div>
    <div class=&quot;nl&quot; style=&quot;color:var(--red);&quot;>Single Thread</div>
    <div class=&quot;ns&quot; style=&quot;color:rgba(239,68,68,.7);&quot;>Capture + Inference (Blocked)</div>
    <hr class=&quot;ndiv&quot;>
    <div class=&quot;tstat&quot; id=&quot;st-stat&quot;>Running inference…<br>Camera reads blocked!</div>
    <hr class=&quot;ndiv&quot;>
    <div class=&quot;bignum&quot; id=&quot;st-drop&quot; style=&quot;color:var(--red);&quot;>0</div>
    <div class=&quot;biglbl&quot; style=&quot;color:rgba(239,68,68,.7);&quot;>Frames DROPPED ⚠️</div>
  </div>

  <div class=&quot;drop-lbl&quot; id=&quot;drop-lbl&quot;>📭 Frame lost</div>
</div>

<div class=&quot;cstrip&quot;>
  <div class=&quot;csi&quot;>
    <div class=&quot;csl&quot;>🔒 Lock / Mutex</div>
    <div class=&quot;csv&quot;>Queue access serialised — prevents <span class=&quot;tag&quot;>race conditions</span> between threads.</div>
  </div>
  <div class=&quot;csi&quot;>
    <div class=&quot;csl&quot;>⚡ Decoupling</div>
    <div class=&quot;csv&quot;>Each producer reads frames non-stop. Consumer infers without <span class=&quot;tag&quot;>blocking</span> any camera.</div>
  </div>
  <div class=&quot;csi&quot;>
    <div class=&quot;csl&quot;>📹 N:1 Scalability</div>
    <div class=&quot;csv&quot;>N cameras = N producer threads sharing 1 queue &amp; 1 consumer. Queue absorbs burst differences.</div>
  </div>
  <div class=&quot;csi&quot;>
    <div class=&quot;csl&quot;>⚠ Single-Thread Problem</div>
    <div class=&quot;csv&quot;>One thread doing capture + inference serially: inference blocks frame reads → frames dropped.</div>
  </div>

<script>
var camCount=1,prodN=[0,0,0],consN=0,outTotal=0,stDrop=0;
var stMode=false,burstRunning=false;
var Q=new Array(6).fill(0);
var ambT=[null,null,null],consT=null,stT=null;
var COLS=['#00d4ff','#f59e0b','#e879f9'];
var SLOT_CLS=['fc','fa','fm'];
var GLOW=['gc','ga','gm'];
var CAM_R=[[138,55],[138,185],[138,315]];
var PROD_L=[[186,58],[186,188],[186,318]];
var PROD_R=[[338,58],[338,188],[338,318]];
var Q_ENTRY=[[396,98],[396,165],[396,230]];
var Q_EXIT=[550,155];
var CONS_L=[610,175];
var CONS_R=[778,185];
var OUT_L=[834,202];
var ST_L=[376,210];
var ST_R=[566,210];

function animPkt(x1,y1,x2,y2,col,dur,cb){
  var cv=document.getElementById('cv');
  var p=document.createElement('div');
  p.className='pkt';
  p.style.cssText='background:'+col+';box-shadow:0 0 5px '+col+';left:'+(x1-5)+'px;top:'+(y1-5)+'px;';
  cv.appendChild(p);
  var t0=performance.now();
  (function step(now){
    var t=Math.min(1,(now-t0)/dur),e=t<.5?2*t*t:-1+(4-2*t)*t;
    p.style.left=(x1+(x2-x1)*e-5)+'px';
    p.style.top=(y1+(y2-y1)*e-5)+'px';
    if(t<1)requestAnimationFrame(step);
    else{try{cv.removeChild(p);}catch(ex){}if(cb)cb();}
  })(performance.now());
}
function animWay(pts,col,segDur,cb){
  var i=0;
  (function go(){if(i>=pts.length-1){if(cb)cb();return;}animPkt(pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1],col,segDur,function(){i++;go();});})();
}
function qLen(){return Q.filter(function(v){return v>0;}).length;}
function enq(cam){var i=Q.indexOf(0);if(i===-1)return false;Q[i]=cam;updQ();return true;}
function deq(){
  var i=Q.findIndex(function(v){return v>0;});
  if(i===-1)return -1;
  var c=Q[i];Q[i]=0;
  var s=document.getElementById('qs'+i);
  if(s){s.classList.add('proc');setTimeout(function(){s.classList.remove('proc');},320);}
  updQ();return c;
}
function updQ(){
  var f=0;
  for(var i=0;i<6;i++){
    var s=document.getElementById('qs'+i);if(!s)continue;
    s.className='qs';
    if(Q[i]>0){s.classList.add(SLOT_CLS[Q[i]-1]);s.textContent='cam'+Q[i]+'_frame';f++;}
    else s.textContent='─ empty ─';
  }
  document.getElementById('q-cnt').textContent=f+' / 6 frames';
}
function flashLock(){
  var ico=document.getElementById('lkico'),lbl=document.getElementById('lklbl');
  ico.textContent='🔒';lbl.textContent='LOCKED';lbl.style.color='var(--red)';
  setTimeout(function(){ico.textContent='🔓';lbl.textContent='UNLOCKED';lbl.style.color='var(--amber)';},380);
}
function prodStep(ci){
  if(stMode)return;
  prodN[ci]++;
  var col=COLS[ci];
  document.getElementById('p'+(ci+1)+'-n').textContent=prodN[ci];
  var pn=document.getElementById('n-prod'+(ci+1));
  pn.classList.add(GLOW[ci]);
  document.getElementById('p'+(ci+1)+'-stat').innerHTML='Reading frame…<br><span style=&quot;color:'+col+'&quot;>cam'+(ci+1)+'_f'+prodN[ci]+'</span>';
  animPkt(CAM_R[ci][0],CAM_R[ci][1],PROD_L[ci][0],PROD_L[ci][1],col,300,function(){
    flashLock();
    var ok=enq(ci+1);
    if(ok){
      var pr=PROD_R[ci],qe=Q_ENTRY[ci];
      var pts=(ci===1)?[[pr[0],pr[1]],[qe[0],qe[1]]]:[[pr[0],pr[1]],[366,pr[1]],[366,qe[1]],[qe[0],qe[1]]];
      animWay(pts,col,130,function(){
        pn.classList.remove(GLOW[ci]);
        document.getElementById('p'+(ci+1)+'-stat').innerHTML='Idle · next frame<br>in queue ('+qLen()+'/6)';
        document.getElementById('stext').textContent='Cam'+(ci+1)+' producer: frame_'+prodN[ci]+' queued';
      });
    }else{
      pn.classList.remove(GLOW[ci]);
      document.getElementById('stext').textContent='⚠️ Queue full — cam'+(ci+1)+' back-pressure';
    }
  });
}
function consStep(){
  if(stMode||qLen()===0)return;
  flashLock();
  var cam=deq();if(cam<0)return;
  consN++;
  document.getElementById('cons-n').textContent=consN;
  var cn=document.getElementById('n-cons');cn.classList.add('gc');
  document.getElementById('cons-stat').innerHTML='YOLOv8 inference…<br><span style=&quot;color:var(--violet)&quot;>cam'+cam+' frame_'+consN+'</span>';
  animPkt(Q_EXIT[0],Q_EXIT[1],CONS_L[0],CONS_L[1],'#a78bfa',460,function(){
    setTimeout(function(){
      cn.classList.remove('gc');
      document.getElementById('cons-stat').innerHTML='Done · result pushed<br><span style=&quot;color:var(--green)&quot;>Leopard 0.94</span>';
      animPkt(CONS_R[0],CONS_R[1],OUT_L[0],OUT_L[1],'#22c55e',400,function(){
        outTotal++;
        var chip=document.getElementById('out-chip');
        chip.textContent='LEOPARD 🐆';chip.className='oc det';
        var conf=(0.82+Math.random()*.16);
        document.getElementById('cfill').style.width=(conf*100)+'%';
        document.getElementById('out-conf').textContent=conf.toFixed(2)+' conf (cam'+cam+')';
        document.getElementById('out-total').textContent=outTotal+' detections';
        document.getElementById('stext').textContent='Consumer done · cam'+cam+' · leopard detected';
        setTimeout(function(){chip.textContent='WAITING…';chip.className='oc idle';document.getElementById('out-conf').textContent='─';document.getElementById('cfill').style.width='0%';},2000);
      });
    },650);
  });
}
function startCam(ci){ambT[ci]=setInterval(function(){prodStep(ci);},1900+ci*200);}
function stopCam(ci){clearInterval(ambT[ci]);ambT[ci]=null;}
function stopAllCams(){for(var i=0;i<3;i++){clearInterval(ambT[i]);ambT[i]=null;}}
function startConsumer(){consT=setInterval(consStep,2800);}
function stopConsumer(){clearInterval(consT);consT=null;}
function updPill(){
  var s=camCount>1?'s':'';
  document.getElementById('cam-pill').textContent='📹 '+camCount+' camera'+s+' · '+camCount+' producer'+s+' · 1 consumer';
}
function addCamera(){
  if(camCount>=3)return;
  camCount++;
  var ci=camCount-1;
  var cam=document.getElementById('n-cam'+camCount);
  var prod=document.getElementById('n-prod'+camCount);
  if(cam){cam.style.opacity='1';cam.style.pointerEvents='auto';}
  if(prod){prod.style.opacity='1';prod.style.pointerEvents='auto';}
  var wc=document.getElementById('w-c'+camCount+'p'+camCount);
  var wp=document.getElementById('w-p'+camCount+'q');
  if(wc)wc.style.opacity='.38';
  if(wp)wp.style.opacity='.38';
  startCam(ci);
  document.getElementById('btn-addcam').disabled=(camCount>=3);
  document.getElementById('btn-remcam').disabled=false;
  updPill();
  document.getElementById('stext').textContent='Camera '+camCount+' connected · Producer Thread '+camCount+' started';
}
function removeCamera(){
  if(camCount<=1)return;
  var ci=camCount-1;
  stopCam(ci);
  var cam=document.getElementById('n-cam'+camCount);
  var prod=document.getElementById('n-prod'+camCount);
  if(cam){cam.style.opacity='0';cam.style.pointerEvents='none';}
  if(prod){prod.style.opacity='0';prod.style.pointerEvents='none';}
  var wc=document.getElementById('w-c'+camCount+'p'+camCount);
  var wp=document.getElementById('w-p'+camCount+'q');
  if(wc)wc.style.opacity='0';
  if(wp)wp.style.opacity='0';
  camCount--;
  document.getElementById('btn-addcam').disabled=false;
  document.getElementById('btn-remcam').disabled=(camCount<=1);
  updPill();
  document.getElementById('stext').textContent='Camera '+(camCount+1)+' removed · '+camCount+' producer'+(camCount>1?'s':'')+' active';
}
function frameBurst(){
  if(burstRunning)return;
  burstRunning=true;
  document.getElementById('btn-burst').disabled=true;
  document.getElementById('stext').textContent='📦 Frame burst · rapid frames from all '+camCount+' camera'+(camCount>1?'s':'')+'…';
  var sent=0,total=camCount*4;
  var bi=setInterval(function(){
    if(sent>=total){clearInterval(bi);burstRunning=false;document.getElementById('btn-burst').disabled=false;document.getElementById('stext').textContent='Burst done · consumer draining queue independently';return;}
    prodStep(sent%camCount);sent++;
  },230);
}
function toggleST(){
  stMode=!stMode;
  if(stMode){
    stopAllCams();stopConsumer();
    document.getElementById('btn-st').textContent='✅ Multi-Thread Mode';
    document.getElementById('btn-st').classList.remove('danger');
    document.getElementById('badge').textContent='⚠️ Single-Thread Mode';
    document.getElementById('badge').className='badge single';
    for(var i=1;i<=3;i++){var el=document.getElementById('n-prod'+i);if(el)el.style.display='none';}
    document.getElementById('n-q').style.display='none';
    document.getElementById('n-cons').style.display='none';
    document.getElementById('n-st').style.display='block';
    document.getElementById('st-paths').style.display='block';
    ['w-c1p1','w-c2p2','w-c3p3','w-p1q','w-p2q','w-p3q','w-qcons','w-cout'].forEach(function(id){var e=document.getElementById(id);if(e)e.style.opacity='0';});
    document.getElementById('btn-addcam').disabled=true;
    document.getElementById('btn-remcam').disabled=true;
    document.getElementById('stext').textContent='⚠️ Single thread blocked during inference → frames lost';
    startSTSim();
  }else{
    stopSTSim();
    document.getElementById('btn-st').textContent='⚠️ Single-Thread Mode';
    document.getElementById('btn-st').classList.add('danger');
    document.getElementById('badge').textContent='⚡ Multi-Thread Mode';
    document.getElementById('badge').className='badge multi';
    for(var i=1;i<=3;i++){var el=document.getElementById('n-prod'+i);if(el)el.style.display='block';}
    document.getElementById('n-q').style.display='block';
    document.getElementById('n-cons').style.display='block';
    document.getElementById('n-st').style.display='none';
    document.getElementById('st-paths').style.display='none';
    document.getElementById('drop-lbl').style.opacity='0';
    document.getElementById('w-c1p1').style.opacity='.38';
    document.getElementById('w-p1q').style.opacity='.38';
    document.getElementById('w-qcons').style.opacity='.38';
    document.getElementById('w-cout').style.opacity='.38';
    if(camCount>=2){document.getElementById('w-c2p2').style.opacity='.38';document.getElementById('w-p2q').style.opacity='.38';}
    if(camCount>=3){document.getElementById('w-c3p3').style.opacity='.38';document.getElementById('w-p3q').style.opacity='.38';}
    document.getElementById('btn-addcam').disabled=(camCount>=3);
    document.getElementById('btn-remcam').disabled=(camCount<=1);
    document.getElementById('stext').textContent='Back to multi-thread · all threads independent';
    for(var i=0;i<camCount;i++)startCam(i);
    startConsumer();
  }
}
function startSTSim(){
  stT=setInterval(function(){
    stDrop++;
    document.getElementById('st-drop').textContent=stDrop;
    document.getElementById('st-stat').innerHTML='Inference running…<br><span style=&quot;color:var(--red)&quot;>Camera reads blocked!</span>';
    animPkt(138,55,ST_L[0],ST_L[1],'#ef4444',370,function(){
      if(stDrop%3!==0){
        animPkt(ST_R[0],ST_R[1],OUT_L[0],OUT_L[1],'#ef4444',640,function(){
          document.getElementById('st-stat').innerHTML='Done · <span style=&quot;color:var(--amber)&quot;>frames missed</span>';
        });
      }else{
        var dl=document.getElementById('drop-lbl');dl.style.opacity='1';
        setTimeout(function(){dl.style.opacity='0';},1100);
        document.getElementById('st-stat').innerHTML='<span style=&quot;color:var(--red)&quot;>FRAME DROPPED ⚠️<br>Buffer overflow</span>';
      }
    });
  },1550);
}
function stopSTSim(){clearInterval(stT);stDrop=0;document.getElementById('st-drop').textContent='0';}
function resetAll(){
  stopAllCams();stopConsumer();stopSTSim();
  stMode=false;camCount=1;prodN=[0,0,0];consN=0;outTotal=0;stDrop=0;
  Q=new Array(6).fill(0);updQ();
  for(var i=1;i<=3;i++){
    var cn=document.getElementById('n-cam'+i),pn=document.getElementById('n-prod'+i);
    if(i===1){if(cn){cn.style.opacity='1';cn.style.pointerEvents='auto';}if(pn){pn.style.display='block';pn.style.opacity='1';pn.style.pointerEvents='auto';}}
    else{if(cn){cn.style.opacity='0';cn.style.pointerEvents='none';}if(pn){pn.style.display='block';pn.style.opacity='0';pn.style.pointerEvents='none';}}
    document.getElementById('p'+i+'-n').textContent='0';
    document.getElementById('p'+i+'-stat').innerHTML='Reading frame…<br>Appending to queue';
  }
  ['w-c2p2','w-c3p3','w-p2q','w-p3q'].forEach(function(id){var e=document.getElementById(id);if(e)e.style.opacity='0';});
  document.getElementById('cons-n').textContent='0';
  document.getElementById('cons-stat').innerHTML='YOLOv8 model<br>Running inference…';
  document.getElementById('n-q').style.display='block';
  document.getElementById('n-cons').style.display='block';
  document.getElementById('n-st').style.display='none';
  document.getElementById('st-paths').style.display='none';
  var chip=document.getElementById('out-chip');chip.textContent='WAITING…';chip.className='oc idle';
  document.getElementById('out-conf').textContent='─';
  document.getElementById('cfill').style.width='0%';
  document.getElementById('out-total').textContent='0 detections';
  document.getElementById('lkico').textContent='🔓';
  document.getElementById('lklbl').textContent='UNLOCKED';document.getElementById('lklbl').style.color='var(--amber)';
  document.getElementById('badge').textContent='⚡ Multi-Thread Mode';document.getElementById('badge').className='badge multi';
  document.getElementById('btn-st').textContent='⚠️ Single-Thread Mode';document.getElementById('btn-st').classList.add('danger');
  document.getElementById('btn-addcam').disabled=false;
  document.getElementById('btn-remcam').disabled=true;
  document.getElementById('btn-burst').disabled=false;burstRunning=false;
  document.getElementById('drop-lbl').style.opacity='0';
  document.getElementById('stext').textContent='Ambient monitoring';
  updPill();
  startCam(0);startConsumer();
}
updPill();
startCam(0);
startConsumer();
</script>

.btn-p{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.3);color:#a78bfa}

.btn-d{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:#22c55e}

.vsep{width:1px;height:20px;background:var(--border);flex-shrink:0}

<script>
function animPkt(x1,y1,x2,y2,col,dur,cb){
  var rp=document.getElementById('rp');
  var p=document.createElement('div');p.className='pkt';
  p.style.cssText='background:'+col+';box-shadow:0 0 8px '+col+';left:'+x1+'px;top:'+y1+'px;';
  rp.appendChild(p);
  var t0=null;
  function step(ts){
    if(!t0)t0=ts;
    var f=Math.min((ts-t0)/dur,1);
    var e=f<.5?2*f*f:1-Math.pow(-2*f+2,2)/2;
    p.style.left=(x1+(x2-x1)*e)+'px';
    p.style.top=(y1+(y2-y1)*e)+'px';
    if(f<1)requestAnimationFrame(step);
    else{p.remove();if(cb)cb();}
  }
  requestAnimationFrame(step);
}
function animWay(pts,col,dur,cb){
  var i=0;
  function next(){if(i>=pts.length-1){if(cb)cb();return;}
    animPkt(pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1],col,dur,function(){i++;next();});}
  next();
}
function burst(pts,col,dur,n,gap,cb){
  var done=0;
  for(var i=0;i<n;i++){(function(d){setTimeout(function(){
    animWay(pts,col,dur,function(){done++;if(done===n&amp;&amp;cb)cb();});
  },d);})(i*gap);}
}

/* ── Connection coords (right-panel relative) ── */
var DF_R =[155,168]; var IM_L=[215,168];
var IM_R =[345,168]; var RG_L=[415,202];
var RG_R =[577,205];
var MAC_L=[635,76];  var LX_L=[635,205]; var CLD_L=[635,334];

var stage=0, busy=false;

function glow(id,on){var e=document.getElementById(id);if(e)e.classList[on?'add':'remove']('active');}
function lbl(t,c){document.getElementById('bdot').style.background=c||'#94a3b8';document.getElementById('blbl').textContent=t;}
function srvSt(si,ti,s){
  var srv=document.getElementById(si),st=document.getElementById(ti);
  srv.classList.remove('pulling','installing','running');
  var m={idle:['● Idle','#94a3b8','rgba(100,116,139,.1)'],
          pulling:['⬇ Pulling...','#3b82f6','rgba(59,130,246,.1)'],
          install:['⚙ Installing...','#f59e0b','rgba(245,158,11,.1)'],
          running:['✅ Running','#22c55e','rgba(34,197,94,.1)']};
  if(s!=='idle')srv.classList.add(s==='install'?'installing':s);
  var r=m[s];st.innerHTML=r[0];st.style.color=r[1];st.style.background=r[2];
}
function wo(id,v){var e=document.getElementById(id);if(e)e.style.opacity=v;}

function stageBuild(){
  if(busy||stage>=1)return;busy=true;
  document.getElementById('btn-build').disabled=true;
  lbl('Building image from Dockerfile...','#f59e0b');
  glow('n-df',true);
  burst([DF_R,IM_L],'#f59e0b',320,5,100,function(){
    glow('n-df',false);glow('n-im',true);
    document.getElementById('st-im').innerHTML='● Built ✓';
    document.getElementById('im-body').innerHTML='myapp:v1.0<br>258 MB · ready<br>Frozen snapshot';
    lbl('Image built! Push it to the registry.','#22c55e');
    document.getElementById('btn-push').disabled=false;
    stage=1;busy=false;
  });
}
function stagePush(){
  if(busy||stage<1||stage>=2)return;busy=true;
  document.getElementById('btn-push').disabled=true;
  lbl('Pushing image to Docker Hub...','#a78bfa');
  glow('n-im',true);
  burst([IM_R,RG_L],'#a78bfa',380,4,110,function(){
    glow('n-im',false);glow('n-rg',true);
    document.getElementById('st-rg').innerHTML='● myapp:v1.0 stored';
    wo('w-reg-mac','.65');wo('w-reg-lx','.65');wo('w-reg-cld','.65');

<script>

/* ── step definitions (left side first, then right side) ── */
const STEPS = [
  {id:'t1', side:'left',  label:'Step 1 · Laptop · torch 2.2'},
  {id:'t2', side:'left',  label:'Step 2 · Field server · torch 1.13'},
  {id:'t3', side:'left',  label:'Step 3 · Upgrade breaks teammate'},
  {id:'d1', side:'right', label:'Step 1 · Dockerfile'},
  {id:'d2', side:'right', label:'Step 2 · Build &amp; run · laptop'},
  {id:'d3', side:'right', label:'Step 3 · Same image · server'},
  {id:'d4', side:'right', label:'Step 4 · Legacy in own container'},
];
const LAST_LEFT = 2;   // index of t3 — right side unlocks only after this

function bodyEl(id){ return document.querySelector(`[data-term=&quot;${id}&quot;] .term-body`); }
function badgeEl(id){ return document.querySelector(`[data-term=&quot;${id}&quot;] .term-badge`); }
function cardEl(id){ return document.querySelector(`[data-term=&quot;${id}&quot;]`); }

const nextBtn = document.getElementById('nextBtn');
const stepLbl = document.getElementById('stepLbl');

let idx = -1;
let timers = [];
function clearTimers(){ timers.forEach(t=>clearTimeout(t)); timers = []; }

function resetAll(){
  clearTimers();
  STEPS.forEach(s=>{
    const b=bodyEl(s.id); if(b) b.innerHTML='';
    const bd=badgeEl(s.id); if(bd) bd.style.opacity=0;
    const c=cardEl(s.id); if(c) c.classList.remove('active');
  });
  idx = -1;
}

function setNext(state, label){
  nextBtn.textContent = label;
  nextBtn.disabled = (state==='wait');
  nextBtn.classList.toggle('ready', state==='ready');
  nextBtn.classList.toggle('finish', state==='finish');
}

function playStep(i){
  idx = i;
  const step = STEPS[i];
  const lines = T[step.id];
  const body = bodyEl(step.id);
  const card = cardEl(step.id);

  STEPS.forEach(s=>{ const c=cardEl(s.id); if(c) c.classList.remove('active'); });
  if(card){ card.classList.add('active'); card.scrollIntoView({behavior:'smooth', block:'center'}); }
  stepLbl.innerHTML = `<b>${step.label}</b>`;
  setNext('wait','… running');

  let t = 200;
  lines.forEach(line=>{
    t += line.d;
    timers.push(setTimeout(()=>{
      const oc = body.querySelector('.cursor'); if(oc) oc.remove();
      const div = document.createElement('div'); div.className='ln'; div.innerHTML = line.h;
      body.appendChild(div);
      requestAnimationFrame(()=> div.classList.add('show'));
      if(line.cursor){ const cur=document.createElement('span'); cur.className='cursor'; div.appendChild(cur); }
    }, t));
  });
  t += 240;
  timers.push(setTimeout(()=>{
    const oc = body.querySelector('.cursor'); if(oc) oc.remove();
    const bd = badgeEl(step.id); if(bd) bd.style.opacity=1;
    onStepDone(i);
  }, t));
}

function onStepDone(i){
  if(i >= STEPS.length-1){
    setNext('finish','✓ Complete · Replay');
    stepLbl.innerHTML = `<b style=&quot;color:var(--green)&quot;>All steps complete</b>`;
    return;
  }
  if(i === LAST_LEFT){
    // gate — left side (dependency hell) fully shown; now unlock Docker side
    setNext('ready','Start Docker steps →');
    stepLbl.innerHTML = `<b style=&quot;color:var(--rose)&quot;>Left side complete.</b> Now the Docker solution →`;
  } else {
    setNext('ready','Next step ▶');
  }
}

nextBtn.addEventListener('click', ()=>{
  if(nextBtn.classList.contains('finish')){ resetAll(); playStep(0); return; }
  if(nextBtn.disabled) return;
  if(idx+1 < STEPS.length) playStep(idx+1);
});
document.getElementById('restart').addEventListener('click', ()=>{ resetAll(); playStep(0); });
document.getElementById('replay').addEventListener('click', ()=>{ resetAll(); playStep(0); });

/* start with step 1, then pause for the presenter */
resetAll();
playStep(0);
</script>

<div class=&quot;top-header&quot;>
  <div class=&quot;logo-glyph&quot;>☸️</div>
  <div class=&quot;logo-txt&quot;>
    <b>Why Kubernetes?</b>
    <span>Orchestrating Containers at Fleet Scale</span>
  </div>
  <div class=&quot;hdr-spacer&quot;></div>
  <button class=&quot;replay-btn&quot; id=&quot;replay&quot;>▶ Replay animation</button>
</div>

<div class=&quot;wrap&quot;>

  <!-- ══════════ LEFT : THE PROBLEM ══════════ -->
  <div class=&quot;col bad&quot;>
    <div class=&quot;col-head&quot;>
      <div class=&quot;col-badge&quot;>⚠️</div>
      <h2>Without an orchestrator — you are the orchestrator</h2>
    </div>
    <div class=&quot;col-sub&quot;>Docker packages one app. But across a fleet, <b style=&quot;color:var(--ink)&quot;>you</b> must place, restart, heal, scale and network every container by hand — with <b style=&quot;color:var(--ink)&quot;>docker run</b> and SSH.</div>

    <!-- Step 1 -->
    <div class=&quot;step-tag&quot;><span class=&quot;step-num&quot;>1</span><span class=&quot;step-txt&quot;>Run a container by hand — fine for one node <small>· but manual</small></span></div>
    <div class=&quot;term host-laptop&quot; data-term=&quot;t1&quot;>
      <div class=&quot;term-bar&quot;><div class=&quot;tdots&quot;><i style=&quot;background:#FF5F57&quot;></i><i style=&quot;background:#FEBC2E&quot;></i><i style=&quot;background:#28C840&quot;></i></div>
        <span class=&quot;term-host&quot;><b>you</b>@srv-01:~</span>
        <span class=&quot;term-badge info&quot;>◑ MANUAL</span></div>
      <div class=&quot;term-body&quot;></div>
    </div>

    <!-- Step 2 -->
    <div class=&quot;step-tag&quot;><span class=&quot;step-num&quot;>2</span><span class=&quot;step-txt&quot;>It crashes at 3 AM — nothing restarts it <small>· no self-healing</small></span></div>
    <div class=&quot;term host-server&quot; data-term=&quot;t2&quot;>
      <div class=&quot;term-bar&quot;><div class=&quot;tdots&quot;><i style=&quot;background:#FF5F57&quot;></i><i style=&quot;background:#FEBC2E&quot;></i><i style=&quot;background:#28C840&quot;></i></div>
        <span class=&quot;term-host&quot;><b>you</b>@srv-01:~</span>
        <span class=&quot;term-badge fail&quot;>✘ DOWN</span></div>
      <div class=&quot;term-body&quot;></div>
    </div>

    <!-- Step 3 -->
    <div class=&quot;step-tag&quot;><span class=&quot;step-num&quot;>3</span><span class=&quot;step-txt&quot;>Scale to 100 nodes by hand — and a server dies</span></div>
    <div class=&quot;term host-server&quot; data-term=&quot;t3&quot;>
      <div class=&quot;term-bar&quot;><div class=&quot;tdots&quot;><i style=&quot;background:#FF5F57&quot;></i><i style=&quot;background:#FEBC2E&quot;></i><i style=&quot;background:#28C840&quot;></i></div>
        <span class=&quot;term-host&quot;><b>you</b>@laptop:~/ops</span>
        <span class=&quot;term-badge fail&quot;>✘ DOESN'T SCALE</span></div>
      <div class=&quot;term-body&quot;></div>
    </div>

    <div class=&quot;note&quot; style=&quot;--kc:var(--rose)&quot;>
      <span class=&quot;ni&quot;>🔥</span>
      <p><b>The orchestration gap.</b> Placing, restarting, healing, scaling, load-balancing and updating hundreds of containers by hand is a full-time job — and it fails the moment you sleep or a node dies.</p>
    </div>
  </div>

  <!-- ══════════ RIGHT : KUBERNETES ══════════ -->
  <div class=&quot;col good&quot;>
    <div class=&quot;col-head&quot;>
      <div class=&quot;col-badge&quot;>☸️</div>

<script>
/* ── terminal line scripts ────────────────────────────── */
const T = {
  t1: [
    {h:`<span class=&quot;pmt laptop&quot;>you@srv-01</span><span class=&quot;dim&quot;>:~$</span> <span class=&quot;cmd&quot;>docker run -d --name detector leopard-detect:2.2</span>`, d:60, cursor:true},
    {h:`<span class=&quot;dim&quot;>a3f9c1e8b2 </span><span class=&quot;ok&quot;>started</span>`, d:500},
    {h:`<span class=&quot;pmt laptop&quot;>you@srv-01</span><span class=&quot;dim&quot;>:~$</span> <span class=&quot;cmd&quot;>docker ps</span>`, d:320, cursor:true},
    {h:`<span class=&quot;dim&quot;>CONTAINER  IMAGE               STATUS</span>`, d:240},
    {h:`<span class=&quot;dim&quot;>a3f9c1     leopard-detect:2.2  </span><span class=&quot;ok&quot;>Up 3 seconds</span>`, d:180},
    {h:`<span class=&quot;warn&quot;>[toil] 1 node covered · 99 more to start… by hand</span>`, d:220},
  ],
  t2: [
    {h:`<span class=&quot;dim&quot;># …4 hours later, 03:00</span>`, d:60},
    {h:`<span class=&quot;pmt server&quot;>you@srv-01</span><span class=&quot;dim&quot;>:~$</span> <span class=&quot;cmd&quot;>docker ps</span>`, d:360, cursor:true},
    {h:`<span class=&quot;dim&quot;>CONTAINER  IMAGE               STATUS</span>`, d:240},
    {h:`<span class=&quot;err&quot;>(no running containers)</span>`, d:220},
    {h:`<span class=&quot;pmt server&quot;>you@srv-01</span><span class=&quot;dim&quot;>:~$</span> <span class=&quot;cmd&quot;>docker ps -a | grep detector</span>`, d:340, cursor:true},
    {h:`<span class=&quot;dim&quot;>a3f9c1  leopard-detect:2.2  </span><span class=&quot;err&quot;>Exited (137) 4 hours ago</span>`, d:260},
    {h:`<span class=&quot;cmt&quot;># OOM-killed at 03:00 — nothing restarted it</span>`, d:200},
    {h:`<span class=&quot;err&quot;>[alert] camera feed dark for 4h · leopard missed ✘</span>`, d:180},
  ],
  t3: [
    {h:`<span class=&quot;pmt server&quot;>you@laptop</span><span class=&quot;dim&quot;>:~/ops$</span> <span class=&quot;cmd&quot;>for h in srv-{01..100}; do ssh $h 'docker run -d leopard-detect:2.2'; done</span>`, d:60, cursor:true},
    {h:`<span class=&quot;warn&quot;>srv-07: ssh: connect to host srv-07 port 22: Connection timed out</span>`, d:520},
    {h:`<span class=&quot;err&quot;>srv-42: docker: Error response from daemon: port is already allocated</span>`, d:240},
    {h:`<span class=&quot;dim&quot;>srv-63: Up … </span><span class=&quot;err&quot;>→ hardware failed 10m later · its containers just vanished</span>`, d:260},
    {h:`<span class=&quot;cmt&quot;># which nodes are actually healthy? no idea. config drift everywhere.</span>`, d:220},
    {h:`<span class=&quot;err&quot;>[fail] manual placement · restarts · load-balancing … does not scale ✘</span>`, d:200},
  ],
  d1: [
    {h:`<span class=&quot;yk&quot;>apiVersion:</span> <span class=&quot;yv&quot;>apps/v1</span>`, d:70},
    {h:`<span class=&quot;yk&quot;>kind:</span> <span class=&quot;yv&quot;>Deployment</span>`, d:90},
    {h:`<span class=&quot;yk&quot;>metadata:</span>`, d:90},
    {h:`  <span class=&quot;yk&quot;>name:</span> <span class=&quot;yv&quot;>leopard-detect</span>`, d:90},
    {h:`<span class=&quot;yk&quot;>spec:</span>`, d:90},
    {h:`  <span class=&quot;yk&quot;>replicas:</span> <span class=&quot;yn&quot;>100</span>          <span class=&quot;yc&quot;># ← desired state</span>`, d:120},
    {h:`  <span class=&quot;yk&quot;>template:</span>`, d:90},
    {h:`    <span class=&quot;yk&quot;>spec:</span>`, d:80},
    {h:`      <span class=&quot;yk&quot;>containers:</span>`, d:90},
    {h:`      - <span class=&quot;yk&quot;>name:</span> <span class=&quot;yv&quot;>detector</span>`, d:90},
    {h:`        <span class=&quot;yk&quot;>image:</span> <span class=&quot;yv&quot;>leopard-detect:2.2</span>`, d:100},
    {h:`        <span class=&quot;yk&quot;>resources:</span> { <span class=&quot;yk&quot;>limits:</span> { <span class=&quot;yk&quot;>memory:</span> <span class=&quot;yn&quot;>2Gi</span> } }`, d:120},
  ],
  d2: [
    {h:`<span class=&quot;pmt ctrl&quot;>ops@k8s-ctrl</span><span class=&quot;dim&quot;>:~$</span> <span class=&quot;cmd&quot;>kubectl apply -f deployment.yaml</span>`, d:60, cursor:true},
    {h:`<span class=&quot;dim&quot;>deployment.apps/leopard-detect </span><span class=&quot;ok&quot;>created</span>`, d:520},
    {h:`<span class=&quot;pmt ctrl&quot;>ops@k8s-ctrl</span><span class=&quot;dim&quot;>:~$</span> <span class=&quot;cmd&quot;>kubectl get pods -o wide</span>`, d:320, cursor:true},
    {h:`<span class=&quot;dim&quot;>NAME                  READY  STATUS   NODE</span>`, d:240},
    {h:`<span class=&quot;dim&quot;>leopard-detect-x7k2   1/1    </span><span class=&quot;ok&quot;>Running</span><span class=&quot;dim&quot;>  node-03</span>`, d:150},
    {h:`<span class=&quot;dim&quot;>leopard-detect-q9m4   1/1    </span><span class=&quot;ok&quot;>Running</span><span class=&quot;dim&quot;>  node-11</span>`, d:150},
    {h:`<span class=&quot;dim&quot;>leopard-detect-b1t8   1/1    </span><span class=&quot;ok&quot;>Running</span><span class=&quot;dim&quot;>  node-27</span>`, d:150},
    {h:`<span class=&quot;dim&quot;>…97 more, </span><span class=&quot;ok&quot;>placed automatically by the scheduler</span>`, d:200},
    {h:`<span class=&quot;ok&quot;>[ok] 100/100 Running · you never picked a node ✔</span>`, d:220},
  ],
  d3: [
    {h:`<span class=&quot;pmt ctrl&quot;>ops@k8s-ctrl</span><span class=&quot;dim&quot;>:~$</span> <span class=&quot;cmd&quot;>kubectl delete pod leopard-detect-x7k2</span>   <span class=&quot;cmt&quot;># simulate a crash</span>`, d:60, cursor:true},
    {h:`<span class=&quot;dim&quot;>pod &quot;leopard-detect-x7k2&quot; deleted</span>`, d:480},
    {h:`<span class=&quot;pmt ctrl&quot;>ops@k8s-ctrl</span><span class=&quot;dim&quot;>:~$</span> <span class=&quot;cmd&quot;>kubectl get pods | grep -c Running</span>`, d:320, cursor:true},
    {h:`<span class=&quot;ok&quot;>100</span>   <span class=&quot;cmt&quot;># controller recreated it in seconds — new pod leopard-detect-m4p0</span>`, d:300},
    {h:`<span class=&quot;cmt&quot;># node-03 went offline → its pods rescheduled onto healthy nodes</span>`, d:240},
    {h:`<span class=&quot;ok&quot;>[ok] desired = 100 · actual = 100 · auto-healed ✔</span>`, d:200},
  ],
  d4: [
    {h:`<span class=&quot;pmt ctrl&quot;>ops@k8s-ctrl</span><span class=&quot;dim&quot;>:~$</span> <span class=&quot;cmd&quot;>kubectl scale deploy/leopard-detect --replicas=150</span>`, d:60, cursor:true},
    {h:`<span class=&quot;dim&quot;>deployment.apps/leopard-detect </span><span class=&quot;ok&quot;>scaled</span>`, d:420},
    {h:`<span class=&quot;pmt ctrl&quot;>ops@k8s-ctrl</span><span class=&quot;dim&quot;>:~$</span> <span class=&quot;cmd&quot;>kubectl set image deploy/leopard-detect detector=leopard-detect:2.3</span>`, d:320, cursor:true},
    {h:`<span class=&quot;dim&quot;>deployment.apps/leopard-detect </span><span class=&quot;ok&quot;>image updated</span>`, d:340},
    {h:`<span class=&quot;pmt ctrl&quot;>ops@k8s-ctrl</span><span class=&quot;dim&quot;>:~$</span> <span class=&quot;cmd&quot;>kubectl rollout status deploy/leopard-detect</span>`, d:300, cursor:true},
    {h:`<span class=&quot;dim&quot;>Waiting for rollout… </span><span class=&quot;ok&quot;>150 of 150 updated</span>`, d:360},
    {h:`<span class=&quot;ok&quot;>[ok] rolled out v2.3 · 0 downtime · auto-rollback on failure ✔</span>`, d:220},
  ],
};

/* ── step definitions (left side first, then right side) ── */
const STEPS = [
  {id:'t1', side:'left',  label:'Step 1 · Run a container by hand'},
  {id:'t2', side:'left',  label:'Step 2 · Crash at 3 AM · no self-healing'},
  {id:'t3', side:'left',  label:'Step 3 · Scale by hand · a node dies'},
  {id:'d1', side:'right', label:'Step 1 · Declare desired state (YAML)'},
  {id:'d2', side:'right', label:'Step 2 · Apply · scheduler places pods'},
  {id:'d3', side:'right', label:'Step 3 · Self-healing reconcile loop'},
  {id:'d4', side:'right', label:'Step 4 · Scale + zero-downtime rollout'},
];
const LAST_LEFT = 2;   // index of t3 — the K8s side unlocks only after this

function bodyEl(id){ return document.querySelector(`[data-term=&quot;${id}&quot;] .term-body`); }
function badgeEl(id){ return document.querySelector(`[data-term=&quot;${id}&quot;] .term-badge`); }
function cardEl(id){ return document.querySelector(`[data-term=&quot;${id}&quot;]`); }

const nextBtn = document.getElementById('nextBtn');
const stepLbl = document.getElementById('stepLbl');

let idx = -1;
let timers = [];
function clearTimers(){ timers.forEach(t=>clearTimeout(t)); timers = []; }

function resetAll(){
  clearTimers();
  STEPS.forEach(s=>{
    const b=bodyEl(s.id); if(b) b.innerHTML='';
    const bd=badgeEl(s.id); if(bd) bd.style.opacity=0;
    const c=cardEl(s.id); if(c) c.classList.remove('active');
  });
  idx = -1;
}

function setNext(state, label){
  nextBtn.textContent = label;
  nextBtn.disabled = (state==='wait');
  nextBtn.classList.toggle('ready', state==='ready');
  nextBtn.classList.toggle('finish', state==='finish');
}

function playStep(i){
  idx = i;
  const step = STEPS[i];
  const lines = T[step.id];
  const body = bodyEl(step.id);
  const card = cardEl(step.id);

  STEPS.forEach(s=>{ const c=cardEl(s.id); if(c) c.classList.remove('active'); });
  if(card){ card.classList.add('active'); card.scrollIntoView({behavior:'smooth', block:'center'}); }
  stepLbl.innerHTML = `<b>${step.label}</b>`;
  setNext('wait','… running');

  let t = 200;
  lines.forEach(line=>{
    t += line.d;
    timers.push(setTimeout(()=>{
      const oc = body.querySelector('.cursor'); if(oc) oc.remove();
      const div = document.createElement('div'); div.className='ln'; div.innerHTML = line.h;
      body.appendChild(div);
      requestAnimationFrame(()=> div.classList.add('show'));
      if(line.cursor){ const cur=document.createElement('span'); cur.className='cursor'; div.appendChild(cur); }
    }, t));
  });
  t += 240;
  timers.push(setTimeout(()=>{
    const oc = body.querySelector('.cursor'); if(oc) oc.remove();
    const bd = badgeEl(step.id); if(bd) bd.style.opacity=1;
    onStepDone(i);
  }, t));
}

function onStepDone(i){
  if(i >= STEPS.length-1){
    setNext('finish','✓ Complete · Replay');
    stepLbl.innerHTML = `<b style=&quot;color:var(--green)&quot;>All steps complete</b>`;
    return;
  }
  if(i === LAST_LEFT){
    setNext('ready','Start Kubernetes steps →');
    stepLbl.innerHTML = `<b style=&quot;color:var(--rose)&quot;>Left side complete.</b> Now the Kubernetes fix →`;
  } else {
    setNext('ready','Next step ▶');
  }
}

nextBtn.addEventListener('click', ()=>{
  if(nextBtn.classList.contains('finish')){ resetAll(); playStep(0); return; }
  if(nextBtn.disabled) return;
  if(idx+1 < STEPS.length) playStep(idx+1);
});
document.getElementById('restart').addEventListener('click', ()=>{ resetAll(); playStep(0); });
document.getElementById('replay').addEventListener('click', ()=>{ resetAll(); playStep(0); });

/* start with step 1, then pause for the presenter */
resetAll();
playStep(0);
</script>

.node-tag.up{ color:var(--green); background:rgba(74,222,128,.12); border:1px solid rgba(74,222,128,.35); }
.node-tag.down{ color:var(--rose); background:rgba(251,94,109,.14); border:1px solid rgba(251,94,109,.4); }
.node-tag.recover{ color:var(--amber); background:rgba(251,191,36,.12); border:1px solid rgba(251,191,36,.4); }
.pods{ display:flex; flex-wrap:wrap; gap:9px; padding:14px; min-height:110px; align-content:flex-start; }
.node.down{ border-color:rgba(251,94,109,.5); opacity:.55; filter:grayscale(.5); }
.node.down .pods::after{ content:&quot;NotReady&quot;; position:absolute; inset:auto 0 12px 0; text-align:center;
  font-family:&quot;IBM Plex Mono&quot;; font-size:.7rem; color:var(--rose); letter-spacing:2px; }

/* pod */
.pod{ width:28px; height:28px; border-radius:50%; position:relative; transform:scale(0);
  transition:transform .3s cubic-bezier(.34,1.6,.64,1), opacity .25s; cursor:pointer; }
.pod::after{ content:&quot;⬡&quot;; position:absolute; inset:0; display:grid; place-items:center; font-size:.7rem; color:rgba(0,0,0,.35); }
.pod.running{ transform:scale(1); background:radial-gradient(circle at 34% 30%, #86efac, #22c55e);
  box-shadow:0 0 0 1px rgba(74,222,128,.55), 0 0 10px -2px rgba(74,222,128,.75); animation:podPulse 2.6s ease-in-out infinite; }
.pod.pending{ transform:scale(1); background:radial-gradient(circle at 34% 30%, #fde68a,#f59e0b);
  box-shadow:0 0 0 1px rgba(251,191,36,.55); animation:podSpin 1s linear infinite; }
.pod.crashing{ transform:scale(1.18); background:radial-gradient(circle at 34% 30%, #fca5a5,#ef4444);
  box-shadow:0 0 14px 2px rgba(239,68,68,.85); animation:crashFlash .28s steps(1) infinite; }
.pod.gone{ transform:scale(0); opacity:0; }
@keyframes podPulse{ 0%,100%{ box-shadow:0 0 0 1px rgba(74,222,128,.55), 0 0 8px -2px rgba(74,222,128,.6) } 50%{ box-shadow:0 0 0 1px rgba(74,222,128,.7), 0 0 14px 0 rgba(74,222,128,.9) } }
@keyframes podSpin{ 0%{ filter:brightness(1) } 50%{ filter:brightness(1.35) } 100%{ filter:brightness(1) } }
@keyframes crashFlash{ 0%{ opacity:1 } 50%{ opacity:.4 } 100%{ opacity:1 } }

/* controls + log */
.footer{ display:flex; gap:14px; align-items:stretch; margin-top:12px; flex-shrink:0; height:104px; }
.controls{ display:flex; flex-wrap:wrap; gap:8px; align-content:flex-start; width:52%; }
.btn{ font-family:&quot;Space Grotesk&quot;; font-weight:600; font-size:.74rem; border-radius:9px; padding:9px 13px;
  cursor:pointer; border:1px solid var(--line); background:var(--panel2); color:var(--ink); display:flex; align-items:center; gap:7px; transition:.15s; }
.btn:hover{ border-color:var(--ink-dim); }
.btn.crash{ border-color:rgba(251,94,109,.45); color:#ffd0d5; }
.btn.crash:hover{ background:rgba(251,94,109,.14); }
.btn.kill{ border-color:rgba(251,146,60,.45); color:#ffe0c2; }
.btn.kill:hover{ background:rgba(251,146,60,.14); }
.btn.scale{ border-color:rgba(50,108,229,.5); color:#cfe0ff; }
.btn.scale:hover{ background:rgba(50,108,229,.16); }
.btn.chaos.on{ background:rgba(232,121,249,.16); border-color:rgba(232,121,249,.6); color:#f5d0fe; }
.log{ flex:1; background:#05090F; border:1px solid var(--line); border-radius:10px; padding:9px 12px;
  font-family:&quot;IBM Plex Mono&quot;; font-size:.66rem; line-height:1.6; overflow-y:auto; }
.log .ll{ white-space:pre-wrap; }
.log .sched{ color:var(--kube); } .log .ok{ color:var(--green); } .log .err{ color:var(--rose); }
.log .warn{ color:var(--amber); } .log .dim{ color:var(--ink-dim); }
.log::-webkit-scrollbar{ width:7px; } .log::-webkit-scrollbar-thumb{ background:var(--line); border-radius:6px; }
.legend{ display:flex; gap:14px; align-items:center; margin-top:2px; }
.legend .lg{ display:flex; align-items:center; gap:6px; font-family:&quot;IBM Plex Mono&quot;; font-size:.6rem; color:var(--ink-dim); }
.legend .d{ width:12px;height:12px;border-radius:50%; }
</style>
</head>
<body>

<div class=&quot;top-header&quot;>
  <div class=&quot;logo-glyph&quot;>☸️</div>
  <div class=&quot;logo-txt&quot;><b>Kubernetes Cluster</b><span>Self-Healing · Live Reconcile Demo</span></div>
  <div class=&quot;hdr-spacer&quot;></div>
  <div class=&quot;hdr-chip&quot;>Nodes <b id=&quot;c-nodes&quot;>4 / 4 Ready</b></div>
  <div class=&quot;hdr-chip&quot;>Pods <b id=&quot;c-pods&quot;>0 Running</b></div>
</div>

<div class=&quot;stage&quot;>
  <div id=&quot;diagram&quot;>
    <!-- control plane -->
    <div class=&quot;control-plane&quot; id=&quot;cp&quot;>
      <div class=&quot;cp-top&quot;>
        <div class=&quot;cp-ic&quot;>🧭</div>
        <div class=&quot;cp-title&quot;><b>Control Plane</b><span>scheduler · controller-manager · etcd</span></div>
        <div class=&quot;cp-reconcile&quot;><span class=&quot;recon-dot&quot; id=&quot;reconDot&quot;></span><span class=&quot;recon-txt&quot;>reconcile loop</span></div>
      </div>
      <div class=&quot;cp-stats&quot;>
        <div class=&quot;stat&quot;><div class=&quot;v&quot; id=&quot;s-desired&quot; style=&quot;color:var(--kube)&quot;>12</div><div class=&quot;l&quot;>Desired replicas</div></div>
        <div class=&quot;stat&quot;><div class=&quot;v match&quot; id=&quot;s-actual&quot;>0</div><div class=&quot;l&quot;>Actual running</div></div>
        <div class=&quot;stat&quot;><div class=&quot;v&quot; id=&quot;s-nodes&quot; style=&quot;color:var(--teal)&quot;>4</div><div class=&quot;l&quot;>Ready nodes</div></div>
      </div>
    </div>

    <!-- svg overlay: links + scheduling packets -->
    <svg id=&quot;overlay&quot;><g id=&quot;links&quot;></g></svg>

    <!-- nodes -->
    <div class=&quot;nodes&quot; id=&quot;nodes&quot;></div>
  </div>

  <div class=&quot;footer&quot;>
    <div style=&quot;width:52%; display:flex; flex-direction:column; gap:8px;&quot;>
      <div class=&quot;controls&quot;>
        <button class=&quot;btn crash&quot; id=&quot;b-crash&quot;>💥 Crash a pod</button>
        <button class=&quot;btn kill&quot;  id=&quot;b-kill&quot;>☠ Kill a node</button>
        <button class=&quot;btn scale&quot; id=&quot;b-up&quot;>＋ Scale up</button>
        <button class=&quot;btn scale&quot; id=&quot;b-down&quot;>－ Scale down</button>
        <button class=&quot;btn chaos&quot; id=&quot;b-chaos&quot;>🎲 Auto-chaos: off</button>
        <button class=&quot;btn&quot; id=&quot;b-reset&quot;>⟲ Reset</button>
      </div>
      <div class=&quot;legend&quot;>
        <span class=&quot;lg&quot;><span class=&quot;d&quot; style=&quot;background:#22c55e&quot;></span>Running</span>
        <span class=&quot;lg&quot;><span class=&quot;d&quot; style=&quot;background:#f59e0b&quot;></span>Pending / scheduling</span>
        <span class=&quot;lg&quot;><span class=&quot;d&quot; style=&quot;background:#ef4444&quot;></span>Crashing</span>
        <span class=&quot;lg&quot;><span class=&quot;d&quot; style=&quot;background:var(--kube)&quot;></span>Scheduler packet</span>
      </div>
    </div>
    <div class=&quot;log&quot; id=&quot;log&quot;></div>
  </div>
</div>

<script>
const SVGNS=&quot;http://www.w3.org/2000/svg&quot;;
const NODE_IDS=['node-01','node-02','node-03','node-04'];
const NODE_SUB={'node-01':'edge-zone-a','node-02':'edge-zone-b','node-03':'edge-zone-c','node-04':'edge-zone-d'};
const CAP=6;                 // visual pod capacity per node
const RECONCILE_MS=1000;

const diagram=document.getElementById('diagram');
const overlay=document.getElementById('overlay');
const linksG=document.getElementById('links');
const nodesWrap=document.getElementById('nodes');
const logEl=document.getElementById('log');
const reconDot=document.getElementById('reconDot');

let desired=12, seq=0, auto=false;
let pods=[];                 // {id,node,state,el}
let nodeState={};           // id -> {up,el,podsEl,tag,recoverT}

/* ── build node blocks ── */
NODE_IDS.forEach(id=>{
  const block=document.createElement('div'); block.className='node'; block.id='n-'+id;
  block.innerHTML=`<div class=&quot;node-bar&quot;>
      <span class=&quot;node-name&quot;>${id}</span><span class=&quot;node-sub&quot;>· ${NODE_SUB[id]}</span>
      <span class=&quot;node-tag up&quot;>● Ready</span></div>
    <div class=&quot;pods&quot;></div>`;
  nodesWrap.appendChild(block);
  nodeState[id]={up:true, el:block, podsEl:block.querySelector('.pods'), tag:block.querySelector('.node-tag'), recoverT:null};
});

/* ── helpers ── */
function countPods(id){ return pods.filter(p=>p.node===id).length; }
function upNodes(){ return NODE_IDS.filter(id=>nodeState[id].up); }
function healthyPods(){ return pods.filter(p=>nodeState[p.node].up &amp;&amp; p.state!=='crashing'); }

function log(msg, cls){
  const d=document.createElement('div'); d.className='ll '+(cls||'dim');
  const t=new Date().toTimeString().slice(0,8);
  d.textContent=`${t}  ${msg}`;
  logEl.insertBefore(d, logEl.firstChild);
  while(logEl.children.length>60) logEl.removeChild(logEl.lastChild);
}

/* ── svg link geometry ── */
function cpAnchor(){ const r=document.getElementById('cp').getBoundingClientRect(), d=diagram.getBoundingClientRect();
  return {x:r.left+r.width/2-d.left, y:r.bottom-d.top}; }
function nodeAnchor(id){ const r=nodeState[id].el.getBoundingClientRect(), d=diagram.getBoundingClientRect();
  return {x:r.left+r.width/2-d.left, y:r.top-d.top}; }

function drawLinks(){
  linksG.innerHTML='';
  const c=cpAnchor();
  NODE_IDS.forEach(id=>{
    const n=nodeAnchor(id);
    const midY=(c.y+n.y)/2;
    const path=document.createElementNS(SVGNS,'path');
    path.setAttribute('d',`M ${c.x} ${c.y} C ${c.x} ${midY}, ${n.x} ${midY}, ${n.x} ${n.y}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke', nodeState[id].up?'rgba(50,108,229,.28)':'rgba(251,94,109,.25)');
    path.setAttribute('stroke-width','1.4');
    path.setAttribute('stroke-dasharray','5 5');
    path.dataset.node=id;
    linksG.appendChild(path);
  });
}
window.addEventListener('resize', drawLinks);

/* ── scheduling packet along the curve ── */
function schedulePacket(nodeId, color, cb){
  const c=cpAnchor(), n=nodeAnchor(nodeId);
  const midY=(c.y+n.y)/2;
  const dot=document.createElementNS(SVGNS,'circle');
  dot.setAttribute('r','4.5'); dot.setAttribute('fill',color);
  dot.style.filter='drop-shadow(0 0 5px '+color+')';
  overlay.appendChild(dot);
  // cubic bezier point
  function bez(t){ const u=1-t;
    const x=u*u*u*c.x + 3*u*u*t*c.x + 3*u*t*t*n.x + t*t*t*n.x;
    const y=u*u*u*c.y + 3*u*u*t*c.y + 3*u*t*t*midY + t*t*t*n.y;
    return {x,y};
  }
  const t0=performance.now(), dur=640;
  function anim(now){
    let k=(now-t0)/dur; if(k>=1){ dot.remove(); if(cb) cb(); return; }
    const p=bez(k); dot.setAttribute('cx',p.x); dot.setAttribute('cy',p.y);
    dot.setAttribute('opacity', k<.85?1:(1-(k-.85)/.15));
    requestAnimationFrame(anim);
  }
  requestAnimationFrame(anim);
}

/* ── pod lifecycle ── */
function createPod(nodeId, instant){
  const id='pod-'+String(++seq).padStart(3,'0');
  const el=document.createElement('div'); el.className='pod pending'; el.title=id;
  nodeState[nodeId].podsEl.appendChild(el);
  const p={id, node:nodeId, state:'pending', el};
  pods.push(p);
  el.addEventListener('click', ()=>crashPod(p));
  const toRun=()=>{ if(p.state==='pending'){ p.state='running'; el.classList.remove('pending'); el.classList.add('running'); updateStats(); } };
  setTimeout(toRun, instant?260:640);
  updateStats();
  return p;
}
function removePod(p){
  p.el.classList.add('gone');
  setTimeout(()=>{ if(p.el.parentNode) p.el.remove(); }, 280);
  pods=pods.filter(x=>x!==p);
  updateStats();
}
function crashPod(p){
  if(!p || p.state==='crashing' || !nodeState[p.node].up) return;
  p.state='crashing'; p.el.className='pod crashing';
  log(`⚠ ${p.id} crashed on ${p.node} · exit(137) OOMKilled`, 'err');
  setTimeout(()=>removePod(p), 620);
}
function crashRandom(){
  const cands=healthyPods().filter(p=>p.state==='running');
  if(!cands.length){ log('no running pods to crash','dim'); return; }
  crashPod(cands[Math.floor(Math.random()*cands.length)]);
}

/* ── node failure / recovery ── */
function killNode(id){
  const ns=nodeState[id]; if(!ns.up) return;
  ns.up=false; ns.el.classList.add('down');
  ns.tag.className='node-tag down'; ns.tag.textContent='✘ NotReady';
  const lost=countPods(id);
  log(`☠ ${id} NotReady · ${lost} pod(s) lost → controller will reschedule`, 'err');
  pods.filter(p=>p.node===id).forEach(p=>{ p.el.classList.add('gone'); setTimeout(()=>{ if(p.el.parentNode)p.el.remove(); },280); });
  pods=pods.filter(p=>p.node!==id);
  drawLinks(); updateStats();
  clearTimeout(ns.recoverT);
  ns.tag.className='node-tag recover'; setTimeout(()=>{ if(!ns.up) ns.tag.textContent='… recovering'; }, 900);
  ns.recoverT=setTimeout(()=>recoverNode(id), 6500);
}
function killRandom(){
  const up=upNodes(); if(up.length<=1){ log('refusing to kill the last node','warn'); return; }
  killNode(up[Math.floor(Math.random()*up.length)]);
}
function recoverNode(id){
  const ns=nodeState[id]; ns.up=true; ns.el.classList.remove('down');
  ns.tag.className='node-tag up'; ns.tag.textContent='● Ready';
  log(`✔ ${id} recovered · Ready to schedule`, 'ok');
  drawLinks(); updateStats();
}

/* ── reconcile loop: make actual match desired ── */
function pickNode(){
  const up=upNodes(); if(!up.length) return null;
  up.sort((a,b)=>countPods(a)-countPods(b));
  return up.find(id=>countPods(id)<CAP) || up[0];
}
function reconcile(){
  reconDot.classList.remove('beat'); void reconDot.offsetWidth; reconDot.classList.add('beat');
  const actual=healthyPods().length;
  if(actual<desired){
    const target=pickNode();
    if(target){
      log(`scheduler ▸ desired ${desired} > actual ${actual} · binding new pod → ${target}`, 'sched');
      schedulePacket(target, '#326CE5', ()=>createPod(target));
    }
  } else if(actual>desired){
    const extra=healthyPods();
    const victim=extra[extra.length-1];
    if(victim){ log(`scaled down ▸ terminating ${victim.id} on ${victim.node}`, 'dim'); removePod(victim); }
  }
  updateStats();
}

/* ── stats ── */
function updateStats(){
  const running=healthyPods().length;
  const ready=upNodes().length;
  document.getElementById('s-desired').textContent=desired;
  const a=document.getElementById('s-actual'); a.textContent=running;
  a.className='v '+(running===desired?'match':'miss');
  document.getElementById('s-nodes').textContent=ready;
  document.getElementById('c-nodes').textContent=`${ready} / 4 Ready`;
  document.getElementById('c-pods').textContent=`${running} Running`;
}

/* ── seed the cluster ── */
function seed(){
  pods.slice().forEach(p=>{ if(p.el.parentNode) p.el.remove(); });
  pods=[];
  let i=0;
  const per=Math.floor(desired/NODE_IDS.length);
  let placed=0;
  NODE_IDS.forEach(id=>{ for(let k=0;k<per;k++){ createPod(id,true); placed++; } });
  while(placed<desired){ createPod(NODE_IDS[placed%NODE_IDS.length],true); placed++; }
  log(`cluster up ▸ ${desired} pods scheduled across 4 nodes`, 'ok');
}

/* ── controls ── */
document.getElementById('b-crash').onclick=crashRandom;
document.getElementById('b-kill').onclick=killRandom;
document.getElementById('b-up').onclick=()=>{ desired=Math.min(desired+2,24); log(`scaled up ▸ desired replicas = ${desired}`, 'sched'); updateStats(); };
document.getElementById('b-down').onclick=()=>{ desired=Math.max(desired-2,0); log(`scaled down ▸ desired replicas = ${desired}`, 'sched'); updateStats(); };
document.getElementById('b-reset').onclick=()=>{
  NODE_IDS.forEach(id=>{ const ns=nodeState[id]; clearTimeout(ns.recoverT); if(!ns.up) recoverNode(id); });
  desired=12; seed(); updateStats();
};
const chaosBtn=document.getElementById('b-chaos');
let chaosT=null;
chaosBtn.onclick=()=>{
  auto=!auto; chaosBtn.classList.toggle('on',auto);
  chaosBtn.textContent=`🎲 Auto-chaos: ${auto?'on':'off'}`;
  if(auto){ log('auto-chaos engaged · random failures incoming','warn');
    chaosT=setInterval(()=>{ Math.random()<0.78?crashRandom():killRandom(); }, 2600); }
  else { clearInterval(chaosT); log('auto-chaos disengaged','dim'); }
};

/* ── boot ── */
function boot(){ drawLinks(); seed(); updateStats(); setInterval(reconcile, RECONCILE_MS); }
window.addEventListener('load', ()=> setTimeout(boot, 60));
</script>
</body>

<style>

/* Path direction labels */
.path-lbl{position:absolute;font-size:8px;font-family:'IBM Plex Mono',monospace;opacity:.38;pointer-events:none;white-space:nowrap}

/* Nodes */
.node{position:absolute;border-radius:9px;padding:10px 12px;border:1.5px solid;transition:box-shadow .35s,border-color .35s,background .35s}
.ntitle{font-weight:600;font-size:11px;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.nbody{font-size:9.5px;color:var(--ink-dim);line-height:1.6;font-family:'IBM Plex Mono',monospace}
.nst{margin-top:7px;font-size:9.5px;font-family:'IBM Plex Mono',monospace;padding:2px 8px;border-radius:10px;display:inline-flex;align-items:center;gap:4px;transition:color .35s,background .35s}

/* Node themes */
.n-laptop{border-color:rgba(59,130,246,.28);background:rgba(59,130,246,.04)}
.n-laptop.lit{box-shadow:0 0 20px rgba(59,130,246,.3);border-color:rgba(59,130,246,.7)}
.n-server{border-color:rgba(245,158,11,.28);background:rgba(245,158,11,.04)}

.n-server.conn{border-color:rgba(34,197,94,.5)!important;background:rgba(34,197,94,.07)!important;box-shadow:0 0 22px rgba(34,197,94,.25)!important}

/* Terminal lines inside nodes */
.term-line{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#22c55e;margin-top:4px}
.cursor{animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* sshd badge */
.sshd-badge{display:flex;align-items:center;gap:6px;font-size:9px;font-family:'IBM Plex Mono',monospace;color:#22c55e;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.22);border-radius:7px;padding:3px 8px;margin-top:6px}
.sshd-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 1.4s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Internet box */
.inet-box{position:absolute;border:1.5px dashed rgba(100,116,139,.3);border-radius:12px;background:rgba(100,116,139,.04);padding:10px;text-align:center}
.inet-icon{font-size:24px;line-height:1;margin-bottom:3px}
.inet-name{font-size:11px;font-weight:600;color:var(--ink-dim);margin-bottom:2px}
.inet-sub{font-size:8px;font-family:'IBM Plex Mono',monospace;color:var(--ink-faint);line-height:1.5}
.inet-cnt{font-size:8.5px;font-family:'IBM Plex Mono',monospace;color:var(--cyan);margin-top:4px;border-top:1px solid rgba(255,255,255,.07);padding-top:3px}

/* Floating packet annotation pills */
.pkt-ann{position:absolute;font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:600;padding:3px 10px;border-radius:10px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.a-syn{color:#3b82f6;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.35)}
.a-sak{color:#22c55e;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.35)}
.a-ack{color:#3b82f6;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.35)}
.a-kex{color:#a78bfa;background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.35)}
.a-auth{color:#f59e0b;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35)}

/* Port badge on laptop */
.port-badge{margin-top:5px;font-size:8.5px;font-family:'IBM Plex Mono',monospace;color:var(--ink-faint)}

/* Socket box */
.socket-box{position:absolute;border:1.5px solid rgba(0,212,255,.38);border-radius:10px;background:rgba(0,212,255,.05);padding:10px 16px}
.sock-title{font-size:10px;font-weight:600;color:#00d4ff;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.sock-pair{font-family:'IBM Plex Mono',monospace;font-size:12px;display:flex;align-items:center;gap:6px;margin-bottom:5px}

/* Encryption badge */

</style>

<script>
/* ── Packet animation (relative to #rp) ── */
function animPkt(x1,y1,x2,y2,col,dur,cb){
  var rp=document.getElementById('rp');
  var p=document.createElement('div');p.className='pkt';
  p.style.cssText='background:'+col+';box-shadow:0 0 10px '+col+';left:'+x1+'px;top:'+y1+'px;';
  rp.appendChild(p);
  var t0=null;
  function step(ts){
    if(!t0)t0=ts;
    var f=Math.min((ts-t0)/dur,1);
    var e=f<.5?2*f*f:1-Math.pow(-2*f+2,2)/2;
    p.style.left=(x1+(x2-x1)*e)+'px';
    p.style.top=(y1+(y2-y1)*e)+'px';
    if(f<1)requestAnimationFrame(step);
    else{p.remove();if(cb)cb();}
  }
  requestAnimationFrame(step);
}
function animWay(pts,col,dur,cb){
  var i=0;
  function next(){if(i>=pts.length-1){if(cb)cb();return;}
    animPkt(pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1],col,dur,function(){i++;next();});}
  next();
}
function burst(pts,col,dur,n,gap,cb){
  var done=0;
  for(var i=0;i<n;i++){(function(d){setTimeout(function(){
    animWay(pts,col,dur,function(){done++;if(done===n&amp;&amp;cb)cb();});},d);})(i*gap);}
}

/* Path coords (right-panel relative) */
/* Forward (L→R) y=162 */
var LF=[191,162],NF=[420,162],SF=[650,162];
/* Return (R→L) y=180 */
var SR=[650,180],NR=[420,180],LR=[191,180];

var stage=0,busy=false,pktN=0;

function incPkt(n){
  pktN+=(n||1);
  document.getElementById('inet-cnt').textContent=pktN+' packet'+(pktN===1?'':' s')+' routed';
}
function ann(id,on){var e=document.getElementById(id);if(e)e.style.opacity=on?'1':'0';}
function log(t){document.getElementById('step-log').textContent=t;}
function lbl(t,c){document.getElementById('bdot').style.background=c||'#94a3b8';document.getElementById('blbl').textContent=t;}
function setSt(id,html,col,bg){
  var e=document.getElementById(id);if(!e)return;
  e.innerHTML=html;e.style.color=col;e.style.background=bg;
}

/* ── Stage 1: TCP 3-Way Handshake ── */
function stageTCP(cb){
  if(busy||stage>=1)return;busy=true;
  document.getElementById('btn-tcp').disabled=true;
  document.getElementById('n-laptop').classList.add('lit');
  document.getElementById('term-cmd').style.opacity='1';
  lbl('TCP Handshake in progress...','#3b82f6');
  setSt('st-laptop','⌨ Connecting...','#3b82f6','rgba(59,130,246,.1)');
  log('Step 1/3 — TCP SYN: &quot;I want to connect to port 22&quot;');

  /* SYN → */
  ann('ann-syn',true);
  animWay([LF,NF,SF],'#3b82f6',480,function(){
    incPkt();
    ann('ann-syn',false);
    document.getElementById('n-server').classList.add('lit');
    setSt('st-server','● SYN received on :22','#3b82f6','rgba(59,130,246,.1)');
    log('SYN received by sshd on port 22. Sending SYN-ACK...');

    /* ← SYN-ACK */
    setTimeout(function(){
      ann('ann-sak',true);
      animWay([SR,NR,LR],'#22c55e',480,function(){
        incPkt();
        ann('ann-sak',false);
        setSt('st-laptop','● SYN-ACK received','#22c55e','rgba(34,197,94,.1)');
        log('SYN-ACK received. Sending final ACK...');

        /* ACK → */
        setTimeout(function(){
          ann('ann-ack',true);
          animWay([LF,NF,SF],'#3b82f6',480,function(){
            incPkt();
            ann('ann-ack',false);
            /* Connection established */
            document.getElementById('port-badge').style.display='block';
            document.getElementById('socket-box').style.display='block';
            setSt('st-laptop','🔌 TCP Connected','#22c55e','rgba(34,197,94,.1)');
            setSt('st-server','🔌 TCP Connected','#22c55e','rgba(34,197,94,.1)');
            lbl('TCP connection established!','#22c55e');
            log('TCP connection established! Socket: 192.168.1.5:34543 ↔ 88.222.212.223:22 · Now starting SSH handshake...');
            document.getElementById('btn-ssh').disabled=false;
            stage=1;busy=false;if(cb)cb();
          });
        },450);
      });
    },500);
  });
}

/* ── Stage 2: SSH Key Negotiation ── */
function stageSSH(cb){
  if(busy||stage<1||stage>=2)return;busy=true;
  document.getElementById('btn-ssh').disabled=true;
  lbl('SSH key exchange in progress...','#a78bfa');
  log('Step 2/3 — SSH_MSG_KEXINIT: advertising supported algorithms...');

  ann('ann-kex',true);
  burst([LF,NF,SF],'#a78bfa',400,2,140,function(){
    incPkt(2);
    ann('ann-kex',false);
    log('Server responding with host key and Diffie-Hellman parameters...');
    setTimeout(function(){
      ann('ann-kex2',true);
      burst([SR,NR,LR],'#a78bfa',400,2,140,function(){
        incPkt(2);
        ann('ann-kex2',false);
        log('Client sending DH key exchange reply — shared secret derived...');
        setTimeout(function(){
          ann('ann-kex3',true);
          burst([LF,NF,SF],'#a78bfa',400,2,140,function(){
            incPkt(2);
            ann('ann-kex3',false);
            /* Encryption active */
            document.getElementById('enc-badge').style.display='block';
            setSt('st-laptop','🔒 Encrypted session','#a78bfa','rgba(167,139,250,.1)');
            setSt('st-server','🔒 Encrypted session','#a78bfa','rgba(167,139,250,.1)');
            lbl('Encryption active — now authenticating...','#a78bfa');
            log('AES-256 encryption active. All subsequent data is encrypted. Now authenticating as bravo...');
            document.getElementById('btn-auth').disabled=false;
            stage=2;busy=false;if(cb)cb();
          });
        },450);
      });
    },500);
  });
}

/* ── Stage 3: Authentication ── */
function stageAuth(cb){
  if(busy||stage<2||stage>=3)return;busy=true;
  document.getElementById('btn-auth').disabled=true;
  lbl('Authenticating...','#f59e0b');
  log('Step 3/3 — SSH_MSG_USERAUTH_REQUEST: bravo authenticating with password/key...');

  ann('ann-auth',true);
  animWay([LF,NF,SF],'#f59e0b',520,function(){
    incPkt();
    ann('ann-auth',false);
    setTimeout(function(){
      /* Auth success */
      document.getElementById('n-server').classList.remove('lit');
      document.getElementById('n-server').classList.add('conn');
      document.getElementById('n-laptop').classList.remove('lit');
      document.getElementById('n-laptop').classList.add('lit');
      document.getElementById('term-shell').style.display='block';
      setSt('st-laptop','🎉 Shell Active','#22c55e','rgba(34,197,94,.1)');
      setSt('st-server','✅ bravo@server:~$','#22c55e','rgba(34,197,94,.1)');
      lbl('Secure shell active!','#22c55e');
      log('Authentication successful! Secure encrypted shell session is now active. Type commands — they flow through the same encrypted socket.');
      stage=3;busy=false;if(cb)cb();
    },600);
  });
}

function fullDemo(){
  resetAll();
  setTimeout(function(){
    stageTCP(function(){
      setTimeout(function(){
        stageSSH(function(){
          setTimeout(stageAuth,600);
        });
      },600);
    });
  },300);
}

function resetAll(){
  busy=false;stage=0;pktN=0;
  document.getElementById('n-laptop').classList.remove('lit');
  document.getElementById('n-server').classList.remove('lit','conn');
  document.getElementById('term-cmd').style.opacity='.35';
  document.getElementById('port-badge').style.display='none';
  document.getElementById('socket-box').style.display='none';
  document.getElementById('enc-badge').style.display='none';
  document.getElementById('term-shell').style.display='none';
  document.getElementById('inet-cnt').textContent='0 packets routed';
  ['ann-syn','ann-sak','ann-ack','ann-kex','ann-kex2','ann-kex3','ann-auth'].forEach(function(id){ann(id,false);});
  setSt('st-laptop','● Idle','#94a3b8','rgba(100,116,139,.1)');
  setSt('st-server','● Waiting','#94a3b8','rgba(100,116,139,.1)');
  lbl('Ready · click ① TCP Handshake to start','#94a3b8');
  log('Click ① TCP Handshake to begin the SSH connection flow');
  document.getElementById('btn-tcp').disabled=false;
  document.getElementById('btn-ssh').disabled=true;
  document.getElementById('btn-auth').disabled=true;
}
</script>
</body>

<script>
var tb=document.getElementById('tb');
var cur=document.getElementById('cur');
var sl=document.getElementById('sl');
var pt=document.getElementById('pt');
var sv=document.getElementById('sv');
var stage=0,busy=false;
function log(m){sl.textContent=m;}

function tline(cls,txt){
  var d=document.createElement('div');
  d.className=cls;d.textContent=txt;
  tb.insertBefore(d,cur);
  tb.scrollTop=tb.scrollHeight;
}

function ttype(prompt,cmd,outLines,cb){
  var row=document.createElement('div');
  var ps=document.createElement('span');
  ps.className='tp';ps.textContent=prompt+' ';
  var cs=document.createElement('span');
  cs.className='tc';
  row.appendChild(ps);row.appendChild(cs);
  tb.insertBefore(row,cur);
  var i=0;
  function nc(){
    if(i<cmd.length){
      cs.textContent+=cmd[i++];
      tb.scrollTop=tb.scrollHeight;
      setTimeout(nc,35+Math.random()*25);
    } else {
      setTimeout(function(){
        if(outLines)outLines.forEach(function(l){tline(l[0],l[1]);});
        tb.scrollTop=tb.scrollHeight;
        setTimeout(cb||function(){},250);
      },160);
    }
  }
  nc();
}

function mkn(id,pid,name,state,x,y,cls){
  var d=document.createElement('div');
  d.className='pn'+(cls?' '+cls:'');
  d.id='pn-'+id;
  d.style.cssText='left:'+x+'px;top:'+y+'px;';
  d.innerHTML='<span class=&quot;pid&quot;>PID '+pid+'</span> <span class=&quot;pnm&quot;>'+name+'</span><br><span class=&quot;pst&quot;>'+state+'</span>';
  pt.appendChild(d);
}
function shn(id,delay){
  setTimeout(function(){
    var e=document.getElementById('pn-'+id);
    if(e)e.classList.add('show');
  },delay);
}
function drl(x1,y1,x2,y2,col,delay){
  setTimeout(function(){
    var l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y1);
    l.setAttribute('x2',x2);l.setAttribute('y2',y2);
    l.setAttribute('stroke',col||'#334155');
    l.setAttribute('stroke-width','1.5');
    sv.appendChild(l);
  },delay);
}

function stageCmds(cb){
  if(busy||stage>=1)return;busy=true;
  log('Stage 1: Running basic Linux commands...');
  var cmds=[
    {p:'vivek@ubuntu:~$',cmd:'pwd',
     out:[['to','/home/vivek']],t:0},
    {p:'vivek@ubuntu:~$',cmd:'ls -la',
     out:[['to','total 48'],
          ['to','drwxr-xr-x 5 vivek vivek 4096 Jun 14 .'],
          ['to','drwxr-xr-x 3 root  root  4096 Jun 14 ..'],
          ['to','-rw-r--r-- 1 vivek vivek  220 Jun 14 .bashrc'],
          ['to','drwxr-xr-x 2 vivek vivek 4096 Jun 14 projects/']],t:1500},
    {p:'vivek@ubuntu:~$',cmd:'cat /etc/hostname',
     out:[['to','ubuntu-server']],t:4800},
    {p:'vivek@ubuntu:~$',cmd:'file /dev/sda',
     out:[['to','/dev/sda: block special (8/0) — a device, but still a file!']],t:6700},
    {p:'vivek@ubuntu:~$',cmd:'stat .bashrc',
     out:[['to','  File: .bashrc'],
          ['to','  Size: 220   Inode: 131073   Links: 1'],
          ['to','Access: -rw-r--r--  Uid: 1000  Gid: 1000']],t:8700},
    {p:'vivek@ubuntu:~$',cmd:'chmod 755 projects/',
     out:[['to','# sets: owner=rwx  group=r-x  others=r-x']],t:11400},
  ];
  cmds.forEach(function(s){
    setTimeout(function(){ttype(s.p,s.cmd,s.out);},s.t);
  });
  setTimeout(function(){
    stage=1;busy=false;
    document.getElementById('b2').disabled=false;
    document.getElementById('b2').style.opacity='1';
    log('Stage 1 done — notice Inode: 131073 in stat output. Next: process tree.');
    if(cb)cb();
  },14800);
}

function stageProcs(cb){
  if(busy||stage<1||stage>=2)return;busy=true;
  log('Stage 2: Mapping the live process tree...');
  ttype('vivek@ubuntu:~$','ps aux | head -6',[
    ['to','USER     PID %CPU %MEM COMMAND'],
    ['to','root       1  0.0  0.1 /sbin/init (systemd)'],
    ['to','root     312  0.0  0.2 sshd: /usr/sbin/sshd -D'],
    ['to','root     313  0.0  0.1 /usr/sbin/cron -f'],
    ['to','vivek   1001  0.1  0.3 -bash'],
    ['to','vivek   2099  0.0  0.1 ps aux'],
  ]);
  setTimeout(function(){
    mkn('init',1,'systemd','ancestor of all processes',233,5,'');
    shn('init',0);
    log('PID 1 (systemd): first process after kernel boot — parent of everything');
  },2600);
  setTimeout(function(){
    mkn('sshd',312,'sshd','daemon · port 22',20,95,'dm');
    shn('sshd',0);
    drl(310,45,97,95,'#22c55e',0);
    log('sshd forked from systemd — runs as a daemon with no controlling terminal');
  },3900);
  setTimeout(function(){
    mkn('cron',313,'cron','daemon · cron jobs',195,95,'');
    shn('cron',0);
    drl(310,45,272,95,'#fb923c',0);
  },4800);
  setTimeout(function(){
    mkn('bash',1001,'bash','interactive shell',375,95,'');
    shn('bash',0);
    drl(310,45,452,95,'#64748b',0);
    log('bash (PID 1001): your interactive shell, also a child of systemd');
  },5700);
  setTimeout(function(){
    mkn('ps',2099,'ps aux','fork → exec → run → exit…',375,170,'');
    shn('ps',0);
    drl(452,135,452,170,'#475569',0);
    log('ps: bash called fork() then exec(&quot;ps aux&quot;). Printed output. Now exiting.');
  },6800);
  setTimeout(function(){
    var e=document.getElementById('pn-ps');
    if(e){e.style.opacity='0.18';e.style.transition='opacity .9s';}
    log('Lifecycle: fork() → exec() → run → exit() → parent reaps with wait()');
  },8300);
  setTimeout(function(){
    stage=2;busy=false;
    document.getElementById('b3').disabled=false;
    document.getElementById('b3').style.opacity='1';
    log('Stage 2 done. Ready for the daemon deep-dive.');
    if(cb)cb();
  },10000);
}

function stageDaemon(cb){
  if(busy||stage<2||stage>=3)return;busy=true;
  log('Stage 3: Examining daemon internals...');
  ttype('vivek@ubuntu:~$','systemctl status sshd',[
    ['tg','● ssh.service - OpenBSD Secure Shell server'],
    ['to','   Loaded: loaded (/lib/systemd/system/ssh.service)'],
    ['to','   Active: active (running) since Mon 2026-06-14'],
    ['to','  Process: 312 ExecStart=/usr/sbin/sshd -D'],
    ['to','   CGroup: /system.slice/ssh.service'],
  ]);
  setTimeout(function(){
    log('Active: running — sshd started at boot and stays alive until system shuts down');
  },4300);
  setTimeout(function(){
    ttype('vivek@ubuntu:~$','ls -la /proc/312/fd',[
      ['to','lrwx------ fd/0 -> /dev/null      ← stdin  (redirected to void)'],
      ['to','lrwx------ fd/1 -> /dev/null      ← stdout (redirected to void)'],
      ['to','lrwx------ fd/2 -> /dev/null      ← stderr (redirected to void)'],
      ['to','lrwx------ fd/3 -> socket:[17423] ← listening on port 22'],
    ]);
  },5400);
  setTimeout(function(){
    log('Key: stdin/stdout/stderr all point to /dev/null — daemon has NO terminal!');
    var e=document.getElementById('pn-sshd');
    if(e){e.style.boxShadow='0 0 14px #22c55e99';e.style.transition='box-shadow .5s';}
  },10200);
  setTimeout(function(){
    ttype('vivek@ubuntu:~$','# The daemon creation recipe (6 steps):',[
      ['to','  Step 1.  fork()             create child process'],
      ['to','  Step 2.  parent exits       child orphaned → adopted by systemd'],
      ['to','  Step 3.  setsid()           new session, detach from terminal'],
      ['to','  Step 4.  close(0, 1, 2)     close stdin / stdout / stderr'],
      ['to','  Step 5.  open /dev/null     redirect all I/O to void'],
      ['to','  Step 6.  bind() + listen()  wait for incoming connections'],
    ]);
  },11800);
  setTimeout(function(){
    stage=3;busy=false;
    log('Complete! You now understand Linux files, processes, and daemons.');
    if(cb)cb();
  },18500);
}

function fullDemo(){
  resetAll();
  setTimeout(function(){
    stageCmds(function(){
      setTimeout(function(){
        stageProcs(function(){
          setTimeout(function(){stageDaemon();},600);
        });
      },600);
    });
  },300);
}

function resetAll(){
  stage=0;busy=false;
  tb.innerHTML='<span class=&quot;tcur&quot; id=&quot;cur&quot;></span>';
  cur=document.getElementById('cur');
  Array.from(pt.querySelectorAll('.pn')).forEach(function(n){n.remove();});
  sv.innerHTML='';
  document.getElementById('b1').disabled=false;
  document.getElementById('b2').disabled=true;
  document.getElementById('b2').style.opacity='0.35';
  document.getElementById('b3').disabled=true;
  document.getElementById('b3').style.opacity='0.35';
  log('Click a stage button to begin.');
}
</script></body></html>" frameborder="0" scrolling="yes" allowfullscreen></iframe>

<span class=&quot;ul&quot;>  ↑scheme  ↑domain         ↑path (resource)  ↑query</span></div>

      </div>
      <div class=&quot;badge&quot; id=&quot;ip-badge&quot; style=&quot;left:224px;top:140px;border-color:#eab308;color:#eab308;&quot;>📍 140.82.114.5</div>
      <div class=&quot;badge&quot; id=&quot;tls-badge&quot; style=&quot;left:432px;top:140px;border-color:#a78bfa;color:#a78bfa;&quot;>🔒 TLS Encrypted</div>
